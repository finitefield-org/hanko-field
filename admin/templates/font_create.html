<article class="flex flex-col gap-5 p-4 sm:p-5">
  <header>
    <h3 class="text-xl leading-tight font-bold">新規フォント作成</h3>
    <p class="mt-1 text-xs font-semibold tracking-[0.06em] text-admin-muted uppercase">key は英小文字・数字・ハイフン・アンダースコアを利用できます</p>
  </header>

  {% if view.has_message %}
  <p class="rounded-xl border border-admin-accent/30 bg-admin-accent-soft px-3 py-2 text-sm font-semibold text-admin-accent">{{ view.message }}</p>
  {% endif %}
  {% if view.has_error %}
  <p class="rounded-xl border border-admin-alert/35 bg-[rgb(157_47_36_/_0.08)] px-3 py-2 text-sm font-semibold text-admin-alert">{{ view.error }}</p>
  {% endif %}

  <form
    class="flex flex-col gap-3 rounded-xl border border-admin-line/70 bg-white p-4"
    hx-post="/admin/fonts"
    hx-target="#font-create"
    hx-swap="innerHTML"
  >
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>フォントキー</span>
      <input type="text" name="key" value="{{ view.key }}" placeholder="zen_maru_gothic" pattern="[a-z0-9_-]+" maxlength="64" required>
    </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>フォント名</span>
      <input type="text" name="label" value="{{ view.label }}" required>
    </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>font-family</span>
      <input type="text" name="font_family" value="{{ view.font_family }}" placeholder="'Zen Maru Gothic', sans-serif" required>
    </label>
    <p class="rounded-lg border border-admin-line/60 bg-admin-bg/40 px-3 py-2 text-sm">
      Google Fonts URL は `font-family` の先頭フォント名から自動生成されます。
    </p>
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>スタイル</span>
      <select name="kanji_style" required>
        <option value="japanese" {% if view.kanji_style == "japanese" %}selected{% endif %}>日本スタイル</option>
        <option value="chinese" {% if view.kanji_style == "chinese" %}selected{% endif %}>中国スタイル</option>
        <option value="taiwanese" {% if view.kanji_style == "taiwanese" %}selected{% endif %}>台湾スタイル</option>
      </select>
    </label>
    <p class="rounded-lg border border-admin-line/60 bg-admin-bg/40 px-3 py-2 text-sm">
      プレビュー:
      <span class="ml-2 text-base" style="font-family: {{ view.font_family }};">印 例 サンプル</span>
    </p>
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>表示順</span>
      <input type="number" name="sort_order" min="0" value="{{ view.sort_order }}" required>
    </label>

    <label class="inline-flex items-center gap-2 text-sm font-semibold">
      <input type="checkbox" name="is_active" value="1" {% if view.is_active %}checked{% endif %}>
      <span>公開する</span>
    </label>

    <button type="submit" class="w-fit rounded-[10px] border border-admin-accent bg-admin-accent px-4 py-[10px] text-[0.92rem] font-semibold text-white transition hover:brightness-[1.05]">フォントを作成</button>
  </form>
</article>
