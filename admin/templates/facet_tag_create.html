<article class="flex flex-col gap-5 p-4 sm:p-5">
  <header>
    <h3 class="text-xl leading-tight font-bold">タグを追加</h3>
    <p class="mt-1 text-xs font-semibold tracking-[0.06em] text-admin-muted uppercase">key は canonical な検索キーとして使います</p>
  </header>

  {% if view.has_message %}
  <p class="rounded-xl border border-admin-accent/30 bg-admin-accent-soft px-3 py-2 text-sm font-semibold text-admin-accent">{{ view.message }}</p>
  {% endif %}
  {% if view.has_error %}
  <p class="rounded-xl border border-admin-alert/35 bg-[rgb(157_47_36_/_0.08)] px-3 py-2 text-sm font-semibold text-admin-alert">{{ view.error }}</p>
  {% endif %}

  <form
    class="flex flex-col gap-3 rounded-xl border border-admin-line/70 bg-white p-4"
    hx-post="/admin/facet-tags"
    hx-target="#facet-tag-create"
    hx-swap="innerHTML"
  >
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>タグキー</span>
      <input type="text" name="key" value="{{ view.key }}" placeholder="deep_green" pattern="[a-z0-9_-]+" maxlength="64" required>
      {% if view.has_key_error %}
      <span class="text-xs font-semibold text-admin-alert">{{ view.key_error }}</span>
      {% endif %}
    </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold">
      <span>種別</span>
      <select name="facet_type" required>
        {% for option in facet_tag_type_options %}
        <option value="{{ option.value }}" {% if view.facet_type == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
      </select>
    </label>

    <div class="grid gap-3 sm:grid-cols-2">
      <label class="flex flex-col gap-1.5 text-sm font-semibold">
        <span>名称 (ja)</span>
        <input type="text" name="label_ja" value="{{ view.label_ja }}" required>
      </label>
      <label class="flex flex-col gap-1.5 text-sm font-semibold">
        <span>Name (en)</span>
        <input type="text" name="label_en" value="{{ view.label_en }}" required>
      </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold sm:col-span-2">
      <span>aliases</span>
      <input type="text" name="aliases" value="{{ view.aliases }}" placeholder="dark_green, forest_green">
      {% if view.has_aliases_error %}
      <span class="text-xs font-semibold text-admin-alert">{{ view.aliases_error }}</span>
      {% endif %}
    </label>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      <label class="flex flex-col gap-1.5 text-sm font-semibold">
        <span>表示順</span>
        <input type="number" name="sort_order" min="0" value="{{ view.sort_order }}" required>
      </label>
      <label class="inline-flex items-center gap-2 self-end text-sm font-semibold">
        <input type="checkbox" name="is_active" value="1" {% if view.is_active %}checked{% endif %}>
        <span>公開する</span>
      </label>
    </div>

    <button type="submit" class="w-fit rounded-[10px] border border-admin-accent bg-admin-accent px-4 py-[10px] text-[0.92rem] font-semibold text-white transition hover:brightness-[1.05]">タグを追加</button>
  </form>
</article>
