<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Dark jadeite block</title>
  <desc id="desc">A faceted dark green jadeite composition under soft directional light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111917"/>
      <stop offset="0.55" stop-color="#23372d"/>
      <stop offset="1" stop-color="#07100d"/>
    </linearGradient>
    <linearGradient id="jade" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#8cb89a"/>
      <stop offset="0.22" stop-color="#35694d"/>
      <stop offset="0.52" stop-color="#173525"/>
      <stop offset="0.78" stop-color="#4f8f68"/>
      <stop offset="1" stop-color="#0b1d15"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d5e6d7" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0a1a12" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.034" numOctaves="4" seed="18"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="soft-light"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="260" cy="155" r="310" fill="#eef6dc" opacity="0.08"/>
  <circle cx="970" cy="760" r="390" fill="#0b0806" opacity="0.55"/>
  <g filter="url(#grain)">
    <path d="M235 618 382 247 788 152 1002 424 860 731 475 772Z" fill="url(#jade)"/>
    <path d="M382 247 552 438 788 152Z" fill="#5d9b73" opacity="0.58"/>
    <path d="M552 438 1002 424 788 152Z" fill="#254832" opacity="0.82"/>
    <path d="M552 438 860 731 1002 424Z" fill="#13271c" opacity="0.86"/>
    <path d="M235 618 552 438 475 772Z" fill="#2d6646" opacity="0.82"/>
    <path d="M382 247 235 618 552 438Z" fill="#76a982" opacity="0.36"/>
    <path d="M475 772 552 438 860 731Z" fill="#1a3a28" opacity="0.95"/>
    <path d="M382 247 788 152 1002 424 860 731 475 772 235 618Z" fill="none" stroke="url(#edge)" stroke-width="3" opacity="0.65"/>
    <path d="M323 590C454 560 473 463 571 413S728 324 890 390" fill="none" stroke="#d8eadb" stroke-width="8" stroke-linecap="round" opacity="0.14"/>
    <path d="M418 689C545 646 611 573 710 525S845 500 928 444" fill="none" stroke="#b8ddbd" stroke-width="5" stroke-linecap="round" opacity="0.16"/>
    <path d="M451 309C514 345 584 362 669 335" fill="none" stroke="#eff6df" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
  </g>
</svg>
