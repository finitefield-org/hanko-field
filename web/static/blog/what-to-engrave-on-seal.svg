<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">What to engrave on a seal</title>
  <desc id="desc">A custom stone seal beside sketch cards showing name seal ideas, initials, symbols, and meaningful words.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f3ea"/>
      <stop offset="0.48" stop-color="#d7c6af"/>
      <stop offset="1" stop-color="#4d4f46"/>
    </linearGradient>
    <linearGradient id="paper" x1="0.06" y1="0" x2="0.94" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="0.68" stop-color="#eadfce"/>
      <stop offset="1" stop-color="#c3ad91"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.16" y1="0.04" x2="0.9" y2="1">
      <stop offset="0" stop-color="#f2efe8"/>
      <stop offset="0.32" stop-color="#c2ad91"/>
      <stop offset="0.64" stop-color="#75604b"/>
      <stop offset="1" stop-color="#2a241f"/>
    </linearGradient>
    <linearGradient id="stoneSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78d72"/>
      <stop offset="0.54" stop-color="#5c4a39"/>
      <stop offset="1" stop-color="#211a16"/>
    </linearGradient>
    <radialGradient id="sealInk" cx="49%" cy="43%" r="62%">
      <stop offset="0" stop-color="#f7624b"/>
      <stop offset="0.55" stop-color="#b82222"/>
      <stop offset="1" stop-color="#65070b"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.033" numOctaves="4" seed="421"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#211914" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#background)"/>
  <path d="M0 200 1200 88v812H0Z" fill="#2c2a25" opacity="0.16"/>
