      <text x="317" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#3e362e">Full Name</text>
      <rect x="486" y="218" width="166" height="166" rx="8" fill="#f9f1e5" stroke="#b7a184" stroke-width="5"/>
      <text x="569" y="319" text-anchor="middle" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#3e362e">AK</text>
      <rect x="716" y="244" width="140" height="140" rx="8" fill="#f9f1e5" stroke="#b7a184" stroke-width="5"/>
      <path d="M786 284l14 44 46 1-38 26 14 44-36-28-37 28 14-44-38-26 46-1z" fill="#8a2421" opacity="0.82"/>
    </g>
    <path d="M230 448h420M230 500h512M230 552h470" stroke="#695845" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
    <path d="M730 464h210M730 516h170M730 568h230" stroke="#695845" stroke-width="11" stroke-linecap="round" opacity="0.15"/>
    <g filter="url(#shadow)">
      <path d="M406 516c0-62 74-112 166-112s166 50 166 112v164c0 62-74 112-166 112s-166-50-166-112Z" fill="url(#stoneSide)"/>
      <ellipse cx="572" cy="516" rx="166" ry="112" fill="url(#stone)"/>
      <ellipse cx="572" cy="516" rx="120" ry="70" fill="#ffffff" opacity="0.13"/>
      <path d="M508 484h128M508 532h128M552 460v98M596 460v98" stroke="#251b15" stroke-width="8" stroke-linecap="round" opacity="0.44"/>
      <path d="M450 632c82 35 162 36 244 1" fill="none" stroke="#edd8c4" stroke-width="7" stroke-linecap="round" opacity="0.17"/>
    </g>
