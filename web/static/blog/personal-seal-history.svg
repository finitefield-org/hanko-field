<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Personal seal on paper</title>
  <desc id="desc">A natural stone personal seal beside red seal marks on paper, artwork, and packaging.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
