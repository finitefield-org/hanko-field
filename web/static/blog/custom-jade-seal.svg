<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Custom jade seal</title>
  <desc id="desc">A green jade seal beside red seal impressions, paper, and seal paste.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf3"/>
      <stop offset="0.48" stop-color="#c9d8c2"/>
      <stop offset="1" stop-color="#687a63"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="0.62" stop-color="#ece4d4"/>
      <stop offset="1" stop-color="#c8b9a1"/>
    </linearGradient>
    <linearGradient id="jade" x1="0.18" y1="0.05" x2="0.9" y2="0.96">
      <stop offset="0" stop-color="#eff8e8"/>
      <stop offset="0.22" stop-color="#a8d4a1"/>
      <stop offset="0.48" stop-color="#4f8d63"/>
      <stop offset="0.75" stop-color="#1f4d38"/>
      <stop offset="1" stop-color="#0e2a21"/>
    </linearGradient>
    <linearGradient id="jade-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fb284"/>
      <stop offset="0.52" stop-color="#346446"/>
      <stop offset="1" stop-color="#112d24"/>
    </linearGradient>
    <radialGradient id="vermilion" cx="49%" cy="44%" r="59%">
      <stop offset="0" stop-color="#f1573e"/>
      <stop offset="0.52" stop-color="#b71e1e"/>
      <stop offset="1" stop-color="#61080b"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.031" numOctaves="4" seed="143"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#172417" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#background)"/>
  <path d="M0 170 1200 76v824H0Z" fill="#1d2e24" opacity="0.18"/>
  <g filter="url(#grain)">
    <path d="M116 214 790 142 850 718 176 802Z" fill="url(#paper)" filter="url(#shadow)"/>
    <path d="M718 268 1062 320 1004 730 662 680Z" fill="#d7c8b1" filter="url(#shadow)"/>
    <path d="M760 360h202M738 424h218M720 488h188" stroke="#665646" stroke-width="10" stroke-linecap="round" opacity="0.17"/>
    <g transform="rotate(6 850 604)">
