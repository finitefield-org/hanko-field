      <path d="M805 565h90M805 603h90M805 641h90M835 552v102M870 552v102" stroke="#f9dfd8" stroke-width="6" stroke-linecap="round" opacity="0.47"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M320 276c0-58 74-106 164-106s164 48 164 106v350c0 58-74 106-164 106s-164-48-164-106Z" fill="url(#jade-side)"/>
      <ellipse cx="484" cy="276" rx="164" ry="106" fill="url(#jade)"/>
      <ellipse cx="484" cy="276" rx="122" ry="70" fill="#eef9e9" opacity="0.18"/>
      <path d="M414 244h140M414 292h140M462 222v96M510 222v96" stroke="#10291f" stroke-width="8" stroke-linecap="round" opacity="0.44"/>
      <path d="M356 384c84 40 171 41 256 1" fill="none" stroke="#d9f0d4" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
      <path d="M356 528c84 38 171 39 256 1" fill="none" stroke="#d9f0d4" stroke-width="7" stroke-linecap="round" opacity="0.12"/>
      <path d="M364 334c45-28 84-31 134-7 44 21 84 21 122-2" fill="none" stroke="#d8f7d2" stroke-width="12" stroke-linecap="round" opacity="0.12"/>
      <path d="M344 474c62-36 108-38 166-8 39 20 74 21 112 0" fill="none" stroke="#eff8e8" stroke-width="10" stroke-linecap="round" opacity="0.1"/>
    </g>
    <ellipse cx="930" cy="204" rx="124" ry="92" fill="#102318" opacity="0.3"/>
    <ellipse cx="922" cy="188" rx="112" ry="80" fill="#f3eadf"/>
    <ellipse cx="922" cy="188" rx="82" ry="55" fill="url(#vermilion)"/>
    <path d="M872 174c29-23 67-30 108-21" fill="none" stroke="#ffc1b1" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
    <path d="M220 660h180M220 706h256" stroke="#84705e" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
    <g transform="rotate(-4 626 668)">
