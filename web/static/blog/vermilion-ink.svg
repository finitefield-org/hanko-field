<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Vermilion seal paste</title>
  <desc id="desc">A ceramic bowl of vermilion seal paste beside a red impression on paper.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf6"/>
      <stop offset="1" stop-color="#d8d0c4"/>
    </linearGradient>
    <radialGradient id="paste" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#f04a35"/>
      <stop offset="0.45" stop-color="#b51f1b"/>
      <stop offset="1" stop-color="#5e090c"/>
    </radialGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.65" stop-color="#cbc1b5"/>
      <stop offset="1" stop-color="#665b51"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.028 0.02" numOctaves="4" seed="41"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.17"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="#211c18"/>
  <path d="M0 220 1200 95v805H0Z" fill="#383029"/>
  <g filter="url(#grain)">
    <path d="M520 260 1110 185 1160 660 560 747Z" fill="url(#paper)"/>
    <path d="M722 363h230v230H722z" fill="#951617" opacity="0.9"/>
    <path d="M763 411h148M763 463h148M763 515h148M812 392v148M870 392v148" stroke="#f8ddd7" stroke-width="8" stroke-linecap="round" opacity="0.46"/>
    <path d="M80 310c35-118 156-194 303-190 169 4 292 111 283 249-9 140-151 247-318 239C181 600 40 443 80 310Z" fill="#0f0b09" opacity="0.45"/>
    <ellipse cx="360" cy="374" rx="290" ry="245" fill="url(#bowl)"/>
    <ellipse cx="360" cy="342" rx="222" ry="176" fill="#f4efe7"/>
    <ellipse cx="360" cy="350" rx="182" ry="136" fill="url(#paste)"/>
    <path d="M228 340c53-72 154-104 267-72" fill="none" stroke="#ffb19e" stroke-width="18" stroke-linecap="round" opacity="0.28"/>
    <path d="M201 515c89 63 216 78 322 34" fill="none" stroke="#fff7ed" stroke-width="13" stroke-linecap="round" opacity="0.36"/>
    <path d="M570 335c42 86 21 185-54 251" fill="none" stroke="#5e554e" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
  </g>
</svg>
