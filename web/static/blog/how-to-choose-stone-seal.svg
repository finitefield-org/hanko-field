<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Choosing stone seal materials</title>
  <desc id="desc">Several natural stone seals in different colors beside red seal impressions and stationery.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f5ee"/>
      <stop offset="0.5" stop-color="#d0c3b2"/>
      <stop offset="1" stop-color="#6f675f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="0.62" stop-color="#eadfce"/>
      <stop offset="1" stop-color="#c4b29d"/>
    </linearGradient>
    <linearGradient id="green-stone" x1="0.18" y1="0.05" x2="0.9" y2="0.96">
      <stop offset="0" stop-color="#eaf7df"/>
      <stop offset="0.28" stop-color="#9fc58a"/>
      <stop offset="0.58" stop-color="#4b7852"/>
      <stop offset="1" stop-color="#142a21"/>
    </linearGradient>
    <linearGradient id="cream-stone" x1="0.12" y1="0.05" x2="0.9" y2="0.95">
      <stop offset="0" stop-color="#fff5df"/>
      <stop offset="0.38" stop-color="#d7be8e"/>
      <stop offset="0.72" stop-color="#927150"/>
      <stop offset="1" stop-color="#3a2920"/>
    </linearGradient>
    <linearGradient id="dark-stone" x1="0.1" y1="0.05" x2="0.9" y2="0.95">
      <stop offset="0" stop-color="#a7a39b"/>
      <stop offset="0.4" stop-color="#55504b"/>
      <stop offset="1" stop-color="#121111"/>
    </linearGradient>
    <linearGradient id="red-stone" x1="0.1" y1="0.05" x2="0.9" y2="0.95">
      <stop offset="0" stop-color="#f3d0b7"/>
      <stop offset="0.42" stop-color="#a75f47"/>
      <stop offset="1" stop-color="#3b1714"/>
    </linearGradient>
    <radialGradient id="vermilion" cx="49%" cy="44%" r="60%">
      <stop offset="0" stop-color="#f0563d"/>
      <stop offset="0.55" stop-color="#b51f1f"/>
      <stop offset="1" stop-color="#62080b"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.031" numOctaves="4" seed="181"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#201813" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#background)"/>
  <path d="M0 190 1200 86v814H0Z" fill="#30261f" opacity="0.17"/>
  <g filter="url(#grain)">
    <path d="M106 218 802 142 858 728 166 802Z" fill="url(#paper)" filter="url(#shadow)"/>
    <path d="M730 266 1066 322 1008 732 672 682Z" fill="#d5c4ad" filter="url(#shadow)"/>
    <path d="M772 362h196M748 426h214M730 492h184" stroke="#6b5a48" stroke-width="10" stroke-linecap="round" opacity="0.17"/>
    <g filter="url(#shadow)">
      <path d="M214 390c0-42 52-76 116-76s116 34 116 76v240c0 42-52 76-116 76s-116-34-116-76Z" fill="#3d6044"/>
      <ellipse cx="330" cy="390" rx="116" ry="76" fill="url(#green-stone)"/>
      <path d="M260 498c55 28 112 28 170 0" fill="none" stroke="#d7efd0" stroke-width="7" stroke-linecap="round" opacity="0.15"/>
      <path d="M284 374h92M314 344v64" stroke="#183022" stroke-width="7" stroke-linecap="round" opacity="0.42"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M428 310c0-46 58-84 130-84s130 38 130 84v304c0 46-58 84-130 84s-130-38-130-84Z" fill="#6f543f"/>
      <ellipse cx="558" cy="310" rx="130" ry="84" fill="url(#cream-stone)"/>
      <path d="M472 420c64 31 132 31 196-1" fill="none" stroke="#fff0cf" stroke-width="8" stroke-linecap="round" opacity="0.16"/>
      <path d="M500 287h112M538 256v72" stroke="#2e2018" stroke-width="8" stroke-linecap="round" opacity="0.38"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M676 408c0-40 50-72 112-72s112 32 112 72v220c0 40-50 72-112 72s-112-32-112-72Z" fill="#343230"/>
      <ellipse cx="788" cy="408" rx="112" ry="72" fill="url(#dark-stone)"/>
      <path d="M718 507c56 27 112 27 168 0" fill="none" stroke="#dedbd4" stroke-width="7" stroke-linecap="round" opacity="0.14"/>
      <path d="M746 390h84M774 362v60" stroke="#111" stroke-width="7" stroke-linecap="round" opacity="0.46"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M904 482c0-36 44-66 98-66s98 30 98 66v174c0 36-44 66-98 66s-98-30-98-66Z" fill="#62332a"/>
      <ellipse cx="1002" cy="482" rx="98" ry="66" fill="url(#red-stone)"/>
      <path d="M942 564c46 22 95 22 142 0" fill="none" stroke="#ffd7c4" stroke-width="7" stroke-linecap="round" opacity="0.14"/>
      <path d="M970 468h64M992 442v52" stroke="#2b100d" stroke-width="7" stroke-linecap="round" opacity="0.42"/>
    </g>
    <g transform="rotate(6 838 612)">
      <rect x="760" y="536" width="156" height="156" fill="url(#vermilion)" opacity="0.92"/>
      <path d="M792 574h92M792 613h92M792 652h92M823 562v102M857 562v102" stroke="#f9dfd8" stroke-width="6" stroke-linecap="round" opacity="0.47"/>
    </g>
    <ellipse cx="950" cy="196" rx="122" ry="90" fill="#1e120d" opacity="0.3"/>
    <ellipse cx="942" cy="182" rx="110" ry="78" fill="#f3eadf"/>
    <ellipse cx="942" cy="182" rx="80" ry="53" fill="url(#vermilion)"/>
    <path d="M892 169c29-23 67-30 108-21" fill="none" stroke="#ffc1b1" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
    <path d="M218 746h198M218 790h306" stroke="#8a7561" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  </g>
</svg>
