<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Japanese hanko souvenir</title>
  <desc id="desc">A Japanese stone hanko souvenir with red seal impressions, travel stationery, and a small gift wrap.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="0.5" stop-color="#d8c8b2"/>
      <stop offset="1" stop-color="#75695d"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="0.6" stop-color="#eadfcd"/>
      <stop offset="1" stop-color="#c7b49c"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.18" y1="0.05" x2="0.9" y2="0.96">
      <stop offset="0" stop-color="#f0e6da"/>
      <stop offset="0.22" stop-color="#b79580"/>
      <stop offset="0.52" stop-color="#644a3c"/>
      <stop offset="0.78" stop-color="#2a211d"/>
      <stop offset="1" stop-color="#11100f"/>
    </linearGradient>
    <linearGradient id="stone-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#927568"/>
      <stop offset="0.52" stop-color="#4f3d35"/>
      <stop offset="1" stop-color="#171312"/>
    </linearGradient>
    <linearGradient id="gift" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eee6da"/>
      <stop offset="0.55" stop-color="#c3ae91"/>
      <stop offset="1" stop-color="#7b654d"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f36043"/>
      <stop offset="0.52" stop-color="#b51e21"/>
      <stop offset="1" stop-color="#65070b"/>
    </linearGradient>
    <radialGradient id="vermilion" cx="49%" cy="44%" r="60%">
      <stop offset="0" stop-color="#ef5139"/>
      <stop offset="0.55" stop-color="#b31d1e"/>
      <stop offset="1" stop-color="#62080a"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.031" numOctaves="4" seed="164"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
