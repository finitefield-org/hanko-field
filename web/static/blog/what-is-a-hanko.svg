<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Stone hanko seal</title>
  <desc id="desc">A stone hanko seal beside a red impression on handmade paper and a small case of seal paste.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.58" stop-color="#e6ded2"/>
      <stop offset="1" stop-color="#bdb1a2"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.18" y1="0.06" x2="0.9" y2="0.95">
      <stop offset="0" stop-color="#d9e4d8"/>
      <stop offset="0.24" stop-color="#9ab496"/>
      <stop offset="0.52" stop-color="#506f57"/>
      <stop offset="0.78" stop-color="#22392d"/>
      <stop offset="1" stop-color="#0c1812"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b9a7d"/>
      <stop offset="0.55" stop-color="#314e3a"/>
      <stop offset="1" stop-color="#0b150f"/>
    </linearGradient>
    <radialGradient id="paste" cx="48%" cy="42%" r="62%">
      <stop offset="0" stop-color="#f0573d"/>
      <stop offset="0.52" stop-color="#b91d1c"/>
      <stop offset="1" stop-color="#5f080c"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.02 0.033" numOctaves="4" seed="57"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.17"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="#1c1815"/>
  <path d="M0 180 1200 92v808H0Z" fill="#332b25"/>
  <g filter="url(#grain)">
    <path d="M116 246 986 152 1087 732 194 812Z" fill="url(#paper)"/>
    <path d="M672 580h244v244H672z" fill="#941719" opacity="0.9" transform="rotate(-6 794 702)"/>
    <path d="M716 625h150M716 684h150M716 743h150M766 606v162M825 606v162" stroke="#f8ded8" stroke-width="8" stroke-linecap="round" opacity="0.44" transform="rotate(-6 794 702)"/>
    <ellipse cx="306" cy="650" rx="210" ry="54" fill="#0b0705" opacity="0.34"/>
    <path d="M214 220c0-53 65-96 145-96s145 43 145 96v398c0 53-65 96-145 96s-145-43-145-96Z" fill="url(#side)"/>
    <ellipse cx="359" cy="220" rx="145" ry="96" fill="url(#stone)"/>
    <ellipse cx="359" cy="220" rx="111" ry="68" fill="#eaf0df" opacity="0.15"/>
    <path d="M257 213c42-40 103-54 184-43" fill="none" stroke="#f1f4e9" stroke-width="12" stroke-linecap="round" opacity="0.24"/>
    <path d="M252 306c82 42 170 43 264 4" fill="none" stroke="#cfe0ce" stroke-width="8" stroke-linecap="round" opacity="0.15"/>
    <path d="M252 445c84 40 171 40 264 2" fill="none" stroke="#d5e4d1" stroke-width="6" stroke-linecap="round" opacity="0.13"/>
    <path d="M331 171v96M389 171v96M297 219h125" stroke="#17251c" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
    <ellipse cx="857" cy="268" rx="154" ry="120" fill="#0b0705" opacity="0.36"/>
    <ellipse cx="848" cy="248" rx="142" ry="112" fill="#ece4d8"/>
    <ellipse cx="848" cy="248" rx="108" ry="78" fill="url(#paste)"/>
    <path d="M780 229c34-31 82-43 142-31" fill="none" stroke="#ffb5a3" stroke-width="12" stroke-linecap="round" opacity="0.31"/>
  </g>
