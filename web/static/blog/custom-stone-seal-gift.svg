<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Custom stone seal gift</title>
  <desc id="desc">A natural stone seal gift with red seal impressions, stationery, and a wrapped box.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8ef"/>
      <stop offset="0.52" stop-color="#d6cab9"/>
      <stop offset="1" stop-color="#817061"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="0.65" stop-color="#eee5d6"/>
      <stop offset="1" stop-color="#cbbba7"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.16" y1="0.05" x2="0.9" y2="0.95">
      <stop offset="0" stop-color="#f0eadf"/>
      <stop offset="0.25" stop-color="#b8a98e"/>
      <stop offset="0.53" stop-color="#625744"/>
      <stop offset="0.78" stop-color="#27241f"/>
      <stop offset="1" stop-color="#100f0d"/>
    </linearGradient>
    <linearGradient id="stone-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93866e"/>
      <stop offset="0.5" stop-color="#4d4638"/>
      <stop offset="1" stop-color="#16140f"/>
    </linearGradient>
    <linearGradient id="gift" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efe4d4"/>
      <stop offset="0.58" stop-color="#bba181"/>
      <stop offset="1" stop-color="#6f5a43"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f66143"/>
      <stop offset="0.5" stop-color="#b51e20"/>
      <stop offset="1" stop-color="#65070b"/>
    </linearGradient>
    <radialGradient id="seal-red" cx="48%" cy="44%" r="60%">
      <stop offset="0" stop-color="#ee513a"/>
      <stop offset="0.55" stop-color="#af1d1d"/>
      <stop offset="1" stop-color="#62080a"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.03" numOctaves="4" seed="117"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#211914" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#background)"/>
  <path d="M0 196 1200 90v810H0Z" fill="#302721" opacity="0.18"/>
  <g filter="url(#grain)">
    <path d="M124 216 760 148 824 726 174 800Z" fill="url(#paper)" filter="url(#shadow)"/>
    <path d="M705 260 1058 318 996 734 642 681Z" fill="#d8c7af" filter="url(#shadow)"/>
    <path d="M750 352h210M724 420h225M712 486h194" stroke="#6e5d4d" stroke-width="10" stroke-linecap="round" opacity="0.17"/>
    <g transform="rotate(7 840 610)">
