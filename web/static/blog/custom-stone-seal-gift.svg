      <path d="M294 492h42v196h-42z" fill="url(#ribbon)" opacity="0.88"/>
      <path d="M186 568h230v38H186z" fill="url(#ribbon)" opacity="0.88"/>
      <path d="M292 476c-46-44-94-26-82 12 12 36 66 23 103 11" fill="none" stroke="#b51e20" stroke-width="20" stroke-linecap="round"/>
      <path d="M334 476c46-44 94-26 82 12-12 36-66 23-103 11" fill="none" stroke="#b51e20" stroke-width="20" stroke-linecap="round"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M476 256c0-58 72-105 160-105s160 47 160 105v354c0 58-72 105-160 105s-160-47-160-105Z" fill="url(#stone-side)"/>
      <ellipse cx="636" cy="256" rx="160" ry="105" fill="url(#stone)"/>
      <ellipse cx="636" cy="256" rx="118" ry="70" fill="#fff6e8" opacity="0.16"/>
      <path d="M568 223h136M568 272h136M613 202v95M662 202v95" stroke="#252016" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
      <path d="M513 366c82 40 166 40 248 1" fill="none" stroke="#eadfce" stroke-width="8" stroke-linecap="round" opacity="0.17"/>
      <path d="M513 514c82 38 166 39 248 1" fill="none" stroke="#eadfce" stroke-width="7" stroke-linecap="round" opacity="0.12"/>
    </g>
    <ellipse cx="954" cy="206" rx="128" ry="94" fill="#1d120f" opacity="0.28"/>
    <ellipse cx="946" cy="190" rx="116" ry="82" fill="#f5ede2"/>
    <ellipse cx="946" cy="190" rx="84" ry="56" fill="url(#seal-red)"/>
    <path d="M892 176c31-23 70-31 112-22" fill="none" stroke="#ffc3b4" stroke-width="11" stroke-linecap="round" opacity="0.27"/>
    <path d="M468 732h194M468 778h304" stroke="#8f7c67" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  </g>
