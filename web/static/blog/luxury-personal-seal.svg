    <path d="M708 268 1064 322 1006 734 648 684Z" fill="#d5c4ad" filter="url(#shadow)"/>
    <path d="M754 362h206M732 426h220M714 492h190" stroke="#6b5a48" stroke-width="10" stroke-linecap="round" opacity="0.17"/>
