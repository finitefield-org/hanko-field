<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Luxury personal seal</title>
  <desc id="desc">A luxury natural stone personal seal beside red seal impressions, fine stationery, and a fountain pen.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f0"/>
      <stop offset="0.5" stop-color="#d5c5ae"/>
      <stop offset="1" stop-color="#5f5750"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="0.62" stop-color="#eee1cf"/>
      <stop offset="1" stop-color="#c8b59d"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.18" y1="0.05" x2="0.9" y2="0.96">
      <stop offset="0" stop-color="#f2ede4"/>
      <stop offset="0.25" stop-color="#bfa78f"/>
      <stop offset="0.52" stop-color="#6c5542"/>
      <stop offset="0.78" stop-color="#2b241e"/>
      <stop offset="1" stop-color="#11100f"/>
    </linearGradient>
    <linearGradient id="stone-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a806c"/>
      <stop offset="0.55" stop-color="#514235"/>
      <stop offset="1" stop-color="#171312"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0e7d3"/>
      <stop offset="0.42" stop-color="#9b7b4d"/>
      <stop offset="1" stop-color="#241914"/>
    </linearGradient>
    <radialGradient id="vermilion" cx="49%" cy="44%" r="60%">
      <stop offset="0" stop-color="#f0563d"/>
      <stop offset="0.55" stop-color="#b51f1f"/>
      <stop offset="1" stop-color="#62080b"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.031" numOctaves="4" seed="251"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#201813" flood-opacity="0.3"/>
    </filter>
