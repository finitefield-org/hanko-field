<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>支払い完了 | Stone Signature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-shape bg-shape-left"></div>
  <div class="bg-shape bg-shape-right"></div>

  <main class="layout">
    <header class="hero">
      <p class="hero-eyebrow">Stone Signature</p>
      <h1>お支払いが完了しました</h1>
      <p class="hero-description">ご注文ありがとうございます。確認メールを送信後、順次製作を開始します。</p>
    </header>

    <section class="panel">
      <div class="result-card is-success">
        <h4>決済を受け付けました</h4>
        <p>内容確認後、手彫り印鑑の製作に進みます。</p>
        {% if has_session_id %}
        <p>決済セッションID: {{ session_id }}</p>
        {% endif %}
      </div>

      <div class="step-actions">
        <button type="button" class="primary" onclick="window.location.href='/'">トップへ戻る</button>
      </div>
    </section>
  </main>
</body>
</html>
