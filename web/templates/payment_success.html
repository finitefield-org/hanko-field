<!doctype html>
<html lang="{{ selected_locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>支払い完了 | Stone Signature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js?v=20260223-2" defer></script>
</head>
<body>
  <div class="bg-shape bg-shape-left"></div>
  <div class="bg-shape bg-shape-right"></div>

  <main class="layout">
    <header class="hero">
      <div class="hero-top-row">
        <div>
          <p class="hero-eyebrow">Stone Signature</p>
          <h1>お支払いが完了しました</h1>
          <p class="hero-description">ご注文ありがとうございます。確認メールを送信後、順次製作を開始します。</p>
        </div>
        <label class="language-select-wrap" aria-label="Language selector">
          <span class="language-icon" aria-hidden="true">🌐</span>
          <select id="language-select" data-locale-select>
            <option value="ja" {% if selected_locale == "ja" %}selected{% endif %}>日本語</option>
            <option value="en" {% if selected_locale == "en" %}selected{% endif %}>English</option>
          </select>
        </label>
      </div>
    </header>

    <section class="panel">
      <div class="result-card is-success">
        <h4>決済を受け付けました</h4>
        <p>内容確認後、手彫り印鑑の製作に進みます。</p>
        {% if has_session_id %}
        <p>決済セッションID: {{ session_id }}</p>
        {% endif %}
      </div>

      <div class="step-actions">
        <button type="button" class="primary" onclick="window.location.href='/?lang={{ selected_locale }}'">トップへ戻る</button>
      </div>
    </section>

    <footer style="margin-top:16px;text-align:center;font-size:0.86rem;color:#6a645d;">
      <a
        href="{{ privacy_policy_url }}"
        target="_blank"
        rel="noopener noreferrer"
        style="color:#6a645d;text-decoration:underline;"
      >
        {% if selected_locale == "ja" %}プライバシーポリシー{% else %}Privacy Policy{% endif %}
      </a>
    </footer>
  </main>
</body>
</html>
