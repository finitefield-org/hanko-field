<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERR-005 Could Not Save Seal - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --screen-h: 836px;
        --ink: #172328;
        --copy: #344047;
        --wine: #821719;
        --gold: #b7782c;
        --line: #e4d4c2;
        --paper: #fbf8f3;
        --screen-scale: 1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dd;
        color: var(--ink);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      a,
      button,
      h1,
      h2,
      h3,
      p,
      span {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        overflow: hidden;
        background: var(--paper);
      }

      .artboard {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--screen-w);
        height: var(--screen-h);
        overflow: hidden;
        transform: scale(var(--screen-scale));
        transform-origin: top left;
        background:
          radial-gradient(circle at 51% 24%, rgba(255, 255, 255, 0.9) 0 23%, transparent 58%),
          radial-gradient(circle at 50% 65%, rgba(255, 255, 255, 0.73) 0 24%, transparent 60%),
          linear-gradient(135deg, #f1e8df 0%, #fffdf9 43%, #f6eee5 100%);
        box-shadow: inset 0 0 64px rgba(122, 95, 65, 0.08);
      }

      .artboard::before,
      .artboard::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .artboard::before {
        opacity: 0.34;
        background:
          linear-gradient(126deg, transparent 0 62%, rgba(181, 138, 91, 0.043) 62.1%, transparent 63.2%),
          linear-gradient(144deg, transparent 0 16%, rgba(181, 138, 91, 0.045) 16.1%, transparent 17.3%);
      }

      .artboard::after {
        background:
          radial-gradient(ellipse at 51% 33%, rgba(255, 255, 255, 0.46), transparent 31%),
          radial-gradient(ellipse at 51% 70%, rgba(255, 255, 255, 0.45), transparent 31%);
      }

      .serif {
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, "Times New Roman", serif;
      }

      .top-title {
        position: absolute;
        top: 62px;
        left: 30px;
        z-index: 3;
        margin: 0;
        color: var(--wine);
        font-size: 40px;
        font-weight: 500;
        line-height: 1;
        transform: scaleX(0.92);
        transform-origin: left center;
      }

      .settings-button {
        position: absolute;
        top: 68px;
        right: 31px;
        z-index: 3;
        display: grid;
        width: 31px;
        height: 31px;
        place-items: center;
        color: var(--gold);
      }

      .settings-button svg {
        width: 30px;
        height: 30px;
        stroke-width: 1.7;
      }

      .main-card {
        position: absolute;
        top: 123px;
        left: 25px;
        z-index: 2;
        width: 420px;
        height: 498px;
        overflow: hidden;
        border: 1px solid rgba(229, 214, 201, 0.86);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow:
          0 13px 25px rgba(84, 56, 35, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(2px);
      }

      .hero {
        position: absolute;
        top: 25px;
        left: 63px;
        width: 296px;
        height: 166px;
        object-fit: cover;
        object-position: center;
        mask-image: radial-gradient(ellipse at center, #000 0 68%, rgba(0, 0, 0, 0.86) 78%, transparent 96%);
      }

      .ornament {
        position: absolute;
        left: 50%;
        display: flex;
        align-items: center;
        gap: 15px;
        color: var(--gold);
        transform: translateX(-50%);
      }

      .card-ornament {
        top: 204px;
      }

      .ornament-line {
        width: 50px;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 9px;
        height: 9px;
        border: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .state-title {
        position: absolute;
        top: 232px;
        left: 0;
        width: 100%;
        margin: 0;
        color: var(--ink);
        font-size: 39px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-shadow: 0 10px 17px rgba(83, 45, 35, 0.08);
        transform: scaleX(0.86);
      }

      .message {
        position: absolute;
        top: 279px;
        left: 37px;
        width: 346px;
        margin: 0;
        color: var(--copy);
        font-size: 15.5px;
        font-weight: 400;
        line-height: 1.55;
        text-align: center;
      }

      .primary-action,
      .secondary-action {
        position: absolute;
        left: 37px;
        display: flex;
        width: 346px;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .primary-action {
        top: 364px;
        height: 51px;
        border-radius: 9px;
        background:
          radial-gradient(circle at 27% 28%, rgba(255, 255, 255, 0.09), transparent 24%),
          linear-gradient(120deg, #a21518 0%, #8f1014 47%, #7d0d10 100%);
        box-shadow:
          0 10px 20px rgba(96, 31, 24, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
        color: #fffaf6;
      }

      .primary-text {
        display: block;
        color: #fffaf6;
        font-size: 21px;
        font-weight: 500;
        line-height: 1;
      }

      .action-arrow {
        position: absolute;
        top: 15px;
        right: 18px;
        width: 25px;
        height: 25px;
        color: #fffaf3;
        stroke-width: 1.65;
      }

      .secondary-action {
        top: 428px;
        height: 47px;
        border: 1px solid rgba(183, 120, 44, 0.82);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.42);
        color: var(--gold);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      }

      .secondary-text {
        display: block;
        color: var(--gold);
        font-size: 20px;
        font-weight: 500;
        line-height: 1;
      }

      .tip-card {
        position: absolute;
        top: 638px;
        left: 60px;
        z-index: 2;
        display: grid;
        width: 349px;
        height: 82px;
        grid-template-columns: 78px minmax(0, 1fr);
        align-items: center;
        border: 1px solid rgba(229, 214, 201, 0.84);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.55);
        box-shadow:
          0 12px 24px rgba(84, 56, 35, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .tip-icon-wrap {
        display: grid;
        width: 56px;
        height: 56px;
        place-items: center;
        justify-self: center;
        border-radius: 999px;
        background: rgba(244, 236, 225, 0.72);
        color: var(--gold);
      }

      .tip-icon-wrap svg {
        width: 37px;
        height: 37px;
        stroke-width: 1.45;
      }

      .tip-copy {
        position: relative;
        padding-left: 18px;
      }

      .tip-copy::before {
        content: "";
        position: absolute;
        top: 1px;
        bottom: 0;
        left: 0;
        width: 1px;
        background: rgba(202, 167, 127, 0.8);
      }

      .tip-title {
        margin: 0 0 7px;
        color: #a76416;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
      }

      .tip-text {
        margin: 0;
        color: #344047;
        font-size: 13px;
        font-weight: 400;
        line-height: 1.45;
      }

      .bottom-nav {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 2;
        height: 103px;
        border-top: 1px solid rgba(229, 214, 201, 0.75);
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 -10px 22px rgba(84, 56, 35, 0.05);
      }

      .active-rail {
        position: absolute;
        top: -2px;
        left: 63px;
        width: 54px;
        height: 4px;
        border-radius: 999px;
        background: var(--wine);
      }

      .nav-list {
        display: grid;
        height: 100%;
        grid-template-columns: repeat(3, 1fr);
        margin: 0;
        padding: 16px 34px 0;
        list-style: none;
      }

      .nav-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: #172328;
        text-decoration: none;
      }

      .nav-link svg {
        width: 32px;
        height: 32px;
        stroke-width: 1.45;
      }

      .nav-link.active {
        color: var(--wine);
      }

      .nav-label {
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
      }

      .home-indicator {
        position: absolute;
        bottom: 7px;
        left: 50%;
        width: 139px;
        height: 5px;
        border-radius: 999px;
        background: #000;
        transform: translateX(-50%);
      }
    </style>
  </head>
  <body>
    <main class="screen" aria-label="Design save error screen">
      <div class="artboard">
        <h1 class="top-title serif">Design</h1>
        <a class="settings-button" href="#" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 8.1a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Z" stroke="currentColor" />
            <path d="m13.5 2.7.6 2.3a7 7 0 0 1 1.7.7l2.1-1.2 1.6 1.6-1.2 2.1c.3.5.5 1.1.7 1.7l2.3.6v2.3l-2.3.6a7 7 0 0 1-.7 1.7l1.2 2.1-1.6 1.6-2.1-1.2c-.5.3-1.1.5-1.7.7l-.6 2.3h-2.3l-.6-2.3a7 7 0 0 1-1.7-.7l-2.1 1.2-1.6-1.6 1.2-2.1a7 7 0 0 1-.7-1.7l-2.3-.6v-2.3l2.3-.6c.2-.6.4-1.2.7-1.7L4.5 6.1l1.6-1.6 2.1 1.2c.5-.3 1.1-.5 1.7-.7l.6-2.3h2.3Z" stroke="currentColor" stroke-linejoin="round" />
          </svg>
        </a>

        <section class="main-card" aria-label="Could not save seal">
          <img class="hero" src="assets/err-005-hero.png" alt="" />
          <div class="ornament card-ornament" aria-hidden="true">
            <span class="ornament-line"></span>
            <span class="ornament-diamond"></span>
            <span class="ornament-line"></span>
          </div>

          <h2 class="state-title serif">Couldn&rsquo;t Save Your Seal</h2>
          <p class="message">
            We don&rsquo;t have permission to access your photos<br />
            or there isn&rsquo;t enough storage available.<br />
            Please update your settings and try again.
          </p>

          <a class="primary-action" href="#">
            <span class="primary-text serif">Open Settings</span>
            <svg class="action-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 12h15" stroke="currentColor" stroke-linecap="round" />
              <path d="m13 5.5 7 6.5-7 6.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>

          <a class="secondary-action" href="#">
            <span class="secondary-text serif">Try Again</span>
          </a>
        </section>

        <aside class="tip-card" aria-label="Save tip">
          <span class="tip-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9.2 18.7h5.6M9.8 21h4.4" stroke="currentColor" stroke-linecap="round" />
              <path d="M8.9 15.3c0-2.2-2.5-3.2-2.5-6.1a5.6 5.6 0 1 1 11.2 0c0 2.9-2.5 3.9-2.5 6.1H8.9Z" stroke="currentColor" stroke-linejoin="round" />
              <path d="M12 1.7V0.5M18.2 3.9l1-1M20.7 10.3H22M3.3 10.3H2M5.8 3.9l-1-1M10 9.7l1.6 1.6 3-3.6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <div class="tip-copy">
            <p class="tip-title">Tip:</p>
            <p class="tip-text">
              Allow photo access and<br />
              check available storage.
            </p>
          </div>
        </aside>

        <nav class="bottom-nav" aria-label="Primary">
          <span class="active-rail" aria-hidden="true"></span>
          <ul class="nav-list">
            <li>
              <a class="nav-link active" href="#">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4.2 20.1c4.5-.6 7-2.7 7.4-6.3l5.7-5.7a2.1 2.1 0 0 0-3-3L8.6 10.8c-3.6.4-5.7 2.9-6.3 7.4l1.9 1.9Z" stroke="currentColor" stroke-linejoin="round" />
                  <path d="M8.6 10.8 13.5 15.7M13.9 6.7l3 3M3.7 17.7l2.6 2.6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="nav-label">Design</span>
              </a>
            </li>
            <li>
              <a class="nav-link" href="#">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 2.8 4.9 5.9v5.8c0 4.4 2.9 7.8 7.1 9.5 4.2-1.7 7.1-5.1 7.1-9.5V5.9L12 2.8Z" stroke="currentColor" stroke-linejoin="round" />
                  <path d="M12 8.5v6.3M9.7 12.5l2.3 2.3 2.4-2.3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="nav-label">My Seals</span>
              </a>
            </li>
            <li>
              <a class="nav-link" href="#">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 8.5 7.3 3.6h9.4L21 8.5 12 20.7 3 8.5Z" stroke="currentColor" stroke-linejoin="round" />
                  <path d="M3 8.5h18M7.3 3.6l2.4 4.9L12 20.7M16.7 3.6l-2.4 4.9L12 20.7" stroke="currentColor" stroke-linejoin="round" />
                </svg>
                <span class="nav-label">Stones</span>
              </a>
            </li>
          </ul>
          <span class="home-indicator" aria-hidden="true"></span>
        </nav>
      </div>
    </main>
    <script>
      (() => {
        const screen = document.querySelector(".screen");
        const setScale = () => {
          document.documentElement.style.setProperty("--screen-scale", Math.min(screen.clientWidth / 470.5, 1));
        };

        setScale();
        window.addEventListener("resize", setScale, { passive: true });
      })();
    </script>
  </body>
</html>
