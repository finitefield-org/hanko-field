<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LKP-004 Order Not Found - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --screen-h: 836px;
        --ink: #172328;
        --copy: #36424a;
        --wine: #821719;
        --gold: #b7782c;
        --line: #e4d4c2;
        --paper: #fbf8f3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dd;
        color: var(--ink);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      a,
      button,
      h1,
      h2,
      p,
      span {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        overflow: hidden;
        background: var(--paper);
      }

      .artboard {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--screen-w);
        height: var(--screen-h);
        overflow: hidden;
        transform: scale(calc(100cqw / 470.5px));
        transform-origin: top left;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.9) 0 23%, transparent 58%),
          radial-gradient(circle at 50% 47%, rgba(255, 255, 255, 0.72) 0 22%, transparent 60%),
          radial-gradient(circle at 50% 82%, rgba(255, 255, 255, 0.72) 0 22%, transparent 60%),
          linear-gradient(135deg, #f2e9df 0%, #fffdf9 44%, #f6eee5 100%);
        box-shadow: inset 0 0 64px rgba(122, 95, 65, 0.08);
      }

      .artboard::before,
      .artboard::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .artboard::before {
        opacity: 0.36;
        background:
          linear-gradient(126deg, transparent 0 62%, rgba(181, 138, 91, 0.044) 62.1%, transparent 63.1%),
          linear-gradient(143deg, transparent 0 15%, rgba(181, 138, 91, 0.046) 15.1%, transparent 16.3%);
      }

      .artboard::after {
        background:
          radial-gradient(ellipse at 50% 34%, rgba(255, 255, 255, 0.5), transparent 31%),
          radial-gradient(ellipse at 50% 77%, rgba(255, 255, 255, 0.48), transparent 30%);
      }

      .serif {
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, "Times New Roman", serif;
      }

      .back-button {
        position: absolute;
        top: 68px;
        left: 25px;
        z-index: 2;
        display: grid;
        width: 26px;
        height: 25px;
        place-items: center;
        color: var(--wine);
      }

      .back-button svg {
        width: 27px;
        height: 24px;
        stroke-width: 1.65;
      }

      .screen-title {
        position: absolute;
        top: 64px;
        left: 0;
        z-index: 2;
        width: 100%;
        margin: 0;
        color: var(--wine);
        font-size: 31px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-shadow: 0 10px 17px rgba(83, 45, 35, 0.08);
        transform: scaleX(0.9);
      }

      .ornament {
        position: absolute;
        left: 50%;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 15px;
        color: var(--gold);
        transform: translateX(-50%);
      }

      .top-ornament {
        top: 114px;
      }

      .title-ornament {
        top: 397px;
      }

      .home-ornament {
        top: 763px;
      }

      .ornament-line {
        width: 50px;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 9px;
        height: 9px;
        border: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .lookup-hero {
        position: absolute;
        top: 141px;
        left: 81px;
        z-index: 1;
        width: 310px;
        height: 180px;
        object-fit: cover;
        object-position: center;
        mix-blend-mode: normal;
        mask-image: radial-gradient(ellipse at center, #000 0 58%, rgba(0, 0, 0, 0.9) 67%, transparent 86%);
      }

      .state-title {
        position: absolute;
        top: 346px;
        left: 0;
        z-index: 2;
        width: 100%;
        margin: 0;
        color: var(--wine);
        font-size: 38px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-shadow: 0 12px 19px rgba(83, 45, 35, 0.08);
        transform: scaleX(0.84);
      }

      .message {
        position: absolute;
        top: 427px;
        left: 58px;
        z-index: 2;
        width: 354px;
        margin: 0;
        color: #344047;
        font-size: 15.5px;
        font-weight: 400;
        line-height: 1.54;
        text-align: center;
      }

      .notice-card {
        position: absolute;
        top: 488px;
        left: 89px;
        z-index: 2;
        display: grid;
        width: 293px;
        height: 69px;
        grid-template-columns: 70px minmax(0, 1fr);
        align-items: center;
        border: 1px solid rgba(229, 214, 201, 0.86);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow:
          0 11px 24px rgba(84, 56, 35, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(2px);
      }

      .notice-icon {
        width: 37px;
        height: 37px;
        justify-self: center;
        color: var(--gold);
        stroke-width: 1.45;
      }

      .notice-text {
        margin: 0;
        color: #344047;
        font-size: 13.3px;
        font-weight: 400;
        line-height: 1.45;
      }

      .primary-action,
      .secondary-action {
        position: absolute;
        left: 49px;
        z-index: 2;
        display: block;
        width: 373px;
        text-decoration: none;
      }

      .primary-action {
        top: 592px;
        height: 64px;
        border-radius: 12px;
        background:
          radial-gradient(circle at 27% 28%, rgba(255, 255, 255, 0.09), transparent 24%),
          linear-gradient(120deg, #a21518 0%, #8f1014 47%, #7d0d10 100%);
        box-shadow:
          0 10px 20px rgba(96, 31, 24, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
        color: #fffaf6;
      }

      .action-sparkle {
        position: absolute;
        top: 19px;
        left: 119px;
        width: 23px;
        height: 23px;
        color: #fffaf3;
      }

      .primary-text {
        position: absolute;
        top: 18px;
        left: 0;
        width: 100%;
        color: #fffaf6;
        font-size: 23px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
      }

      .action-arrow {
        position: absolute;
        top: 19px;
        right: 20px;
        width: 25px;
        height: 25px;
        color: #fffaf3;
        stroke-width: 1.65;
      }

      .secondary-action {
        top: 671px;
        height: 59px;
        border: 1px solid rgba(183, 120, 44, 0.8);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.43);
        color: #172328;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      }

      .support-icon {
        position: absolute;
        top: 18px;
        left: 96px;
        width: 22px;
        height: 22px;
        color: var(--gold);
        stroke-width: 1.55;
      }

      .secondary-text {
        position: absolute;
        top: 17px;
        left: 0;
        width: 100%;
        color: #172328;
        font-size: 20px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
      }

      .secondary-arrow {
        position: absolute;
        top: 18px;
        right: 21px;
        width: 24px;
        height: 24px;
        color: var(--gold);
        stroke-width: 1.65;
      }

      .home-link {
        position: absolute;
        top: 787px;
        left: 0;
        z-index: 2;
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: center;
        gap: 15px;
        color: #172328;
        text-decoration: none;
      }

      .home-icon {
        width: 24px;
        height: 24px;
        color: var(--gold);
        stroke-width: 1.55;
      }

      .home-text {
        color: #172328;
        font-size: 17px;
        font-weight: 500;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main class="screen" aria-label="Order lookup not found screen">
      <div class="artboard">
        <a class="back-button" href="#" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15.5 4.5 8 12l7.5 7.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M8.5 12h12" stroke="currentColor" stroke-linecap="round" />
          </svg>
        </a>

        <h1 class="screen-title serif">Order Lookup</h1>
        <div class="ornament top-ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>

        <img class="lookup-hero" src="assets/lkp-004-hero.png" alt="" />

        <h2 class="state-title serif">Order Not Found</h2>
        <div class="ornament title-ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>

        <p class="message">
          We couldn&rsquo;t find an order matching<br />
          that order number and email address.
        </p>

        <section class="notice-card" aria-label="Lookup guidance">
          <svg class="notice-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2.8 4.9 5.9v5.8c0 4.4 2.9 7.8 7.1 9.5 4.2-1.7 7.1-5.1 7.1-9.5V5.9L12 2.8Z" stroke="currentColor" stroke-linejoin="round" />
            <path d="M9 11.1h6v5.3H9v-5.3Z" stroke="currentColor" stroke-linejoin="round" />
            <path d="M10.4 11.1V9.8a1.6 1.6 0 0 1 3.2 0v1.3" stroke="currentColor" stroke-linecap="round" />
          </svg>
          <p class="notice-text">
            Please double-check your details<br />
            and try again.
          </p>
        </section>

        <a class="primary-action" href="#">
          <svg class="action-sparkle" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <path d="M13.7 1.8c1.4 7 5 10.5 12 12-7 1.5-10.6 5-12 12-1.5-7-5.1-10.5-12.1-12 7-1.5 10.6-5 12.1-12Z" stroke="currentColor" stroke-linejoin="round" />
            <path d="M23.3 1.7v7.1M19.8 5.2h7.1" stroke="currentColor" stroke-linecap="round" />
          </svg>
          <span class="primary-text serif">Try Again</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 12h15" stroke="currentColor" stroke-linecap="round" />
            <path d="m13 5.5 7 6.5-7 6.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>

        <a class="secondary-action" href="#">
          <svg class="support-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4.8 13v-2.1a7.2 7.2 0 0 1 14.4 0V13" stroke="currentColor" stroke-linecap="round" />
            <path d="M4.8 13.1h2.7v5.1H4.8v-5.1ZM16.5 13.1h2.7v5.1h-2.7v-5.1Z" stroke="currentColor" stroke-linejoin="round" />
            <path d="M16.5 18.2c-.6 1.6-2 2.4-4.2 2.4" stroke="currentColor" stroke-linecap="round" />
          </svg>
          <span class="secondary-text serif">Contact Support</span>
          <svg class="secondary-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 12h15" stroke="currentColor" stroke-linecap="round" />
            <path d="m13 5.5 7 6.5-7 6.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>

        <div class="ornament home-ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>

        <a class="home-link" href="#">
          <svg class="home-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="m4 11.4 8-7 8 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M6.2 10.4v9h11.6v-9M10 19.4v-5h4v5" stroke="currentColor" stroke-linejoin="round" />
          </svg>
          <span class="home-text serif">Back to Home</span>
        </a>
      </div>
    </main>
  </body>
</html>
