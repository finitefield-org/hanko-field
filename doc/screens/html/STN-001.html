<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STN-001 Stones - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #14191c;
        --copy: #505960;
        --gold: #ad7837;
        --paper-line: #ded4c8;
        --card-line: #e7dbcf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dc;
        color: var(--ink);
        font-family:
          "Hanko Serif JP", "Hanko Serif", "Yu Mincho", "Hiragino Mincho ProN",
          serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(
            118deg,
            transparent 0 39%,
            rgba(164, 122, 77, 0.04) 39.2%,
            transparent 40.5%
          ),
          linear-gradient(
            139deg,
            transparent 0 69%,
            rgba(164, 122, 77, 0.047) 69.15%,
            transparent 70.3%
          ),
          radial-gradient(
            ellipse at 50% 7%,
            rgba(255, 255, 255, 0.92),
            transparent 35%
          ),
          radial-gradient(
            ellipse at 50% 54%,
            rgba(255, 255, 255, 0.6),
            transparent 42%
          ),
          radial-gradient(
            ellipse at 50% 91%,
            rgba(255, 255, 255, 0.62),
            transparent 33%
          ),
          linear-gradient(127deg, #f3ece4 0%, #fffdf9 43%, #f7efe7 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.32;
        background:
          linear-gradient(
            151deg,
            transparent 0 18%,
            rgba(187, 153, 110, 0.16) 18.15%,
            transparent 18.82%
          ),
          linear-gradient(
            145deg,
            transparent 0 76%,
            rgba(194, 160, 117, 0.11) 76.1%,
            transparent 76.82%
          );
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 66px rgba(125, 96, 68, 0.075);
      }

      .icon-button {
        position: absolute;
        z-index: 3;
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .menu-button {
        top: 7.25%;
        left: 6.05%;
        width: 5.25cqw;
        height: 5.25cqw;
      }

      .filter-button {
        top: 7.05%;
        right: 5.85%;
        width: 5.95cqw;
        height: 5.95cqw;
      }

      .icon-button svg {
        width: 100%;
        height: 100%;
      }

      .menu-button svg {
        stroke-width: 2.15;
      }

      .filter-button svg {
        stroke-width: 1.95;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 6.52%;
        left: 50%;
        margin: 0;
        color: #111518;
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 7.85cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 9px 15px rgba(65, 43, 29, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .tabs {
        position: absolute;
        z-index: 2;
        top: 16.56%;
        left: 5.85%;
        display: grid;
        width: 88.3%;
        height: 4.34%;
        grid-template-columns: repeat(5, 1fr);
        align-items: start;
        border-bottom: 0.1cqw solid rgba(210, 200, 188, 0.88);
      }

      .tab {
        position: relative;
        display: block;
        color: #52595f;
        font-size: 3.72cqw;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-decoration: none;
        white-space: nowrap;
      }

      .tab:first-child {
        text-align: left;
        padding-left: 2.3cqw;
      }

      .tab.active {
        color: var(--gold);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        right: auto;
        left: 0;
        top: 7.28cqw;
        width: 15.05cqw;
        height: 0.44cqw;
        border-radius: 999px;
        background: var(--gold);
      }

      .catalog {
        position: absolute;
        z-index: 1;
        top: 23.62%;
        left: 5.72%;
        display: grid;
        width: 88.55%;
        gap: 2.55cqw;
      }

      .stone-card {
        position: relative;
        min-height: 30.1cqw;
        border: 0.1cqw solid rgba(229, 219, 207, 0.95);
        border-radius: 2.2cqw;
        background: rgba(255, 255, 255, 0.74);
        box-shadow:
          0 1.25cqw 3.25cqw rgba(96, 67, 44, 0.068),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(1.5px);
      }

      .stone-art {
        position: absolute;
        top: 5.05cqw;
        left: 4.95cqw;
        width: 33.9cqw;
        height: auto;
        mix-blend-mode: multiply;
      }

      .stone-card:nth-child(2) .stone-art {
        top: 4.1cqw;
        left: 4.65cqw;
        width: 34.65cqw;
      }

      .stone-card:nth-child(3) .stone-art,
      .stone-card:nth-child(4) .stone-art {
        top: 4.35cqw;
        left: 4.75cqw;
        width: 34.15cqw;
      }

      .stone-copy {
        position: absolute;
        top: 6.85cqw;
        left: 43.25cqw;
        min-width: 0;
      }

      .stone-name {
        margin: 0 0 2.95cqw;
        color: #12171b;
        font-size: 4.55cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 5px 11px rgba(69, 55, 45, 0.08);
        white-space: nowrap;
      }

      .stone-price {
        margin: 0 0 2.82cqw;
        color: #22282d;
        font-size: 4.08cqw;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }

      .stock {
        display: inline-flex;
        align-items: center;
        gap: 1.7cqw;
        margin: 0;
        color: #4d565d;
        font-size: 3.04cqw;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }

      .stock-dot {
        width: 2.18cqw;
        height: 2.18cqw;
        border-radius: 999px;
        background: #758775;
        box-shadow: 0 0 0 0.2cqw rgba(117, 135, 117, 0.12);
      }

      .stock-dot.red {
        background: #c16a42;
        box-shadow: 0 0 0 0.2cqw rgba(193, 106, 66, 0.12);
      }

      .stock-dot.rose {
        background: #efc3c9;
        box-shadow: 0 0 0 0.2cqw rgba(239, 195, 201, 0.12);
      }

      .stock-dot.lapis {
        background: #526da5;
        box-shadow: 0 0 0 0.2cqw rgba(82, 109, 165, 0.12);
      }

      .chevron {
        position: absolute;
        top: 50%;
        right: 5.7cqw;
        width: 4.45cqw;
        height: 4.45cqw;
        color: var(--gold);
        transform: translateY(-50%);
      }

      .chevron path {
        stroke-width: 1.85;
      }

      .inventory-note {
        position: absolute;
        right: 0;
        bottom: 2.24%;
        left: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2.2cqw;
        margin: 0;
        color: #424a50;
        font-size: 2.92cqw;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }

      .inventory-note svg {
        width: 3.12cqw;
        height: 3.12cqw;
        color: var(--gold);
        fill: currentColor;
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .tab {
          font-size: 3.62cqw;
        }

        .stone-name {
          font-size: 4.34cqw;
        }

        .stock {
          font-size: 2.96cqw;
        }

        .inventory-note {
          font-size: 2.82cqw;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="screen shadow-2xl shadow-stone-300/30 md:shadow-stone-300/40"
      aria-label="天然石一覧"
    >
      <button
        class="icon-button menu-button"
        type="button"
        aria-label="メニューを開く"
      >
        <svg viewBox="0 0 28 28" aria-hidden="true">
          <path
            d="M2.9 6.2h22.2M2.9 14h22.2M2.9 21.8h22.2"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <h1 class="screen-title">Stones</h1>

      <button
        class="icon-button filter-button"
        type="button"
        aria-label="絞り込み"
      >
        <svg viewBox="0 0 34 34" aria-hidden="true">
          <path
            d="M3.5 5.8h27L20.4 17.7v9.5l-6.7 3.7V17.7L3.5 5.8Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <nav class="tabs" aria-label="天然石カテゴリ">
        <a class="tab active" href="#" aria-current="page">すべて</a>
        <a class="tab" href="#">天然石</a>
        <a class="tab" href="#">翡翠</a>
        <a class="tab" href="#">瑪瑙</a>
        <a class="tab" href="#">水晶</a>
      </nav>

      <section class="catalog" aria-label="天然石商品">
        <article class="stone-card">
          <img
            class="stone-art"
            src="assets/cmb-005-stone-jade.png"
            alt="翡翠の印材"
          />
          <div class="stone-copy">
            <h2 class="stone-name">翡翠（ひすい）</h2>
            <p class="stone-price">¥128,000</p>
            <p class="stock">
              <span class="stock-dot" aria-hidden="true"></span>在庫あり
            </p>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m8.7 4.7 7.6 7.3-7.6 7.3"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </article>

        <article class="stone-card">
          <img
            class="stone-art"
            src="assets/stn-001-stone-red-agate.png"
            alt="赤瑪瑙の印材"
          />
          <div class="stone-copy">
            <h2 class="stone-name">赤瑪瑙</h2>
            <p class="stone-price">¥98,000</p>
            <p class="stock">
              <span class="stock-dot red" aria-hidden="true"></span>在庫あり
            </p>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m8.7 4.7 7.6 7.3-7.6 7.3"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </article>

        <article class="stone-card">
          <img
            class="stone-art"
            src="assets/cmb-005-stone-rose-quartz.png"
            alt="ローズクォーツの印材"
          />
          <div class="stone-copy">
            <h2 class="stone-name">ローズクォーツ</h2>
            <p class="stone-price">¥88,000</p>
            <p class="stock">
              <span class="stock-dot rose" aria-hidden="true"></span>在庫あり
            </p>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m8.7 4.7 7.6 7.3-7.6 7.3"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </article>

        <article class="stone-card">
          <img
            class="stone-art"
            src="assets/cmb-005-stone-lapis.png"
            alt="ラピスラズリの印材"
          />
          <div class="stone-copy">
            <h2 class="stone-name">ラピスラズリ</h2>
            <p class="stone-price">¥118,000</p>
            <p class="stock">
              <span class="stock-dot lapis" aria-hidden="true"></span>在庫あり
            </p>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m8.7 4.7 7.6 7.3-7.6 7.3"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </article>
      </section>

      <p class="inventory-note">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 1.9c1.1 5.5 4.6 9 10.1 10.1-5.5 1.1-9 4.6-10.1 10.1C10.9 16.6 7.4 13.1 1.9 12 7.4 10.9 10.9 7.4 12 1.9Z"
          />
        </svg>
        <span>天然石は一点もののため、在庫が変動いたします</span>
      </p>
    </main>
  </body>
</html>
