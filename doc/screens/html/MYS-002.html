<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MYS-002 My Seals Empty - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #11161a;
        --copy: #686f75;
        --wine: #951719;
        --deep-wine: #821214;
        --gold: #aa702d;
        --paper-line: #e8dccf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.96) 0 26%, transparent 58%),
          linear-gradient(135deg, #f1e8de 0%, #fffdf9 44%, #f4ece3 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      a,
      button {
        font: inherit;
      }

      .stage {
        width: min(100vw, 470.5px);
        height: 836px;
        overflow: hidden;
      }

      .phone {
        position: relative;
        width: 470.5px;
        height: 836px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 4%, rgba(255, 255, 255, 0.96) 0 25%, transparent 58%),
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.65) 0 25%, transparent 58%),
          radial-gradient(circle at 50% 86%, rgba(255, 255, 255, 0.56) 0 24%, transparent 57%),
          linear-gradient(139deg, #f4ece3 0%, #fffdf9 45%, #f7eee5 100%);
        transform-origin: top left;
      }

      .screen-header {
        position: relative;
        height: 162px;
      }

      .screen-title {
        position: absolute;
        top: 78px;
        left: 30px;
        margin: 0;
        color: var(--deep-wine);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 44px;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 10px 16px rgba(112, 65, 41, 0.11);
        white-space: nowrap;
      }

      .settings-button {
        position: absolute;
        top: 81px;
        right: 42px;
        display: grid;
        width: 35px;
        height: 35px;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .settings-button svg {
        width: 33px;
        height: 33px;
        stroke-width: 1.9;
      }

      .empty-card {
        width: min(100% - 121px, 348px);
        height: 548px;
        margin: 0 auto;
        overflow: hidden;
        border: 0.8px solid rgba(231, 219, 207, 0.96);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.64);
        box-shadow:
          0 11px 25px rgba(86, 58, 36, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(2px);
      }

      .empty-hero {
        display: block;
        width: 100%;
        height: 250px;
        object-fit: cover;
        object-position: center top;
      }

      .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-top: 20px;
        color: var(--gold);
      }

      .ornament-line {
        width: 50px;
        height: 1px;
        background: currentColor;
        font-size: 0;
      }

      .ornament-diamond {
        width: 9px;
        height: 9px;
        border: 2px solid currentColor;
        font-size: 0;
        transform: rotate(45deg);
      }

      .empty-title {
        margin: 18px 0 0;
        color: #11161a;
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 32px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        white-space: nowrap;
      }

      .empty-copy {
        margin: 16px auto 0;
        max-width: 220px;
        color: var(--copy);
        font-size: 15px;
        line-height: 1.43;
        text-align: center;
      }

      .primary-action {
        display: flex;
        width: 276px;
        height: 52px;
        align-items: center;
        justify-content: center;
        gap: 58px;
        margin: 18px auto 0;
        border-radius: 8px;
        background:
          radial-gradient(circle at 20% 25%, rgba(198, 31, 34, 0.48), transparent 48%),
          linear-gradient(135deg, #9d1217 0%, #871014 100%);
        color: #fffdf9;
        box-shadow:
          0 8px 15px rgba(111, 50, 30, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .primary-action svg {
        width: 22px;
        height: 22px;
        stroke-width: 1.7;
      }

      .secondary-action {
        display: flex;
        width: max-content;
        align-items: center;
        justify-content: center;
        gap: 22px;
        margin: 31px auto 0;
        color: var(--gold);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .secondary-action svg {
        width: 20px;
        height: 20px;
        stroke-width: 1.75;
      }

      .bottom-nav {
        position: absolute;
        z-index: 3;
        right: 0;
        bottom: 0;
        left: 0;
        height: 91px;
        border-top: 1px solid rgba(230, 220, 211, 0.98);
        background: rgba(255, 253, 250, 0.94);
        box-shadow: 0 -8px 18px rgba(87, 60, 40, 0.04);
        backdrop-filter: blur(8px);
      }

      .tab-list {
        display: grid;
        height: 100%;
        grid-template-columns: repeat(3, 1fr);
        padding: 11px 29px 17px;
      }

      .tab-item {
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 6px;
        color: #11161a;
        text-decoration: none;
      }

      .tab-item svg {
        width: 31px;
        height: 31px;
        stroke-width: 1.55;
      }

      .tab-label {
        font-size: 13px;
        line-height: 1;
      }

      .tab-item.is-active {
        color: var(--wine);
      }

      .tab-item.is-active .shield {
        width: 30px;
        height: 31px;
        color: var(--wine);
      }

      .tab-item.is-active .tab-label {
        color: var(--wine);
        font-weight: 600;
      }

      @media (max-width: 470.5px) {
        .stage {
          width: 100vw;
          height: 100vh;
          min-height: 760px;
        }

        .phone {
          width: 100vw;
          height: 100%;
          transform: none;
        }

        .screen-header {
          height: 156px;
        }

        .screen-title {
          top: 71px;
          left: 27px;
          font-size: 40px;
        }

        .settings-button {
          top: 75px;
          right: 31px;
        }

        .empty-card {
          width: calc(100vw - 46px);
          max-width: 348px;
          height: min(548px, calc(100vh - 247px));
          min-height: 500px;
        }

        .empty-hero {
          height: 242px;
        }

        .ornament {
          margin-top: 19px;
        }

        .empty-title {
          margin-top: 17px;
          font-size: 29px;
        }

        .empty-copy {
          margin-top: 16px;
          font-size: 14px;
        }

        .primary-action {
          width: min(276px, calc(100% - 82px));
          height: 48px;
          gap: 38px;
          margin-top: 17px;
          font-size: 20px;
        }

        .secondary-action {
          margin-top: 29px;
          gap: 18px;
          font-size: 18px;
        }

        .tab-list {
          padding-right: 23px;
          padding-left: 23px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-start justify-items-center">
    <svg aria-hidden="true" class="hidden">
      <symbol id="icon-gear" viewBox="0 0 24 24">
        <path d="M12 8.1a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        <path d="m13.4 2.6.8 2.5 2.6 1.1 2.4-1.1 1.4 2.5-2.1 1.6.3 2.8 2.1 1.6-1.4 2.5-2.4-1.1-2.6 1.1-.8 2.5h-2.8l-.8-2.5-2.6-1.1-2.4 1.1-1.4-2.5 2.1-1.6-.3-2.8-2.1-1.6 1.4-2.5 2.4 1.1 2.6-1.1.8-2.5Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-arrow-right" viewBox="0 0 24 24">
        <path d="M4 12h15.8M13.7 5.7 20 12l-6.3 6.3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-tab-design" viewBox="0 0 32 32">
        <path d="M19.4 5.3c.8-.8 2.1-.8 2.9 0 .7.7.8 1.8.2 2.6L14.3 21c-.5.8-1.2 1.3-2.1 1.6l-4.7 1.6 1.7-4.6c.3-.9.9-1.7 1.7-2.2Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M7.1 21.7c-2.6.8-4.1 1.9-4.1 3.1 0 2 5.2 3.6 11.5 3.6S26 26.8 26 24.8c0-1.4-2.4-2.6-5.9-3.2M17.5 8.1l3.5 3.3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-shield-star" viewBox="0 0 32 32">
        <path d="M16 3.3 25 6.8v7.6c0 5.6-3.5 10.5-9 12.6-5.5-2.1-9-7-9-12.6V6.8Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.9" />
        <path d="m16 10.2 1.45 3.4 3.65.32-2.75 2.42.82 3.56L16 18.04l-3.17 1.86.82-3.56-2.75-2.42 3.65-.32Z" fill="currentColor" />
      </symbol>
      <symbol id="icon-diamond" viewBox="0 0 32 32">
        <path d="M5.6 10.7 10.2 5h11.6l4.6 5.7L16 27Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
        <path d="M5.6 10.7h20.8M10.2 5l2.5 5.7L16 27l3.3-16.3L21.8 5M12.7 10.7h6.6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
    </svg>

    <div class="stage">
      <main class="phone" aria-label="My Seals empty screen preview">
        <header class="screen-header">
          <h1 class="screen-title">My Seals</h1>
          <button class="settings-button" type="button" aria-label="Settings">
            <svg aria-hidden="true"><use href="#icon-gear" /></svg>
          </button>
        </header>

        <section class="empty-card" aria-labelledby="empty-title">
          <img class="empty-hero" src="assets/mys-002-empty-hero.png" alt="" />
          <div class="ornament" aria-hidden="true">
            <span class="ornament-line">&nbsp;</span>
            <span class="ornament-diamond">&nbsp;</span>
            <span class="ornament-line">&nbsp;</span>
          </div>
          <h2 class="empty-title" id="empty-title">No saved seals yet</h2>
          <p class="empty-copy">Create your first seal<br />from your name.</p>
          <a class="primary-action" href="#" aria-label="Start Designing">
            <span>Start Designing</span>
            <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
          </a>
          <a class="secondary-action" href="#" aria-label="Explore Stones">
            <span>Explore Stones</span>
            <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
          </a>
        </section>

        <nav class="bottom-nav" aria-label="Primary">
          <div class="tab-list">
            <a class="tab-item" href="#" aria-label="Design">
              <svg aria-hidden="true"><use href="#icon-tab-design" /></svg>
              <span class="tab-label">Design</span>
            </a>
            <a class="tab-item is-active" href="#" aria-label="My Seals">
              <svg class="shield" aria-hidden="true"><use href="#icon-shield-star" /></svg>
              <span class="tab-label">My Seals</span>
            </a>
            <a class="tab-item" href="#" aria-label="Stones">
              <svg aria-hidden="true"><use href="#icon-diamond" /></svg>
              <span class="tab-label">Stones</span>
            </a>
          </div>
        </nav>
      </main>
    </div>
  </body>
</html>
