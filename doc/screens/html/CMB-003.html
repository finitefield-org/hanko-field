<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMB-003 Missing Stone - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #171b1f;
        --copy: #23282d;
        --gold: #b48242;
        --line: #d6ad76;
        --paper: #fbf7f0;
        --pale: #dcc8aa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe8de;
        color: var(--ink);
        font-family: "Hanko Serif JP", "Hanko Serif", "Times New Roman", serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(118deg, transparent 0 38%, rgba(170, 130, 82, 0.055) 38.3%, transparent 40%),
          linear-gradient(132deg, transparent 0 69%, rgba(165, 123, 75, 0.045) 69.2%, transparent 70.3%),
          radial-gradient(ellipse at 50% 9%, rgba(255, 255, 255, 0.86), transparent 34%),
          radial-gradient(ellipse at 45% 72%, rgba(255, 255, 255, 0.72), transparent 44%),
          linear-gradient(126deg, #f3ece4 0%, #fffdf9 43%, #f7efe6 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.34;
        background:
          linear-gradient(154deg, transparent 0 18%, rgba(194, 166, 128, 0.16) 18.15%, transparent 18.8%),
          linear-gradient(146deg, transparent 0 76%, rgba(197, 165, 124, 0.12) 76.1%, transparent 76.7%);
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 60px rgba(124, 96, 68, 0.08);
      }

      .back-button {
        position: absolute;
        z-index: 2;
        top: 8.8%;
        left: 5.35%;
        display: grid;
        width: 4.85cqw;
        height: 4.85cqw;
        place-items: center;
        color: var(--gold);
      }

      .back-button svg {
        width: 100%;
        height: 100%;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 8.9%;
        left: 50%;
        margin: 0;
        color: #111518;
        font-size: 5.25cqw;
        font-weight: 600;
        line-height: 1;
        text-shadow: 0 7px 12px rgba(58, 40, 24, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .ornament {
        position: absolute;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 3.6cqw;
        color: var(--gold);
      }

      .header-ornament {
        top: 14.34%;
        left: 50%;
        transform: translateX(-50%);
      }

      .ornament-line {
        width: 11.8cqw;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 1.9cqw;
        height: 1.9cqw;
        border: 0.36cqw solid currentColor;
        transform: rotate(45deg);
      }

      .card {
        position: absolute;
        z-index: 1;
        left: 6.6%;
        width: 86.9%;
        border: 0.1cqw solid rgba(226, 213, 201, 0.78);
        border-radius: 2.35cqw;
        background: rgba(255, 255, 255, 0.64);
        box-shadow:
          0 1.45cqw 3.7cqw rgba(83, 61, 43, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(2px);
      }

      .seal-card {
        top: 17.8%;
        height: 25.62%;
      }

      .missing-card {
        top: 45.8%;
        height: 29.84%;
      }

      .notice-card {
        top: 87.55%;
        height: 7.6%;
        display: flex;
        align-items: center;
        gap: 4.1cqw;
        padding: 0 4.8cqw;
      }

      .seal-art {
        position: absolute;
        top: 10.6%;
        left: 7.6%;
        width: 39%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .detail-copy {
        position: absolute;
        top: 13.6%;
        left: 53.55%;
        width: 36.8%;
        color: #22272b;
      }

      .detail-row {
        font-size: 3.55cqw;
        font-weight: 400;
        line-height: 1.15;
        white-space: nowrap;
      }

      .detail-separator {
        position: relative;
        height: 3.4cqw;
        margin: 2.2cqw 0 1.85cqw;
      }

      .detail-separator::before {
        content: "";
        position: absolute;
        top: 50%;
        right: 0;
        left: 3.2cqw;
        height: 1px;
        background: linear-gradient(90deg, var(--line), rgba(214, 173, 118, 0.74));
      }

      .detail-separator::after {
        content: "";
        position: absolute;
        top: calc(50% - 0.76cqw);
        left: 0;
        width: 1.45cqw;
        height: 1.45cqw;
        border: 0.32cqw solid var(--gold);
        transform: rotate(45deg);
      }

      .change-button {
        position: absolute;
        right: 9.35%;
        bottom: 8.3%;
        display: flex;
        width: 37%;
        height: 15.1%;
        align-items: center;
        justify-content: center;
        gap: 4.8cqw;
        border: 0.14cqw solid var(--gold);
        border-radius: 1.15cqw;
        color: #8e6632;
        font-size: 3.08cqw;
        line-height: 1;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.3);
      }

      .change-button svg,
      .primary-button svg {
        width: 2.45cqw;
        height: 2.45cqw;
        stroke-width: 1.8;
      }

      .missing-visual {
        position: absolute;
        top: 8.2%;
        left: 5.7%;
        width: 44.1%;
        height: 76%;
      }

      .missing-visual img {
        width: 100%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .missing-title {
        position: absolute;
        top: 19.3%;
        left: 53.8%;
        margin: 0;
        color: #111519;
        font-size: 6.08cqw;
        font-weight: 600;
        line-height: 1.2;
        white-space: nowrap;
      }

      .missing-ornament {
        top: 56.8%;
        left: 53.9%;
        gap: 2.95cqw;
      }

      .missing-ornament .ornament-line {
        width: 30.2cqw;
      }

      .missing-copy {
        position: absolute;
        top: 68.3%;
        left: 53.85%;
        margin: 0;
        color: var(--copy);
        font-size: 3.22cqw;
        line-height: 1.75;
        white-space: nowrap;
      }

      .primary-button {
        position: absolute;
        z-index: 2;
        top: 78.08%;
        left: 6.3%;
        display: flex;
        width: 87.7%;
        height: 7.2%;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: #fffaf1;
        font-size: 4.25cqw;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 2px 8px rgba(255, 244, 222, 0.28);
        background:
          radial-gradient(ellipse at 24% 28%, rgba(255, 255, 255, 0.12), transparent 39%),
          linear-gradient(135deg, #242526, #171819 58%, #252626);
        box-shadow:
          0 1.2cqw 3.7cqw rgba(24, 24, 24, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }

      .primary-button svg {
        position: absolute;
        right: 6.7%;
        color: var(--gold);
        stroke-width: 1.9;
      }

      .notice-icon {
        flex: 0 0 auto;
        width: 6.75cqw;
        height: 6.75cqw;
        color: var(--gold);
      }

      .notice-copy {
        margin: 0;
        color: #22272b;
        font-size: 3.02cqw;
        line-height: 1.62;
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .missing-title {
          font-size: 5.82cqw;
        }

        .missing-copy,
        .notice-copy {
          font-size: 2.92cqw;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen shadow-2xl shadow-stone-300/30 md:shadow-stone-300/40" aria-label="宝石材未選択の注文内容確認">
      <a class="back-button" href="#" aria-label="戻る">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M18.2 4.8 7 16l11.2 11.2M8.5 16H29"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.3"
          />
        </svg>
      </a>

      <h1 class="screen-title">ご注文内容確認</h1>
      <div class="ornament header-ornament" aria-hidden="true">
        <span class="ornament-line"></span>
        <span class="ornament-diamond"></span>
        <span class="ornament-line"></span>
      </div>

      <section class="card seal-card" aria-labelledby="seal-heading">
        <h2 id="seal-heading" class="sr-only">選択中の印影</h2>
        <img class="seal-art" src="assets/cmb-001-stamp.png" alt="美空の印影" />
        <div class="detail-copy">
          <p class="detail-row">印影：美空</p>
          <div class="detail-separator" aria-hidden="true"></div>
          <p class="detail-row">スタイル：Elegant</p>
          <div class="detail-separator" aria-hidden="true"></div>
          <p class="detail-row">形：Square</p>
        </div>
        <a class="change-button" href="#" aria-label="印影を変更">
          <span>印影を変更</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
      </section>

      <section class="card missing-card" aria-labelledby="missing-stone-heading">
        <div class="missing-visual" aria-hidden="true">
          <img src="assets/cmb-003-stone-placeholder.png" alt="" />
        </div>

        <h2 id="missing-stone-heading" class="missing-title">宝石材が<br />未選択です</h2>
        <div class="ornament missing-ornament" aria-hidden="true">
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>
        <p class="missing-copy">ご注文に進む前に、<br />宝石材を選択してください。</p>
      </section>

      <a class="primary-button" href="#" aria-label="宝石材を選ぶ">
        <span>宝石材を選ぶ</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>

      <aside class="card notice-card" aria-label="特注品について">
        <svg class="notice-icon" viewBox="0 0 48 54" aria-hidden="true">
          <path
            d="M24 2.8 42.5 9.4v15.1c0 12.1-7.5 20.6-18.5 26.5C13 45.1 5.5 36.6 5.5 24.5V9.4L24 2.8Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
            stroke-width="1.6"
          />
          <path d="M24 34.8c6.8-6.3 12.4-13.5 13.4-22.8M24 34.8C17.2 28.5 11.6 21.3 10.6 12M24 34.8V43" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.9" />
          <path d="M17.7 20.7c3.6-.6 5.3-2.3 5.9-5.9.6 3.6 2.3 5.3 5.9 5.9-3.6.6-5.3 2.3-5.9 5.9-.6-3.6-2.3-5.3-5.9-5.9Z" fill="currentColor" />
        </svg>
        <p class="notice-copy">本商品は、印影と宝石材を組み合わせてお作りする、<br />お客様だけの一点物の特注品です。</p>
      </aside>
    </main>
  </body>
</html>
