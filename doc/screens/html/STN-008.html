<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STN-008 Stone Image Gallery - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --gold: #d0a260;
        --ink: #f8f4ed;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #070707;
        color: var(--ink);
        font-family: "Hanko Serif", "Times New Roman", serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 50% 23%,
            rgba(60, 58, 53, 0.24),
            transparent 28%
          ),
          radial-gradient(
            ellipse at 50% 64%,
            rgba(48, 46, 40, 0.44),
            transparent 41%
          ),
          linear-gradient(180deg, #050505 0%, #12110f 45%, #090908 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.32;
        background:
          radial-gradient(
            circle at 42% 37%,
            rgba(255, 255, 255, 0.045),
            transparent 15%
          ),
          radial-gradient(
            circle at 69% 72%,
            rgba(255, 255, 255, 0.035),
            transparent 18%
          ),
          linear-gradient(
            111deg,
            transparent 0 49%,
            rgba(255, 255, 255, 0.025) 49.1%,
            transparent 49.8%
          );
      }

      .screen::after {
        box-shadow:
          inset 0 0 5.8cqw rgba(0, 0, 0, 0.72),
          inset 0 10cqw 22cqw rgba(0, 0, 0, 0.55),
          inset 0 -10cqw 20cqw rgba(0, 0, 0, 0.62);
      }

      .top-button {
        position: absolute;
        z-index: 4;
        display: grid;
        place-items: center;
        color: var(--gold);
        text-decoration: none;
      }

      .back-button {
        top: 8.58%;
        left: 5.58%;
        width: 5.25cqw;
        height: 5.25cqw;
      }

      .close-button {
        top: 8.52%;
        right: 5.92%;
        width: 4.95cqw;
        height: 4.95cqw;
      }

      .top-button svg {
        width: 100%;
        height: 100%;
      }

      .screen-title {
        position: absolute;
        z-index: 4;
        top: 8.72%;
        left: 50%;
        margin: 0;
        color: #fffaf2;
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 4.38cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 0.6cqw 1.5cqw rgba(0, 0, 0, 0.45);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .counter {
        position: absolute;
        z-index: 4;
        top: 14.96%;
        left: 50%;
        display: inline-flex;
        min-width: 15.2cqw;
        height: 6.82cqw;
        align-items: center;
        justify-content: center;
        border: 0.12cqw solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: rgba(30, 30, 30, 0.72);
        box-shadow:
          0 0.8cqw 2.2cqw rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        color: #fffaf2;
        font-size: 3.72cqw;
        font-weight: 500;
        line-height: 1;
        transform: translateX(-50%);
      }

      .hero-photo {
        position: absolute;
        z-index: 2;
        top: 21.53%;
        left: 0;
        width: 100%;
        height: auto;
        mask-image: linear-gradient(
          to bottom,
          transparent 0,
          #000 5.5%,
          #000 94%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0,
          #000 5.5%,
          #000 94%,
          transparent 100%
        );
      }

      .nav-button {
        position: absolute;
        z-index: 5;
        top: 44.35%;
        display: grid;
        width: 8.1cqw;
        height: 8.1cqw;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: transparent;
        text-decoration: none;
        transform: translateY(-50%);
      }

      .nav-button.prev {
        left: 2.62%;
      }

      .nav-button.next {
        right: 2.62%;
      }

      .nav-button svg {
        width: 3.58cqw;
        height: 3.58cqw;
      }

      .thumb-rail {
        position: absolute;
        z-index: 6;
        bottom: 4.1%;
        left: 2.86%;
        display: grid;
        grid-template-columns: repeat(6, 14.9cqw);
        gap: 1.52cqw;
      }

      .thumb {
        display: block;
        width: 14.9cqw;
        height: 18.1cqw;
        overflow: hidden;
        border: 0;
        border-radius: 1.4cqw;
        background: transparent;
        padding: 0;
      }

      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .thumb.selected {
        filter: drop-shadow(0 0.4cqw 1cqw rgba(208, 162, 96, 0.12));
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .screen-title {
          font-size: 4.18cqw;
        }

        .counter {
          font-size: 3.48cqw;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="screen shadow-2xl shadow-black/50"
      aria-label="Stone image gallery"
    >
      <a class="top-button back-button" href="#" aria-label="戻る">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M18.1 4.8 7 16l11.1 11.2M8.6 16H29"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.25"
          />
        </svg>
      </a>

      <h1 class="screen-title">Stone Image Gallery</h1>

      <a class="top-button close-button" href="#" aria-label="閉じる">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M6.7 6.7 25.3 25.3M25.3 6.7 6.7 25.3"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2.1"
          />
        </svg>
      </a>

      <p class="counter">1 / 8</p>

      <img
        class="hero-photo"
        src="assets/stn-008-gallery-hero.png"
        alt="翡翠の拡大画像"
      />

      <a class="nav-button prev" href="#" aria-label="前の画像">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="m15.3 4.8-7.6 7.2 7.6 7.2"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.15"
          />
        </svg>
      </a>

      <a class="nav-button next" href="#" aria-label="次の画像">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="m8.7 4.8 7.6 7.2-7.6 7.2"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.15"
          />
        </svg>
      </a>

      <section class="thumb-rail" aria-label="Gallery thumbnails">
        <button class="thumb selected" type="button" aria-label="1枚目">
          <img src="assets/stn-008-thumb-1.png" alt="" />
        </button>
        <button class="thumb" type="button" aria-label="2枚目">
          <img src="assets/stn-008-thumb-2.png" alt="" />
        </button>
        <button class="thumb" type="button" aria-label="3枚目">
          <img src="assets/stn-008-thumb-3.png" alt="" />
        </button>
        <button class="thumb" type="button" aria-label="4枚目">
          <img src="assets/stn-008-thumb-4.png" alt="" />
        </button>
        <button class="thumb" type="button" aria-label="5枚目">
          <img src="assets/stn-008-thumb-5.png" alt="" />
        </button>
        <button class="thumb" type="button" aria-label="6枚目">
          <img src="assets/stn-008-thumb-6.png" alt="" />
        </button>
      </section>
    </main>
  </body>
</html>
