<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMB-004 Change Seal - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #171b1f;
        --copy: #23282d;
        --gold: #b48242;
        --line: #d6ad76;
        --paper: #fbf7f0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe8de;
        color: var(--ink);
        font-family: "Hanko Serif JP", "Hanko Serif", "Times New Roman", serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(118deg, transparent 0 39%, rgba(170, 130, 82, 0.052) 39.2%, transparent 40.5%),
          linear-gradient(132deg, transparent 0 68%, rgba(165, 123, 75, 0.045) 68.2%, transparent 69.4%),
          radial-gradient(ellipse at 50% 9%, rgba(255, 255, 255, 0.86), transparent 34%),
          radial-gradient(ellipse at 46% 73%, rgba(255, 255, 255, 0.7), transparent 44%),
          linear-gradient(126deg, #f3ece4 0%, #fffdf9 43%, #f7efe6 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.34;
        background:
          linear-gradient(154deg, transparent 0 18%, rgba(194, 166, 128, 0.16) 18.15%, transparent 18.8%),
          linear-gradient(146deg, transparent 0 76%, rgba(197, 165, 124, 0.11) 76.1%, transparent 76.8%);
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 60px rgba(124, 96, 68, 0.08);
      }

      .back-button {
        position: absolute;
        z-index: 3;
        top: 8.45%;
        left: 5.2%;
        display: grid;
        width: 4.85cqw;
        height: 4.85cqw;
        place-items: center;
        color: var(--gold);
      }

      .back-button svg {
        width: 100%;
        height: 100%;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 7.62%;
        left: 50%;
        margin: 0;
        color: #111518;
        font-size: 5.35cqw;
        font-weight: 600;
        line-height: 1;
        text-shadow: 0 7px 12px rgba(58, 40, 24, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .ornament {
        position: absolute;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 3.6cqw;
        color: var(--gold);
      }

      .header-ornament {
        top: 12.34%;
        left: 50%;
        transform: translateX(-50%);
      }

      .ornament-line {
        width: 11.8cqw;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 1.9cqw;
        height: 1.9cqw;
        border: 0.36cqw solid currentColor;
        transform: rotate(45deg);
      }

      .card {
        position: absolute;
        z-index: 1;
        border: 0.1cqw solid rgba(226, 213, 201, 0.78);
        border-radius: 2.35cqw;
        background: rgba(255, 255, 255, 0.64);
        box-shadow:
          0 1.45cqw 3.7cqw rgba(83, 61, 43, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(2px);
      }

      .stone-card {
        top: 14.82%;
        left: 7.38%;
        width: 85.3%;
        height: 18.52%;
      }

      .stone-art {
        position: absolute;
        top: 18.6%;
        left: 6.85%;
        width: 36.8%;
        height: auto;
      }

      .stone-title {
        position: absolute;
        top: 18.7%;
        left: 46.4%;
        margin: 0;
        color: #111519;
        font-size: 5.1cqw;
        font-weight: 600;
        line-height: 1.08;
        white-space: nowrap;
      }

      .stone-price {
        position: absolute;
        top: 42.4%;
        left: 46.4%;
        margin: 0;
        color: #4f555a;
        font-size: 4.08cqw;
        line-height: 1;
        white-space: nowrap;
      }

      .stock-pill {
        position: absolute;
        top: 64.6%;
        left: 46.4%;
        display: flex;
        height: 17.2%;
        align-items: center;
        gap: 1.9cqw;
        border-radius: 1.25cqw;
        background: rgba(231, 228, 214, 0.88);
        padding: 0 2.35cqw;
        color: #30383b;
        font-size: 3.03cqw;
        line-height: 1;
        white-space: nowrap;
      }

      .stock-dot {
        width: 1.65cqw;
        height: 1.65cqw;
        border-radius: 999px;
        background: #67915d;
        box-shadow: 0 0 0 0.22cqw rgba(103, 145, 93, 0.1);
      }

      .section-title {
        position: absolute;
        z-index: 2;
        top: 36.62%;
        left: 50%;
        display: flex;
        align-items: center;
        gap: 2.8cqw;
        margin: 0;
        color: #171b1f;
        font-size: 3.95cqw;
        font-weight: 500;
        line-height: 1;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .section-title::before,
      .section-title::after {
        content: "";
        width: 7.35cqw;
        height: 1px;
        background: var(--gold);
      }

      .section-diamond {
        width: 1.55cqw;
        height: 1.55cqw;
        border: 0.32cqw solid var(--gold);
        transform: rotate(45deg);
      }

      .seal-card {
        left: 7.4%;
        width: 85.25%;
        height: 15.1%;
      }

      .seal-card.selected {
        top: 40.86%;
        border-color: var(--gold);
        border-width: 0.18cqw;
        box-shadow:
          0 1.45cqw 3.7cqw rgba(83, 61, 43, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .seal-card.second {
        top: 57.28%;
      }

      .seal-card.third {
        top: 72.8%;
      }

      .seal-preview {
        position: absolute;
        left: 6.75%;
        top: 10.8%;
        width: 26.3%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .second .seal-preview {
        top: 9.8%;
      }

      .third .seal-preview {
        top: 9.5%;
      }

      .seal-copy {
        position: absolute;
        top: 22.5%;
        left: 37.35%;
        color: #171b1f;
      }

      .seal-name {
        margin: 0 0 3.6cqw;
        font-size: 4.35cqw;
        font-weight: 500;
        line-height: 1;
      }

      .seal-row {
        margin: 0.95cqw 0 0;
        color: #2e3439;
        font-size: 3.05cqw;
        line-height: 1;
        white-space: nowrap;
      }

      .seal-row::before {
        content: "";
        display: inline-block;
        width: 1.3cqw;
        height: 1.3cqw;
        margin-right: 1.7cqw;
        border: 0.28cqw solid var(--gold);
        vertical-align: 0.08em;
        transform: rotate(45deg);
      }

      .colon-gap {
        display: inline-block;
        min-width: 3.3cqw;
        text-align: center;
      }

      .choose-icon {
        position: absolute;
        top: 50%;
        right: 7.3%;
        color: var(--gold);
        transform: translateY(-50%);
      }

      .choose-icon svg {
        width: 3.4cqw;
        height: 3.4cqw;
        stroke-width: 1.9;
      }

      .selected-icon {
        display: grid;
        width: 6.8cqw;
        height: 6.8cqw;
        place-items: center;
        border-radius: 999px;
        background: var(--gold);
        color: #fffdf6;
        box-shadow: 0 0.4cqw 1.4cqw rgba(135, 94, 43, 0.18);
      }

      .selected-icon svg {
        width: 4cqw;
        height: 4cqw;
        stroke-width: 2.4;
      }

      .primary-button {
        position: absolute;
        z-index: 2;
        top: 89.84%;
        left: 7.02%;
        display: flex;
        width: 86.05%;
        height: 6.9%;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: #fffaf1;
        font-size: 4.08cqw;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 2px 8px rgba(255, 244, 222, 0.28);
        background:
          radial-gradient(ellipse at 24% 28%, rgba(255, 255, 255, 0.12), transparent 39%),
          linear-gradient(135deg, #242526, #171819 58%, #252626);
        box-shadow:
          0 1.2cqw 3.7cqw rgba(24, 24, 24, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .seal-name {
          margin-bottom: 3.2cqw;
        }

        .seal-row {
          font-size: 2.92cqw;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen shadow-2xl shadow-stone-300/30 md:shadow-stone-300/40" aria-label="印影を変更">
      <a class="back-button" href="#" aria-label="戻る">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M18.2 4.8 7 16l11.2 11.2M8.5 16H29"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.3"
          />
        </svg>
      </a>

      <h1 class="screen-title">印影を変更</h1>
      <div class="ornament header-ornament" aria-hidden="true">
        <span class="ornament-line"></span>
        <span class="ornament-diamond"></span>
        <span class="ornament-line"></span>
      </div>

      <section class="card stone-card" aria-labelledby="stone-heading">
        <img class="stone-art" src="assets/cmb-004-stone.png" alt="翡翠の印材" />
        <h2 id="stone-heading" class="stone-title">翡翠（ひすい）</h2>
        <p class="stone-price">¥128,000（税込）</p>
        <p class="stock-pill"><span class="stock-dot" aria-hidden="true"></span>在庫あり</p>
      </section>

      <h2 class="section-title">
        <span class="section-diamond" aria-hidden="true"></span>
        <span>保存済みの印影から選択</span>
        <span class="section-diamond" aria-hidden="true"></span>
      </h2>

      <article class="card seal-card selected" aria-label="美空を選択中">
        <img class="seal-preview" src="assets/cmb-004-seal-misora.png" alt="美空の印影" />
        <div class="seal-copy">
          <h3 class="seal-name">美空</h3>
          <p class="seal-row">スタイル<span class="colon-gap">：</span>Elegant</p>
          <p class="seal-row">形<span class="colon-gap">：</span>Square</p>
        </div>
        <span class="choose-icon selected-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="m5.4 12.4 4.4 4.4 8.8-9.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      </article>

      <article class="card seal-card second" aria-label="光">
        <img class="seal-preview" src="assets/cmb-004-seal-hikari.png" alt="光の印影" />
        <div class="seal-copy">
          <h3 class="seal-name">光</h3>
          <p class="seal-row">スタイル<span class="colon-gap">：</span>Bold</p>
          <p class="seal-row">形<span class="colon-gap">：</span>Round</p>
        </div>
        <span class="choose-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      </article>

      <article class="card seal-card third" aria-label="心">
        <img class="seal-preview" src="assets/cmb-004-seal-kokoro.png" alt="心の印影" />
        <div class="seal-copy">
          <h3 class="seal-name">心</h3>
          <p class="seal-row">スタイル<span class="colon-gap">：</span>Soft</p>
          <p class="seal-row">形<span class="colon-gap">：</span>Square</p>
        </div>
        <span class="choose-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      </article>

      <a class="primary-button" href="#" aria-label="この印影に変更">この印影に変更</a>
    </main>
  </body>
</html>
