<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERR-001 Network Error - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #10191c;
        --copy: #455762;
        --red: #981113;
        --red-dark: #820e11;
        --gold: #ad7b3e;
        --line: #d5c7b9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dc;
        color: var(--ink);
        font-family:
          "Hanko Serif JP", "Hanko Serif", "Yu Mincho", "Hiragino Mincho ProN",
          serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 50% 8%,
            rgba(255, 255, 255, 0.98),
            transparent 37%
          ),
          radial-gradient(
            ellipse at 50% 57%,
            rgba(255, 255, 255, 0.7),
            transparent 43%
          ),
          radial-gradient(
            ellipse at 50% 93%,
            rgba(255, 255, 255, 0.56),
            transparent 36%
          ),
          linear-gradient(128deg, #f3ede6 0%, #fffdf9 44%, #f7efe8 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.09;
        background:
          linear-gradient(
            152deg,
            transparent 0 18%,
            rgba(171, 132, 88, 0.12) 18.16%,
            transparent 18.85%
          ),
          linear-gradient(
            35deg,
            transparent 0 79%,
            rgba(171, 132, 88, 0.09) 79.12%,
            transparent 79.78%
          );
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 8.4cqw rgba(123, 95, 70, 0.07);
      }

      .brand-title {
        position: absolute;
        z-index: 3;
        top: 8.38%;
        left: 7.18%;
        margin: 0;
        color: #8d1115;
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 7.55cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 0.8cqw 1.8cqw rgba(113, 56, 40, 0.09);
        white-space: nowrap;
      }

      .settings-button {
        position: absolute;
        z-index: 3;
        top: 8.34%;
        right: 6.6%;
        display: grid;
        width: 6.8cqw;
        height: 6.8cqw;
        place-items: center;
        color: var(--gold);
        text-decoration: none;
      }

      .settings-button svg {
        width: 100%;
        height: 100%;
      }

      .error-card {
        position: absolute;
        z-index: 2;
        top: 15.08%;
        left: 5.42%;
        width: 89.16%;
        height: 63.86%;
        border: 0.1cqw solid rgba(215, 206, 196, 0.8);
        border-radius: 3cqw;
        background:
          radial-gradient(
            ellipse at 52% 20%,
            rgba(255, 255, 255, 0.64),
            transparent 43%
          ),
          linear-gradient(180deg, rgba(255, 253, 249, 0.9), #fffdf9 100%);
        box-shadow:
          0 2.8cqw 7.4cqw rgba(90, 65, 42, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .illustration {
        position: absolute;
        z-index: 3;
        top: 19.15%;
        left: 27.1%;
        width: 45.7%;
        height: auto;
        mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 7%,
          #000 93%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0,
          #000 7%,
          #000 93%,
          transparent 100%
        );
      }

      .divider {
        position: absolute;
        z-index: 3;
        top: 42.65%;
        left: 50%;
        display: flex;
        width: 28.7cqw;
        align-items: center;
        justify-content: space-between;
        color: var(--gold);
        transform: translateX(-50%);
      }

      .divider-line {
        width: 10.15cqw;
        height: 0.15cqw;
        background: currentColor;
      }

      .divider-diamond {
        width: 2.05cqw;
        height: 2.05cqw;
        border: 0.34cqw solid currentColor;
        transform: rotate(45deg);
      }

      .error-title {
        position: absolute;
        z-index: 3;
        top: 45.54%;
        left: 50%;
        margin: 0;
        color: #111a1d;
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 8.52cqw;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .error-copy {
        position: absolute;
        z-index: 3;
        top: 51.84%;
        left: 50%;
        width: 62%;
        margin: 0;
        color: var(--copy);
        font-family:
          "Hanko Sans",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 3.28cqw;
        font-weight: 400;
        line-height: 1.55;
        text-align: center;
        transform: translateX(-50%);
      }

      .primary-action,
      .secondary-action {
        position: absolute;
        z-index: 3;
        left: 13.96%;
        display: grid;
        width: 72.18%;
        place-items: center;
        border-radius: 1.65cqw;
        text-decoration: none;
        white-space: nowrap;
      }

      .primary-action {
        top: 62.6%;
        height: 5.78%;
        background:
          radial-gradient(
            ellipse at 49% 18%,
            rgba(199, 58, 48, 0.35),
            transparent 43%
          ),
          linear-gradient(90deg, var(--red) 0%, #a51416 54%, var(--red-dark));
        box-shadow:
          0 1.95cqw 4.6cqw rgba(111, 19, 17, 0.17),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        color: #fff9f2;
        font-size: 4cqw;
        line-height: 1;
      }

      .primary-action svg {
        position: absolute;
        right: 4.58cqw;
        width: 4.25cqw;
        height: 4.25cqw;
      }

      .secondary-action {
        top: 69.98%;
        height: 5.78%;
        border: 0.12cqw solid rgba(173, 123, 62, 0.86);
        background: rgba(255, 253, 249, 0.5);
        color: #a47435;
        font-size: 4.26cqw;
        line-height: 1;
      }

      .tip-card {
        position: absolute;
        z-index: 2;
        top: 81.24%;
        left: 13.74%;
        display: grid;
        width: 72.56%;
        height: 10.82%;
        grid-template-columns: 18cqw 0.1cqw 1fr;
        align-items: center;
        border: 0.1cqw solid rgba(220, 211, 200, 0.78);
        border-radius: 2cqw;
        background: rgba(255, 253, 249, 0.88);
        box-shadow:
          0 2cqw 4.8cqw rgba(91, 65, 41, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .tip-icon {
        width: 13.82cqw;
        height: 13.82cqw;
        justify-self: center;
        border-radius: 999px;
      }

      .tip-rule {
        width: 0.12cqw;
        height: 57%;
        background: rgba(172, 123, 62, 0.8);
      }

      .tip-copy {
        padding-left: 3.92cqw;
      }

      .tip-label {
        display: block;
        color: var(--gold);
        font-size: 3.24cqw;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 1.76cqw;
      }

      .tip-text {
        display: block;
        color: var(--copy);
        font-family:
          "Hanko Sans",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 3.05cqw;
        font-weight: 400;
        line-height: 1.6;
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .brand-title {
          font-size: 7.1cqw;
        }

        .error-title {
          font-size: 7.92cqw;
        }

        .error-copy {
          width: 68%;
          font-size: 3.36cqw;
        }

        .tip-text {
          font-size: 2.82cqw;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="screen shadow-2xl shadow-stone-300/50"
      aria-label="Network error"
    >
      <h1 class="brand-title">Stone Signature</h1>

      <a class="settings-button" href="#" aria-label="Settings">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M17.7 3.4h-3.4l-1 4.2a9 9 0 0 0-2.4 1L7.2 6.4 4.8 8.8l2.3 3.7a9 9 0 0 0-1 2.4l-4.2 1v3.4l4.2 1a9 9 0 0 0 1 2.4l-2.3 3.7 2.4 2.4 3.7-2.3a9 9 0 0 0 2.4 1l1 4.2h3.4l1-4.2a9 9 0 0 0 2.4-1l3.7 2.3 2.4-2.4-2.3-3.7a9 9 0 0 0 1-2.4l4.2-1v-3.4l-4.2-1a9 9 0 0 0-1-2.4l2.3-3.7-2.4-2.4-3.7 2.3a9 9 0 0 0-2.4-1l-1-4.2Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
            stroke-width="1.7"
          />
          <circle
            cx="16"
            cy="17.6"
            r="4.1"
            fill="none"
            stroke="currentColor"
            stroke-width="1.7"
          />
        </svg>
      </a>

      <section class="error-card" aria-labelledby="error-title"></section>

      <img
        class="illustration"
        src="assets/err-001-network-illustration.png"
        alt="Network connection error"
      />

      <div class="divider" aria-hidden="true">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line"></span>
      </div>

      <h2 id="error-title" class="error-title">Network Error</h2>

      <p class="error-copy">
        We’re unable to connect to the server. Please check your internet
        connection and try again.
      </p>

      <a class="primary-action" href="#">
        <span>Try Again</span>
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M4.2 16h22.4M18 7.4 26.6 16 18 24.6"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.75"
          />
        </svg>
      </a>

      <a class="secondary-action" href="#">Go Back</a>

      <aside class="tip-card" aria-label="Connection tip">
        <img class="tip-icon" src="assets/err-001-tip-icon.png" alt="" />
        <span class="tip-rule" aria-hidden="true"></span>
        <p class="tip-copy">
          <span class="tip-label">Tip:</span>
          <span class="tip-text">
            Check your Wi-Fi connection or<br />
            switch to mobile data.
          </span>
        </p>
      </aside>
    </main>
  </body>
</html>
