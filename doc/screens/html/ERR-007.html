<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERR-007 Error - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #1d252a;
        --copy: #59656d;
        --wine: #921418;
        --wine-dark: #7d1013;
        --gold: #aa6b22;
        --line: #d8b17d;
        --paper: #fffaf4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 28% 2%, rgba(255, 255, 255, 0.9) 0 18%, transparent 45%),
          radial-gradient(circle at 80% 86%, rgba(212, 179, 132, 0.24), transparent 36%),
          linear-gradient(135deg, #f2e7dd 0%, #fffdf9 44%, #f5ebe1 100%);
      }

      .phone {
        position: relative;
        width: min(100vw, 470.5px);
        min-height: min(100vh, 836px);
        aspect-ratio: 941 / 1672;
        overflow: hidden;
        background:
          radial-gradient(circle at 51% 8%, rgba(255, 255, 255, 0.95) 0 22%, transparent 56%),
          radial-gradient(circle at 32% 54%, rgba(255, 255, 255, 0.72) 0 19%, transparent 53%),
          radial-gradient(circle at 74% 92%, rgba(225, 199, 166, 0.24) 0 18%, transparent 42%),
          linear-gradient(137deg, #f4ebe2 0%, #fffdf9 45%, #f6ece2 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      .phone::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -42px;
        width: 255px;
        height: 245px;
        opacity: 0.25;
        background:
          linear-gradient(142deg, transparent 0 42%, rgba(172, 122, 72, 0.22) 43% 44%, transparent 45%),
          linear-gradient(28deg, transparent 0 58%, rgba(172, 122, 72, 0.18) 59% 60%, transparent 61%),
          radial-gradient(ellipse at 56% 55%, rgba(183, 143, 95, 0.16), transparent 58%);
        transform: rotate(-8deg);
        pointer-events: none;
      }

      .serif {
        font-family: "Bodoni 72", "Cormorant Garamond", "Times New Roman", serif;
      }

      .brand {
        position: absolute;
        top: 63px;
        left: 30px;
        z-index: 1;
        color: var(--wine-dark);
        font-size: 35px;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 10px 18px rgba(111, 57, 41, 0.08);
      }

      .settings-button {
        position: absolute;
        top: 66px;
        right: 30px;
        z-index: 1;
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        color: var(--gold);
      }

      .settings-button svg {
        width: 31px;
        height: 31px;
        stroke-width: 1.7;
      }

      .error-card {
        position: absolute;
        top: 129px;
        left: 27px;
        z-index: 1;
        width: 417px;
        height: 507px;
        border: 1px solid rgba(229, 220, 211, 0.88);
        border-radius: 16px;
        background:
          radial-gradient(circle at 49% 18%, rgba(244, 229, 210, 0.17), transparent 36%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(255, 251, 247, 0.9));
        box-shadow:
          0 16px 34px rgba(93, 65, 45, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(2px);
      }

      .error-art {
        position: absolute;
        top: 31px;
        left: 50%;
        width: 250px;
        height: 175px;
        object-fit: cover;
        transform: translateX(-50%);
        mix-blend-mode: multiply;
        -webkit-mask-image: radial-gradient(ellipse at center, #000 0 64%, rgba(0, 0, 0, 0.72) 76%, transparent 91%);
        mask-image: radial-gradient(ellipse at center, #000 0 64%, rgba(0, 0, 0, 0.72) 76%, transparent 91%);
      }

      .ornament {
        position: absolute;
        top: 219px;
        left: 50%;
        display: flex;
        align-items: center;
        gap: 15px;
        color: var(--gold);
        transform: translateX(-50%);
      }

      .ornament-line {
        width: 46px;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 8px;
        height: 8px;
        border: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .title {
        position: absolute;
        top: 250px;
        left: 0;
        width: 100%;
        margin: 0;
        color: var(--ink);
        font-size: 32px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-shadow: 0 10px 22px rgba(60, 42, 31, 0.08);
      }

      .message {
        position: absolute;
        top: 292px;
        left: 62px;
        right: 62px;
        margin: 0;
        color: var(--copy);
        font-size: 15.5px;
        line-height: 1.72;
        text-align: center;
      }

      .button {
        position: absolute;
        left: 37px;
        width: 341px;
        height: 47px;
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr) 52px;
        align-items: center;
        border-radius: 7px;
        text-decoration: none;
      }

      .button.primary {
        top: 377px;
        color: #fff8f2;
        background:
          radial-gradient(circle at 50% -12%, rgba(255, 255, 255, 0.16), transparent 38%),
          linear-gradient(135deg, var(--wine-dark) 0%, #a0181b 56%, #861113 100%);
        box-shadow:
          0 10px 18px rgba(115, 15, 15, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      .button.secondary {
        top: 435px;
        color: var(--gold);
        border: 1px solid rgba(178, 113, 36, 0.9);
        background: rgba(255, 252, 248, 0.36);
      }

      .button-label {
        justify-self: center;
        color: currentColor;
        font-family: "Bodoni 72", "Cormorant Garamond", "Times New Roman", serif;
        font-size: 19px;
        font-weight: 500;
        line-height: 1;
      }

      .button-arrow {
        justify-self: center;
        width: 25px;
        height: 25px;
        color: currentColor;
        stroke-width: 1.75;
      }

      .notice-card {
        position: absolute;
        top: 657px;
        left: 63px;
        z-index: 1;
        width: 345px;
        height: 119px;
        display: grid;
        grid-template-columns: 65px 1px minmax(0, 1fr);
        align-items: center;
        column-gap: 18px;
        border: 1px solid rgba(229, 220, 211, 0.88);
        border-radius: 14px;
        background:
          radial-gradient(circle at 70% 36%, rgba(255, 255, 255, 0.8), transparent 40%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.76), rgba(255, 251, 247, 0.9));
        box-shadow:
          0 12px 26px rgba(91, 63, 43, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(2px);
      }

      .notice-icon-wrap {
        display: grid;
        width: 61px;
        height: 61px;
        margin-left: 14px;
        place-items: center;
        border-radius: 999px;
        background: radial-gradient(circle at 42% 40%, rgba(255, 255, 255, 0.86), rgba(244, 236, 227, 0.96));
      }

      .notice-icon {
        width: 37px;
        height: 37px;
        color: #87561d;
        stroke-width: 1.8;
      }

      .notice-divider {
        height: 85px;
        background: rgba(176, 111, 34, 0.92);
      }

      .notice-title {
        margin: 0 0 10px;
        color: var(--gold);
        font-family: "Bodoni 72", "Cormorant Garamond", "Times New Roman", serif;
        font-size: 18px;
        font-weight: 600;
        line-height: 1;
      }

      .notice-content {
        width: 216px;
      }

      .notice-copy {
        margin: 0;
        color: var(--copy);
        font-size: 13.6px;
        line-height: 1.65;
      }

      @media (max-width: 420px) {
        .brand {
          top: 64px;
          left: 24px;
          font-size: 31px;
        }

        .settings-button {
          top: 64px;
          right: 24px;
        }

        .error-card {
          left: 22px;
          width: calc(100% - 44px);
          height: 500px;
        }

        .error-art {
          top: 30px;
          width: 232px;
          height: 162px;
        }

        .ornament {
          top: 212px;
        }

        .ornament-line {
          width: 40px;
        }

        .title {
          top: 241px;
          font-size: 29px;
        }

        .message {
          top: 292px;
          left: 42px;
          right: 42px;
          font-size: 14.2px;
        }

        .button {
          left: 32px;
          width: calc(100% - 64px);
          height: 46px;
          grid-template-columns: 44px minmax(0, 1fr) 44px;
        }

        .button.primary {
          top: 372px;
        }

        .button.secondary {
          top: 429px;
        }

        .button-label {
          font-size: 18px;
        }

        .notice-card {
          top: 655px;
          left: 50px;
          width: calc(100% - 100px);
          grid-template-columns: 60px 1px minmax(0, 1fr);
          column-gap: 14px;
        }

        .notice-icon-wrap {
          width: 56px;
          height: 56px;
          margin-left: 6px;
        }

        .notice-icon {
          width: 33px;
          height: 33px;
        }

        .notice-title {
          font-size: 15.5px;
        }

        .notice-copy {
          font-size: 11.3px;
          line-height: 1.7;
        }

        .notice-content {
          width: 200px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-center">
    <main class="phone shadow-2xl shadow-stone-300/30" aria-label="Unexpected error screen preview">
      <div class="brand serif">Stone Signature</div>
      <a class="settings-button" href="#" aria-label="Settings">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="m13.7 3.2-.8 3.8a9.7 9.7 0 0 0-2.2.9L7.3 5.8 5.1 8.1l2.1 3.3a9 9 0 0 0-.9 2.2l-3.8.8v3.2l3.8.8c.2.8.5 1.5.9 2.2l-2.1 3.3 2.2 2.3 3.4-2.1c.7.4 1.4.7 2.2.9l.8 3.8h3.2l.8-3.8c.8-.2 1.5-.5 2.2-.9l3.4 2.1 2.2-2.3-2.1-3.3c.4-.7.7-1.4.9-2.2l3.8-.8v-3.2l-3.8-.8a9 9 0 0 0-.9-2.2l2.1-3.3-2.2-2.3-3.4 2.1a9.7 9.7 0 0 0-2.2-.9l-.8-3.8Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
          />
          <circle cx="15.3" cy="16" r="4.1" fill="none" stroke="currentColor" />
        </svg>
      </a>

      <section class="error-card" aria-label="Something went wrong">
        <img class="error-art" src="assets/err-007-error-emblem.png" alt="" />

        <div class="ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>

        <h1 class="title serif">Something Went Wrong</h1>
        <p class="message">
          An unexpected error occurred.<br />
          Please try again. If the problem<br />
          persists, return home.
        </p>

        <a class="button primary" href="#" aria-label="Try Again">
          <span></span>
          <span class="button-label">Try Again</span>
          <svg class="button-arrow" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M4.8 16h21.5M17.9 7.6l8.4 8.4-8.4 8.4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>

        <a class="button secondary" href="#" aria-label="Back Home">
          <span></span>
          <span class="button-label">Back Home</span>
          <span></span>
        </a>
      </section>

      <section class="notice-card" aria-label="Notification status">
        <div class="notice-icon-wrap">
          <svg class="notice-icon" viewBox="0 0 32 32" aria-hidden="true">
            <path
              d="M7.4 18.8v-4.2a8.6 8.6 0 0 1 17.2 0v4.2M7.4 18.8H5.2a2.2 2.2 0 0 1-2.2-2.2v-2a2.2 2.2 0 0 1 2.2-2.2h2.2m17.2 6.4h2.2a2.2 2.2 0 0 0 2.2-2.2v-2a2.2 2.2 0 0 0-2.2-2.2h-2.2M20.5 24.6h-2.7a2.1 2.1 0 0 1-2-1.5"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="16" cy="23" r="1.8" fill="none" stroke="currentColor" />
            <path d="M24.5 5.3v5M22 7.8h5" fill="none" stroke="currentColor" stroke-linecap="round" />
          </svg>
        </div>
        <div class="notice-divider" aria-hidden="true"></div>
        <div class="notice-content">
          <h2 class="notice-title">We&rsquo;ve Been Notified</h2>
          <p class="notice-copy">
            Our team has been notified and is<br />
            working to resolve the issue.<br />
            Please try again in a few moments.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
