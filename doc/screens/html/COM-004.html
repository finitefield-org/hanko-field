<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COM-004 Settings - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #171b1f;
        --muted: #6e7075;
        --wine: #971819;
        --gold: #b27a2b;
        --line: #eee4d8;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 11%, rgba(255, 255, 255, 0.92) 0 26%, transparent 58%),
          linear-gradient(135deg, #f1e8de 0%, #fffdf9 42%, #f4ece3 100%);
      }

      .phone {
        width: min(100vw, 431.5px);
        min-height: min(100vh, 911px);
        aspect-ratio: 863 / 1822;
        overflow: hidden;
        position: relative;
        font-family: "Times New Roman", Times, serif;
        background:
          radial-gradient(circle at 50% 9%, rgba(255, 255, 255, 0.94) 0 23%, transparent 58%),
          radial-gradient(circle at 48% 47%, rgba(255, 255, 255, 0.62) 0 24%, transparent 58%),
          radial-gradient(circle at 50% 86%, rgba(255, 255, 255, 0.68) 0 24%, transparent 61%),
          linear-gradient(136deg, #f2e9df 0%, #fffdf9 45%, #f5ece2 100%);
      }

      .topbar {
        height: 119px;
        position: relative;
      }

      .back-button {
        position: absolute;
        top: 65px;
        left: 27px;
        display: grid;
        width: 25px;
        height: 20px;
        place-items: center;
        color: var(--wine);
      }

      .screen-title {
        color: var(--wine);
        font-size: 29px;
        line-height: 1;
        font-weight: 500;
        letter-spacing: 0;
        text-align: center;
        padding-top: 61px;
        text-shadow: 0 8px 15px rgba(112, 65, 41, 0.08);
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 17px 24px 0;
      }

      .settings-card {
        overflow: hidden;
        border: 0.7px solid rgba(231, 218, 206, 0.95);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.54);
        box-shadow:
          0 1px 1px rgba(117, 82, 54, 0.02),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(2px);
      }

      .settings-row {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        min-height: 84px;
        column-gap: 14px;
        padding: 0 16px 0 24px;
        position: relative;
      }

      .settings-row + .settings-row::before {
        content: "";
        position: absolute;
        top: 0;
        left: 16px;
        right: 16px;
        height: 1px;
        background: var(--line);
      }

      .icon {
        width: 29px;
        height: 29px;
        color: var(--wine);
        justify-self: start;
        stroke-width: 1.7;
      }

      .icon-wide {
        width: 31px;
      }

      .row-label {
        min-width: 0;
        font-size: 20px;
        line-height: 1.18;
        font-weight: 400;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .row-value {
        margin-right: 19px;
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 1;
        font-weight: 600;
        color: var(--muted);
        white-space: nowrap;
      }

      .version-value {
        margin-right: 0;
        font-size: 14px;
        transform: translateY(1px);
      }

      .chevron {
        width: 14px;
        height: 14px;
        color: var(--gold);
        stroke-width: 2.3;
      }

      @media (max-width: 390px) {
        .topbar {
          height: 113px;
        }

        .content {
          gap: 20px;
          padding: 14px 20px 0;
        }

        .settings-row {
          grid-template-columns: 39px minmax(0, 1fr) auto;
          column-gap: 12px;
          min-height: 76px;
          padding-left: 22px;
        }

        .icon {
          width: 27px;
          height: 27px;
        }

        .icon-wide {
          width: 29px;
        }

        .row-label {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-center">
    <main class="phone shadow-2xl shadow-stone-300/30" aria-label="Settings screen preview">
      <header class="topbar">
        <a class="back-button" href="#" aria-label="Back">
          <svg viewBox="0 0 28 24" aria-hidden="true">
            <path
              d="M12.2 3.5 3.6 12l8.6 8.5M4.6 12H26"

              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"

        <h1 class="screen-title">Settings</h1>

      <section class="content" aria-label="Settings options">
        <div class="settings-card">
          <a class="settings-row" href="#" aria-label="Language English">

              <path d="M7.1 7.4c4.8 2.1 12.9 2.1 17.8 0M7.1 24.6c4.8-2.1 12.9-2.1 17.8 0" fill="none" stroke="currentColor" />
            </svg>

            <span class="flex items-center">
              <span class="row-value">English</span>
              <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
                <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
          </a>
        </div>

        <div class="settings-card">
          <a class="settings-row" href="#">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" />
              <path d="M16 14.1v9.2" fill="none" stroke="currentColor" stroke-linecap="round" />
              <path d="M16 8.7h.1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3.1" />
            </svg>
            <span class="row-label">About</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">

          </a>

          <a class="settings-row" href="#">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <path
                d="M7.4 17.5c6-1.7 8.2-4.4 9.8-11.7 1.4 7 3.7 9.9 10 11.7-6.2 1.7-8.6 4.9-10 11.9-1.6-7.3-3.8-10.3-9.8-11.9Z"
                fill="none"

              <path

                fill="none"
                stroke="currentColor"
                stroke-linejoin="round"
              />
            </svg>
            <span class="row-label">How It Works</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
              <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>

          <a class="settings-row" href="#">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" />
              <path
                d="M11.7 12c0-2.4 1.9-4.2 4.4-4.2 2.7 0 4.4 1.8 4.4 4 0 1.7-.8 2.8-2.4 3.9-1.6 1-2.1 1.8-2.1 3.5"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
              />
              <path d="M16 23.8h.1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="3.1" />
            </svg>
            <span class="row-label">FAQ</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
              <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>

          <a class="settings-row" href="#">
            <svg class="icon icon-wide" viewBox="0 0 32 32" aria-hidden="true">
              <rect x="4.8" y="8.5" width="23" height="17" rx="1.3" fill="none" stroke="currentColor" />
              <path d="m5.7 10.2 10.6 8.3 10.5-8.3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="row-label">Contact</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
              <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
        </div>

        <div class="settings-card">
          <a class="settings-row" href="#">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M16 3.9c3.7 2.6 7 3.5 10.5 4.1v6.8c0 7.3-4.2 11.5-10.5 14-6.3-2.5-10.5-6.7-10.5-14V8c3.6-.6 6.9-1.5 10.5-4.1Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
              <rect x="11.8" y="15.1" width="8.4" height="7.6" rx="0.8" fill="none" stroke="currentColor" />
              <path d="M13.4 15.1v-2.7a2.6 2.6 0 0 1 5.2 0v2.7M16 18.7v1.8" fill="none" stroke="currentColor" stroke-linecap="round" />
            </svg>
            <span class="row-label">Privacy Policy</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
              <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>

          <a class="settings-row" href="#">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M9 4.8h10.8L26 11v17.1H9Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
              <path d="M19.8 5v6.2H26M13.3 16h2.4M13.3 20.5h8.5M13.3 24.5h8.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="row-label">Terms of Service</span>
            <svg class="chevron" viewBox="0 0 14 22" aria-hidden="true">
              <path d="m2 2 8.5 9L2 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
        </div>

        <div class="settings-card">
          <div class="settings-row">
            <svg class="icon" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M5 20.4 16 26l11-5.6M5 15.6 16 21.2l11-5.6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M5 10.7 16 5l11 5.7-11 5.7Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="row-label">App Version</span>
            <span class="row-value version-value">1.2.0 (45)</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
