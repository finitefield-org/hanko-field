<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CHK-003 Contact Information - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #12161a;
        --copy: #3f4850;
        --muted: #8b9096;
        --wine: #8d1116;
        --gold: #ad762d;
        --line: #eadacc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 13%, rgba(255, 255, 255, 0.94) 0 24%, transparent 57%),
          linear-gradient(135deg, #f1e8de 0%, #fffdf9 42%, #f4ece3 100%);
      }

      .phone {
        --side: clamp(38px, 8vw, 38px);
        position: relative;
        width: min(100vw, 470.5px);
        min-height: min(100vh, 836px);
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.96) 0 27%, transparent 60%),
          radial-gradient(circle at 43% 47%, rgba(255, 255, 255, 0.7) 0 25%, transparent 63%),
          radial-gradient(circle at 58% 88%, rgba(255, 255, 255, 0.66) 0 26%, transparent 62%),
          linear-gradient(136deg, #f3eae1 0%, #fffdf9 44%, #f6eee5 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      .phone::after {
        content: "";
        position: absolute;
        right: -36px;
        bottom: -4px;
        width: 188px;
        height: 188px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 40% 35%, rgba(189, 139, 81, 0.1), transparent 28%),
          radial-gradient(circle at 53% 57%, transparent 0 43%, rgba(194, 151, 98, 0.08) 44% 45%, transparent 47%);
        opacity: 0.48;
        transform: rotate(-26deg);
        pointer-events: none;
      }

      .hero {
        position: relative;
        height: 254px;
        text-align: center;
      }

      .back-button {
        position: absolute;
        top: 74px;
        left: 31px;
        z-index: 2;
        display: grid;
        width: 30px;
        height: 25px;
        place-items: center;
        color: var(--wine);
      }

      .back-button svg {
        width: 27px;
        height: 23px;
      }

      .screen-title {
        margin: 0;
        padding-top: 114px;
        color: #811115;
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko Serif", "Times New Roman", serif;
        font-size: clamp(36px, 10.3vw, 48px);
        font-weight: 600;
        line-height: 0.95;
        text-shadow: 0 10px 17px rgba(112, 65, 41, 0.08);
        white-space: nowrap;
      }

      .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 17px;
        margin-top: 29px;
        color: var(--gold);
      }

      .ornament-line {
        width: 50px;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 10px;
        height: 10px;
        border: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .lede {
        width: 330px;
        margin: 24px auto 0;
        color: #3d464e;
        font-size: 13.5px;
        line-height: 1.55;
      }

      .form {
        position: relative;
        z-index: 1;
        margin: 10px var(--side) 0;
      }

      .field-card {
        display: grid;
        height: 80px;
        grid-template-columns: 68px minmax(0, 1fr);
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.56);
        box-shadow:
          0 9px 18px rgba(76, 51, 34, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .field-card + .field-card {
        margin-top: 19px;
      }

      .field-icon {
        width: 28px;
        height: 28px;
        justify-self: center;
        color: var(--wine);
        stroke-width: 1.65;
      }

      .field-content {
        min-width: 0;
        padding-right: 22px;
      }

      .field-label {
        display: block;
        color: var(--gold);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.09em;
        line-height: 1;
        text-transform: uppercase;
      }

      .control {
        width: 100%;
        min-width: 0;
        margin-top: 15px;
        padding: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--muted);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.2;
      }

      .control::placeholder {
        color: var(--muted);
        opacity: 1;
      }

      .info-note {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 57px minmax(0, 1fr);
        align-items: center;
        gap: 17px;
        margin: 29px 48px 0;
      }

      .info-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 999px;
        background: radial-gradient(circle at 43% 38%, rgba(255, 255, 255, 0.64), rgba(241, 230, 218, 0.96));
        color: var(--gold);
      }

      .info-mark svg {
        width: 21px;
        height: 21px;
        stroke-width: 1.55;
      }

      .info-note p {
        margin: 0;
        color: #364047;
        font-size: 12.4px;
        line-height: 1.45;
      }

      .save-button {
        position: relative;
        z-index: 1;
        display: grid;
        height: 67px;
        grid-template-columns: 98px minmax(0, 1fr) 72px;
        align-items: center;
        margin: 31px 50px 0;
        border-radius: 10px;
        background:
          radial-gradient(circle at 15% 24%, rgba(190, 31, 34, 0.54), transparent 42%),
          linear-gradient(135deg, #9c1115 0%, #821013 100%);
        color: #fff;
        box-shadow:
          0 8px 17px rgba(99, 46, 27, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.13);
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko Serif", "Times New Roman", serif;
        font-size: 25px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .button-seal {
        position: relative;
        display: grid;
        width: 45px;
        height: 45px;
        justify-self: end;
        place-items: center;
        border: 1px solid rgba(219, 172, 92, 0.78);
        border-radius: 999px;
        color: #d8ae65;
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko Serif", "Times New Roman", serif;
        font-size: 33px;
        line-height: 0.8;
        text-shadow: 0 1px 0 #5d240d;
      }

      .button-seal::before,
      .button-seal::after {
        content: "✦";
        position: absolute;
        color: #e1bf76;
        font-size: 10px;
        line-height: 1;
      }

      .button-seal::before {
        right: 8px;
        top: 11px;
      }

      .button-seal::after {
        bottom: 8px;
        left: 8px;
        font-size: 8px;
      }

      .button-text {
        justify-self: center;
      }

      .save-button svg {
        width: 27px;
        height: 27px;
        justify-self: center;
        color: #fff;
        stroke-width: 1.7;
      }

      .secure-note {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 25px;
        margin: 27px var(--side) 0;
        color: #3d464e;
      }

      .secure-note svg {
        width: 29px;
        height: 31px;
        flex: 0 0 auto;
        color: var(--gold);
        stroke-width: 1.45;
      }

      .secure-note p {
        margin: 0;
        max-width: 190px;
        font-size: 12.5px;
        line-height: 1.43;
      }

      @media (max-width: 390px) {
        .phone {
          --side: 31px;
        }

        .hero {
          height: 260px;
        }

        .back-button {
          top: 72px;
          left: 27px;
        }

        .screen-title {
          padding-top: 112px;
          font-size: 39px;
        }

        .ornament {
          margin-top: 27px;
        }

        .ornament-line {
          width: 45px;
        }

        .lede {
          width: 330px;
          margin-top: 22px;
          font-size: 12.4px;
          line-height: 1.48;
        }

        .form {
          margin-top: 10px;
        }

        .field-card {
          height: 76px;
          grid-template-columns: 61px minmax(0, 1fr);
        }

        .field-card + .field-card {
          margin-top: 17px;
        }

        .field-icon {
          width: 25px;
          height: 25px;
        }

        .field-label {
          font-size: 10px;
        }

        .control {
          margin-top: 13px;
          font-size: 14.7px;
        }

        .info-note {
          grid-template-columns: 50px minmax(0, 1fr);
          gap: 14px;
          margin: 26px 42px 0;
        }

        .info-mark {
          width: 39px;
          height: 39px;
        }

        .info-note p {
          font-size: 11.3px;
        }

        .save-button {
          height: 61px;
          grid-template-columns: 78px minmax(0, 1fr) 58px;
          margin: 28px 40px 0;
          font-size: 23px;
        }

        .button-seal {
          width: 40px;
          height: 40px;
          font-size: 29px;
        }

        .secure-note {
          gap: 20px;
          margin-top: 24px;
        }

        .secure-note p {
          max-width: 174px;
          font-size: 11.6px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-center">
    <svg aria-hidden="true" class="hidden">
      <symbol id="icon-arrow-left" viewBox="0 0 28 24">
        <path d="M12.2 3.5 3.6 12l8.6 8.5M4.6 12H26" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
      </symbol>
      <symbol id="icon-mail" viewBox="0 0 24 24">
        <path d="M4.2 6.2h15.6v11.6H4.2Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
        <path d="m4.6 6.8 7.4 6 7.4-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-user" viewBox="0 0 24 24">
        <path d="M12 12.3a4.3 4.3 0 1 0 0-8.6 4.3 4.3 0 0 0 0 8.6Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M4.2 20.3c.8-4.2 3.6-6.3 7.8-6.3s7 2.1 7.8 6.3" fill="none" stroke="currentColor" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-phone-device" viewBox="0 0 24 24">
        <path d="M8.2 3.5h7.6c1.1 0 1.9.8 1.9 1.9v13.2c0 1.1-.8 1.9-1.9 1.9H8.2c-1.1 0-1.9-.8-1.9-1.9V5.4c0-1.1.8-1.9 1.9-1.9Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
        <path d="M10.6 5.6h2.8M11 18.1h2" fill="none" stroke="currentColor" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-info" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" />
        <path d="M12 10.8v5.4M12 7.2h.1" fill="none" stroke="currentColor" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-arrow-right" viewBox="0 0 24 24">
        <path d="M4.4 12h14.8M13.5 5.6l6.4 6.4-6.4 6.4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-shield-lock" viewBox="0 0 24 24">
        <path d="M12 2.9 19 5.7v5.8c0 4.3-2.7 8-7 9.6-4.3-1.6-7-5.3-7-9.6V5.7Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
        <path d="M9.3 12h5.4v4.2H9.3Z" fill="none" stroke="currentColor" stroke-linejoin="round" />
        <path d="M10.2 12v-1.3a1.8 1.8 0 1 1 3.6 0V12" fill="none" stroke="currentColor" stroke-linecap="round" />
      </symbol>
    </svg>

    <main class="phone shadow-2xl shadow-stone-300/30" aria-label="Contact Information screen preview">
      <header class="hero">
        <a class="back-button" href="#" aria-label="Back">
          <svg aria-hidden="true"><use href="#icon-arrow-left" /></svg>
        </a>
        <h1 class="screen-title">Contact Information</h1>
        <div class="ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>
        <p class="lede">Please provide your contact details so we can send you order updates and important notifications.</p>
      </header>

      <form class="form" aria-label="Contact information form">
        <label class="field-card" for="email">
          <svg class="field-icon" aria-hidden="true"><use href="#icon-mail" /></svg>
          <span class="field-content">
            <span class="field-label">Email Address</span>
            <input class="control" id="email" name="email" type="email" placeholder="you@example.com" />
          </span>
        </label>

        <label class="field-card" for="full-name">
          <svg class="field-icon" aria-hidden="true"><use href="#icon-user" /></svg>
          <span class="field-content">
            <span class="field-label">Full Name</span>
            <input class="control" id="full-name" name="full-name" type="text" placeholder="Enter your full name" />
          </span>
        </label>

        <label class="field-card" for="phone">
          <svg class="field-icon" aria-hidden="true"><use href="#icon-phone-device" /></svg>
          <span class="field-content">
            <span class="field-label">Phone Number</span>
            <input class="control" id="phone" name="phone" type="tel" placeholder="e.g. +1 (555) 123-4567" />
          </span>
        </label>
      </form>

      <aside class="info-note" aria-label="Contact usage note">
        <span class="info-mark" aria-hidden="true">
          <svg><use href="#icon-info" /></svg>
        </span>
        <p>We'll use your email to send order updates, design confirmations, and important notifications.</p>
      </aside>

      <a class="save-button" href="#" aria-label="Save contact">
        <span class="button-seal" aria-hidden="true">S</span>
        <span class="button-text">Save Contact</span>
        <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
      </a>

      <aside class="secure-note" aria-label="Security note">
        <svg aria-hidden="true"><use href="#icon-shield-lock" /></svg>
        <p>Your information is secure<br />and never shared.</p>
      </aside>
    </main>
  </body>
</html>
