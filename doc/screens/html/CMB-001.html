<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMB-001 Order Confirmation - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #171b1f;
        --soft-ink: #40464c;
        --gold: #b48242;
        --line: #d6ad76;
        --paper: #fbf7f0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe8de;
        color: var(--ink);
        font-family: "Hanko Serif JP", "Hanko Serif", "Times New Roman", serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(118deg, transparent 0 38%, rgba(170, 130, 82, 0.055) 38.3%, transparent 40%),
          linear-gradient(133deg, transparent 0 68%, rgba(165, 123, 75, 0.045) 68.2%, transparent 69.2%),
          radial-gradient(ellipse at 48% 9%, rgba(255, 255, 255, 0.82), transparent 34%),
          radial-gradient(ellipse at 45% 72%, rgba(255, 255, 255, 0.72), transparent 43%),
          linear-gradient(126deg, #f3ece4 0%, #fffdf9 42%, #f7efe6 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.34;
        background:
          linear-gradient(154deg, transparent 0 18%, rgba(194, 166, 128, 0.16) 18.15%, transparent 18.8%),
          linear-gradient(146deg, transparent 0 76%, rgba(197, 165, 124, 0.12) 76.1%, transparent 76.7%);
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 60px rgba(124, 96, 68, 0.08);
      }

      .back-button {
        position: absolute;
        z-index: 2;
        top: 7.72%;
        left: 5.2%;
        display: grid;
        width: 4.7cqw;
        height: 4.7cqw;
        place-items: center;
        color: var(--gold);
      }

      .back-button svg {
        width: 100%;
        height: 100%;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 7.44%;
        left: 50%;
        margin: 0;
        color: #111518;
        font-size: 5.25cqw;
        font-weight: 600;
        line-height: 1;
        text-shadow: 0 7px 12px rgba(58, 40, 24, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .ornament {
        position: absolute;
        z-index: 2;
        top: 12.93%;
        left: 50%;
        display: flex;
        align-items: center;
        gap: 3.6cqw;
        color: var(--gold);
        transform: translateX(-50%);
      }

      .ornament-line {
        width: 11.8cqw;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 1.9cqw;
        height: 1.9cqw;
        border: 0.36cqw solid currentColor;
        transform: rotate(45deg);
      }

      .card {
        position: absolute;
        z-index: 1;
        left: 7.12%;
        width: 85.55%;
        border: 0.1cqw solid rgba(226, 213, 201, 0.78);
        border-radius: 2.65cqw;
        background: rgba(255, 255, 255, 0.64);
        box-shadow:
          0 1.4cqw 3.8cqw rgba(83, 61, 43, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(2px);
      }

      .seal-card {
        top: 15.2%;
        height: 24.34%;
      }

      .stone-card {
        top: 41.39%;
        height: 23.92%;
      }

      .price-card {
        top: 67.22%;
        height: 15.91%;
      }

      .notice-card {
        top: 84.93%;
        height: 5.15%;
        display: flex;
        align-items: center;
        gap: 2cqw;
        padding: 0 4.2cqw;
      }

      .seal-art {
        position: absolute;
        top: 9.3%;
        left: 6.45%;
        width: 38.5%;
        height: auto;
        mix-blend-mode: multiply;
      }

      .stone-art {
        position: absolute;
        top: 12.5%;
        left: 3.2%;
        width: 48.2%;
        height: auto;
      }

      .detail-copy {
        position: absolute;
        top: 13.8%;
        left: 52.8%;
        width: 39.2%;
        color: #22272b;
      }

      .detail-row {
        font-size: 3.55cqw;
        font-weight: 400;
        line-height: 1.15;
        white-space: nowrap;
      }

      .detail-separator {
        position: relative;
        height: 3cqw;
        margin: 1.75cqw 0 1.55cqw;
      }

      .detail-separator::before {
        content: "";
        position: absolute;
        top: 50%;
        right: 0;
        left: 3.1cqw;
        height: 1px;
        background: linear-gradient(90deg, var(--line), rgba(214, 173, 118, 0.74));
      }

      .detail-separator::after {
        content: "";
        position: absolute;
        top: calc(50% - 0.75cqw);
        left: 0;
        width: 1.45cqw;
        height: 1.45cqw;
        border: 0.32cqw solid var(--gold);
        transform: rotate(45deg);
      }

      .change-button {
        position: absolute;
        right: 10.2%;
        bottom: 8%;
        display: flex;
        width: 36.8%;
        height: 14.8%;
        align-items: center;
        justify-content: center;
        gap: 4.3cqw;
        border: 0.14cqw solid var(--gold);
        border-radius: 1.15cqw;
        color: #8e6632;
        font-size: 3.05cqw;
        line-height: 1;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.3);
      }

      .change-button svg {
        width: 2.25cqw;
        height: 2.25cqw;
        stroke-width: 1.8;
      }

      .stone-title {
        position: absolute;
        top: 13%;
        left: 52.8%;
        margin: 0;
        color: #111519;
        font-size: 5.15cqw;
        font-weight: 600;
        line-height: 1.08;
        white-space: nowrap;
      }

      .stone-price {
        position: absolute;
        top: 32.6%;
        left: 52.8%;
        margin: 0;
        color: #4f555a;
        font-size: 4.1cqw;
        line-height: 1;
        white-space: nowrap;
      }

      .stock-pill {
        position: absolute;
        top: 50.2%;
        left: 52.8%;
        display: flex;
        height: 14.3%;
        align-items: center;
        gap: 1.8cqw;
        border-radius: 1.3cqw;
        background: rgba(231, 228, 214, 0.88);
        padding: 0 2.3cqw;
        color: #30383b;
        font-size: 2.95cqw;
        line-height: 1;
        white-space: nowrap;
      }

      .stock-dot {
        width: 1.65cqw;
        height: 1.65cqw;
        border-radius: 999px;
        background: #67915d;
        box-shadow: 0 0 0 0.22cqw rgba(103, 145, 93, 0.1);
      }

      .price-table {
        position: absolute;
        inset: 11.2% 5.9% 8.3%;
      }

      .price-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        color: #262b2f;
        font-size: 3.7cqw;
        line-height: 1;
      }

      .price-value {
        font-size: 4.15cqw;
      }

      .dotted-rule {
        height: 1px;
        margin: 2.35cqw 0 2.4cqw;
        background-image: linear-gradient(90deg, rgba(178, 128, 65, 0.7) 0 0.6cqw, transparent 0.6cqw 1.6cqw);
        background-size: 1.6cqw 1px;
      }

      .total-rule {
        position: relative;
        height: 1px;
        margin: 2.45cqw 0 1.6cqw;
        background: linear-gradient(90deg, var(--gold), var(--gold));
      }

      .total-rule::after {
        content: "";
        position: absolute;
        top: -0.86cqw;
        left: 50%;
        width: 1.6cqw;
        height: 1.6cqw;
        border: 0.32cqw solid var(--gold);
        background: var(--paper);
        transform: translateX(-50%) rotate(45deg);
      }

      .total-row {
        color: #8d6736;
      }

      .total-label {
        font-size: 4.2cqw;
        font-weight: 600;
      }

      .total-price {
        font-size: 5.55cqw;
        font-weight: 500;
        line-height: 0.92;
      }

      .notice-icon {
        flex: 0 0 auto;
        width: 6cqw;
        height: 6cqw;
        color: var(--gold);
      }

      .notice-copy {
        margin: 0;
        color: #22272b;
        font-size: 2.78cqw;
        line-height: 1.55;
      }

      .primary-button {
        position: absolute;
        z-index: 2;
        top: 91.02%;
        left: 6.62%;
        display: flex;
        width: 86.82%;
        height: 6.7%;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: #fffaf1;
        font-size: 4.15cqw;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 2px 8px rgba(255, 244, 222, 0.28);
        background:
          radial-gradient(ellipse at 24% 28%, rgba(255, 255, 255, 0.12), transparent 39%),
          linear-gradient(135deg, #242526, #171819 58%, #252626);
        box-shadow:
          0 1.2cqw 3.7cqw rgba(24, 24, 24, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }

      .primary-button svg {
        position: absolute;
        right: 6.8%;
        width: 2.55cqw;
        height: 2.55cqw;
        color: var(--gold);
        stroke-width: 1.9;
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .notice-copy {
          font-size: 2.68cqw;
          line-height: 1.5;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen shadow-2xl shadow-stone-300/30" aria-label="ご注文内容確認">
      <a class="back-button" href="#" aria-label="戻る">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M18.2 4.8 7 16l11.2 11.2M8.5 16H29"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.3"
          />
        </svg>
      </a>

      <h1 class="screen-title">ご注文内容確認</h1>
      <div class="ornament" aria-hidden="true">
        <span class="ornament-line"></span>
        <span class="ornament-diamond"></span>
        <span class="ornament-line"></span>
      </div>

      <section class="card seal-card" aria-labelledby="seal-heading">
        <h2 id="seal-heading" class="sr-only">選択中の印影</h2>
        <img class="seal-art" src="assets/cmb-001-stamp.png" alt="美空の印影" />
        <div class="detail-copy">
          <p class="detail-row">印影：美空</p>
          <div class="detail-separator" aria-hidden="true"></div>
          <p class="detail-row">スタイル：Elegant</p>
          <div class="detail-separator" aria-hidden="true"></div>
          <p class="detail-row">形：Square</p>
        </div>
        <a class="change-button" href="#" aria-label="印影を変更">
          <span>印影を変更</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
      </section>

      <section class="card stone-card" aria-labelledby="stone-heading">
        <img class="stone-art" src="assets/cmb-001-stone.png" alt="翡翠の印材" />
        <h2 id="stone-heading" class="stone-title">翡翠（ひすい）</h2>
        <p class="stone-price">¥128,000（税込）</p>
        <p class="stock-pill"><span class="stock-dot" aria-hidden="true"></span>在庫あり</p>
        <a class="change-button" href="#" aria-label="宝石材を変更">
          <span>宝石材を変更</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
      </section>

      <section class="card price-card" aria-label="価格明細">
        <div class="price-table">
          <p class="price-row">
            <span>商品価格</span>
            <span class="price-value">¥128,000</span>
          </p>
          <div class="dotted-rule" aria-hidden="true"></div>
          <p class="price-row">
            <span>配送料</span>
            <span class="price-value">¥3,000</span>
          </p>
          <div class="total-rule" aria-hidden="true"></div>
          <p class="price-row total-row">
            <span class="total-label">合計</span>
            <span class="total-price">¥131,000</span>
          </p>
        </div>
      </section>

      <aside class="card notice-card" aria-label="特注品について">
        <svg class="notice-icon" viewBox="0 0 48 54" aria-hidden="true">
          <path
            d="M24 2.8 42.5 9.4v15.1c0 12.1-7.5 20.6-18.5 26.5C13 45.1 5.5 36.6 5.5 24.5V9.4L24 2.8Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
            stroke-width="1.6"
          />
          <path d="M24 37V18M16.8 25.2 24 18l7.2 7.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
        </svg>
        <p class="notice-copy">本商品は、印影と宝石材を組み合わせてお作りする、<br />お客様だけの一点物の特注品です。</p>
      </aside>

      <a class="primary-button" href="#" aria-label="配送先入力へ進む">
        <span>配送先入力へ進む</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m9 5 7 7-7 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </main>
  </body>
</html>
