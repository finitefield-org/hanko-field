<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MYS-003 Seal Detail - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #11161a;
        --copy: #626a71;
        --wine: #951719;
        --deep-wine: #821214;
        --gold: #a86d26;
        --line: #eaded2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.96) 0 26%, transparent 58%),
          linear-gradient(135deg, #f1e8de 0%, #fffdf9 44%, #f4ece3 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      a,
      button {
        font: inherit;
      }

      .stage {
        width: min(100vw, 470.5px);
        height: 836px;
        overflow: hidden;
      }

      .phone {
        position: relative;
        width: 470.5px;
        height: 836px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 3%, rgba(255, 255, 255, 0.96) 0 25%, transparent 58%),
          radial-gradient(circle at 49% 45%, rgba(255, 255, 255, 0.64) 0 25%, transparent 58%),
          radial-gradient(circle at 51% 86%, rgba(255, 255, 255, 0.56) 0 24%, transparent 57%),
          linear-gradient(139deg, #f4ece3 0%, #fffdf9 45%, #f7eee5 100%);
        transform-origin: top left;
      }

      .top-bar {
        position: relative;
        height: 105.5px;
      }

      .back-button {
        position: absolute;
        top: 64px;
        left: 30px;
        display: grid;
        width: 24px;
        height: 24px;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--wine);
        padding: 0;
      }

      .back-button svg {
        width: 23px;
        height: 23px;
        stroke-width: 2.15;
      }

      .screen-title {
        position: absolute;
        top: 59px;
        right: 92px;
        left: 92px;
        margin: 0;
        color: var(--deep-wine);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 30px;
        font-weight: 600;
        line-height: 1;
        text-align: center;
        text-shadow: 0 10px 16px rgba(112, 65, 41, 0.11);
        white-space: nowrap;
      }

      .more-button {
        position: absolute;
        top: 68px;
        right: 27px;
        display: flex;
        width: 30px;
        height: 18px;
        align-items: center;
        justify-content: center;
        gap: 5px;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .more-button span {
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: currentColor;
        font-size: 0;
      }

      .seal-preview {
        position: relative;
        height: 223px;
        margin: 0 31px;
        border: 0.8px solid rgba(231, 219, 207, 0.96);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.66);
        box-shadow:
          0 12px 25px rgba(86, 58, 36, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(2px);
      }

      .seal-art {
        position: absolute;
        top: 24px;
        left: 50%;
        width: 170px;
        height: 170px;
        filter: drop-shadow(0 9px 11px rgba(66, 43, 27, 0.18));
        object-fit: cover;
        transform: translateX(-50%);
      }

      .favorite-button {
        position: absolute;
        right: 17px;
        bottom: 16px;
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .favorite-button svg {
        width: 24px;
        height: 24px;
        stroke-width: 1.7;
      }

      .detail-list {
        margin: 18px 38px 0;
      }

      .detail-row {
        display: grid;
        height: 64px;
        grid-template-columns: 58px minmax(0, 1fr) 21px;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }

      .detail-row:last-child {
        border-bottom: 0;
      }

      .round-icon {
        display: grid;
        width: 48px;
        height: 48px;
        justify-self: center;
        place-items: center;
        border-radius: 999px;
        background: rgba(246, 240, 234, 0.92);
        color: var(--wine);
        font-family: "Hanko JP", "Yu Mincho", serif;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .round-icon.is-kanji {
        font-size: 16px;
      }

      .round-icon.is-reading {
        font-size: 28px;
        line-height: 1;
      }

      .round-icon svg {
        width: 28px;
        height: 28px;
        stroke-width: 1.45;
      }

      .detail-copy {
        min-width: 0;
      }

      .detail-label,
      .spec-label {
        display: block;
        color: var(--copy);
        font-size: 13.5px;
        line-height: 1.05;
      }

      .detail-value,
      .spec-value {
        display: block;
        margin-top: 7px;
        color: #11161a;
        font-family: "Bodoni 72", "Cormorant Garamond", "Hanko JP", Georgia, serif;
        font-size: 20px;
        font-weight: 500;
        line-height: 1;
      }

      .detail-value.is-jp {
        font-family: "Hanko JP", "Yu Mincho", serif;
        font-size: 20px;
      }

      .row-chevron {
        width: 18px;
        height: 18px;
        color: var(--gold);
        stroke-width: 1.85;
      }

      .spec-card {
        display: grid;
        height: 116px;
        grid-template-columns: 1fr 1fr;
        margin: -2px 31px 0;
        border: 0.8px solid rgba(231, 219, 207, 0.96);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.67);
        box-shadow:
          0 11px 25px rgba(86, 58, 36, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(2px);
      }

      .spec-column {
        display: grid;
        grid-template-rows: 1fr 1fr;
        padding: 15px 16px 15px 22px;
      }

      .spec-column + .spec-column {
        border-left: 1px solid var(--line);
        padding-left: 20px;
      }

      .spec-item {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: center;
        column-gap: 13px;
      }

      .spec-item + .spec-item {
        border-top: 1px solid var(--line);
      }

      .spec-icon {
        display: grid;
        width: 33px;
        height: 33px;
        place-items: center;
        color: var(--gold);
      }

      .spec-icon svg {
        width: 29px;
        height: 29px;
        stroke-width: 1.55;
      }

      .spec-text {
        min-width: 0;
      }

      .spec-label {
        font-size: 12.5px;
      }

      .spec-value {
        margin-top: 4px;
        font-size: 18px;
      }

      .action-row {
        display: flex;
        align-items: center;
        gap: 11px;
        margin: 19px 31px 0;
      }

      .action-button {
        display: flex;
        height: 44px;
        align-items: center;
        justify-content: center;
        gap: 11px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        color: var(--gold);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 17px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .action-button svg {
        width: 21px;
        height: 21px;
        stroke-width: 1.65;
      }

      .action-edit {
        width: 86px;
      }

      .action-compare {
        width: 105px;
      }

      .action-primary {
        flex: 1;
        min-width: 0;
        gap: 31px;
        border-color: transparent;
        background:
          radial-gradient(circle at 20% 25%, rgba(198, 31, 34, 0.48), transparent 48%),
          linear-gradient(135deg, #9d1217 0%, #871014 100%);
        color: #fffdf9;
        box-shadow:
          0 8px 15px rgba(111, 50, 30, 0.17),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .action-primary span {
        white-space: nowrap;
      }

      .bottom-nav {
        position: absolute;
        z-index: 3;
        right: 0;
        bottom: 0;
        left: 0;
        height: 101px;
        border-top: 1px solid rgba(230, 220, 211, 0.98);
        background: rgba(255, 253, 250, 0.94);
        box-shadow: 0 -8px 18px rgba(87, 60, 40, 0.04);
        backdrop-filter: blur(8px);
      }

      .active-tab-marker {
        position: absolute;
        top: -2px;
        left: 50%;
        width: 48px;
        height: 4px;
        border-radius: 999px;
        background: var(--wine);
        font-size: 0;
        transform: translateX(-50%);
      }

      .tab-list {
        display: grid;
        height: 100%;
        grid-template-columns: repeat(3, 1fr);
        padding: 17px 29px 18px;
      }

      .tab-item {
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 6px;
        color: #11161a;
        text-decoration: none;
      }

      .tab-item svg {
        width: 31px;
        height: 31px;
        stroke-width: 1.55;
      }

      .tab-label {
        font-size: 13px;
        line-height: 1;
      }

      .tab-item.is-active {
        color: var(--wine);
      }

      .tab-item.is-active .shield {
        width: 30px;
        height: 31px;
        color: var(--wine);
      }

      .tab-item.is-active .tab-label {
        color: var(--wine);
        font-weight: 600;
      }

      @media (max-width: 470.5px) {
        .stage {
          width: 100vw;
          height: 100vh;
          min-height: 780px;
        }

        .phone {
          width: 100vw;
          height: 100%;
          transform: none;
        }

        .screen-title {
          right: 76px;
          left: 76px;
          font-size: 28px;
        }

        .back-button {
          left: 27px;
        }

        .more-button {
          right: 24px;
        }

        .seal-preview {
          margin-right: 31px;
          margin-left: 31px;
        }

        .seal-art {
          width: 164px;
          height: 164px;
        }

        .detail-list {
          margin-right: 32px;
          margin-left: 32px;
        }

        .detail-row {
          grid-template-columns: 54px minmax(0, 1fr) 19px;
          gap: 14px;
        }

        .spec-card {
          margin-right: 31px;
          margin-left: 31px;
        }

        .spec-column {
          padding-right: 11px;
          padding-left: 16px;
        }

        .spec-column + .spec-column {
          padding-left: 15px;
        }

        .spec-item {
          grid-template-columns: 36px minmax(0, 1fr);
          column-gap: 8px;
        }

        .spec-icon {
          width: 30px;
          height: 30px;
        }

        .spec-icon svg {
          width: 26px;
          height: 26px;
        }

        .spec-label {
          font-size: 12px;
        }

        .spec-value {
          font-size: 16px;
        }

        .action-row {
          gap: 9px;
          margin-right: 24px;
          margin-left: 24px;
        }

        .action-button {
          gap: 8px;
          font-size: 14.5px;
        }

        .action-edit {
          width: 76px;
        }

        .action-compare {
          width: 90px;
        }

        .action-primary {
          gap: 10px;
        }

        .tab-list {
          padding-right: 23px;
          padding-left: 23px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-start justify-items-center">

    <div class="stage">
      <main class="phone" aria-label="Seal Detail screen preview">
        <header class="top-bar">
          <a class="back-button" href="#" aria-label="Back">
            <svg aria-hidden="true"><use href="#icon-arrow-left" /></svg>
          </a>
          <h1 class="screen-title">Seal Detail</h1>
          <button class="more-button" type="button" aria-label="More actions">
            <span>&nbsp;</span>
            <span>&nbsp;</span>
            <span>&nbsp;</span>
          </button>
        </header>

        <section class="seal-preview" aria-label="Seal preview">
          <img class="seal-art" src="assets/mys-003-seal-detail.png" alt="" />
          <button class="favorite-button" type="button" aria-label="Save Beautiful sky to favorites" aria-pressed="false">
            <svg aria-hidden="true"><use href="#icon-star" /></svg>
          </button>
        </section>

        <section class="detail-list" aria-label="Seal text details">
          <a class="detail-row" href="#" aria-label="Kanji 美空">
            <span class="round-icon is-kanji" aria-hidden="true">美空</span>
            <span class="detail-copy">
              <span class="detail-label">Kanji</span>
              <span class="detail-value is-jp">美空</span>
            </span>
            <svg class="row-chevron" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
          </a>
          <a class="detail-row" href="#" aria-label="Reading Misora">
            <span class="round-icon is-reading" aria-hidden="true">あ</span>
            <span class="detail-copy">
              <span class="detail-label">Reading</span>
              <span class="detail-value">Misora</span>
            </span>
            <svg class="row-chevron" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
          </a>
          <a class="detail-row" href="#" aria-label="Meaning Beautiful sky">
            <span class="round-icon" aria-hidden="true">
              <svg><use href="#icon-sparkle" /></svg>
            </span>
            <span class="detail-copy">
              <span class="detail-label">Meaning</span>
              <span class="detail-value">Beautiful sky</span>
            </span>
            <svg class="row-chevron" aria-hidden="true"><use href="#icon-chevron-right" /></svg>
          </a>
        </section>

        <section class="spec-card" aria-label="Seal attributes">
          <div class="spec-column">
            <div class="spec-item">
              <span class="spec-icon" aria-hidden="true"><svg><use href="#icon-square" /></svg></span>
              <span class="spec-text">
                <span class="spec-label">Shape</span>
                <span class="spec-value">Square</span>
              </span>
            </div>
            <div class="spec-item">
              <span class="spec-icon" aria-hidden="true"><svg><use href="#icon-brush" /></svg></span>
              <span class="spec-text">
                <span class="spec-label">Stroke</span>
                <span class="spec-value">Standard</span>
              </span>
            </div>
          </div>
          <div class="spec-column">
            <div class="spec-item">
              <span class="spec-icon" aria-hidden="true"><svg><use href="#icon-flower" /></svg></span>
              <span class="spec-text">
                <span class="spec-label">Style</span>
                <span class="spec-value">Elegant</span>
              </span>
            </div>
            <div class="spec-item">
              <span class="spec-icon" aria-hidden="true"><svg><use href="#icon-scales" /></svg></span>
              <span class="spec-text">
                <span class="spec-label">Balance</span>
                <span class="spec-value">Balanced</span>
              </span>
            </div>
          </div>
        </section>

        <section class="action-row" aria-label="Seal actions">
          <a class="action-button action-edit" href="#" aria-label="Edit seal">
            <svg aria-hidden="true"><use href="#icon-pencil" /></svg>
            <span>Edit</span>
          </a>
          <a class="action-button action-compare" href="#" aria-label="Compare seal">
            <svg aria-hidden="true"><use href="#icon-scales" /></svg>
            <span>Compare</span>
          </a>
          <a class="action-button action-primary" href="#" aria-label="Choose for Order">
            <span>Choose for Order</span>
            <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
          </a>
