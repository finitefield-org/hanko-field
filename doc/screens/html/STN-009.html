<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STN-009 Stone Selection - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #10171a;
        --gold: #a7793d;
        --gold-dark: #785f3e;
        --button: #261f15;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dc;
        color: var(--ink);
        font-family:
          "Hanko Serif JP", "Hanko Serif", "Yu Mincho", "Hiragino Mincho ProN",
          serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(
            119deg,
            transparent 0 38%,
            rgba(165, 126, 83, 0.006) 38.25%,
            transparent 39.5%
          ),
          linear-gradient(
            139deg,
            transparent 0 72%,
            rgba(165, 126, 83, 0.008) 72.1%,
            transparent 73.2%
          ),
          radial-gradient(
            ellipse at 50% 5%,
            rgba(255, 255, 255, 0.96),
            transparent 36%
          ),
          radial-gradient(
            ellipse at 50% 49%,
            rgba(255, 255, 255, 0.62),
            transparent 43%
          ),
          radial-gradient(
            ellipse at 49% 91%,
            rgba(255, 255, 255, 0.62),
            transparent 38%
          ),
          linear-gradient(127deg, #f2ece5 0%, #fffdf9 43%, #f8f1e9 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.06;
        background:
          linear-gradient(
            153deg,
            transparent 0 18%,
            rgba(176, 139, 94, 0.12) 18.12%,
            transparent 18.84%
          ),
          linear-gradient(
            35deg,
            transparent 0 78%,
            rgba(178, 141, 96, 0.11) 78.15%,
            transparent 78.8%
          );
        filter: blur(0.7px);
      }

      .screen::after {
        box-shadow: inset 0 0 8.8cqw rgba(125, 96, 68, 0.07);
      }

      .top-button {
        position: absolute;
        z-index: 3;
        top: 8.48%;
        left: 5.18%;
        display: grid;
        width: 5.82cqw;
        height: 5.82cqw;
        place-items: center;
        color: var(--gold);
        text-decoration: none;
      }

      .top-button svg {
        width: 100%;
        height: 100%;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 8.38%;
        left: 50%;
        margin: 0;
        color: var(--gold-dark);
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 5.85cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 0.9cqw 2cqw rgba(86, 61, 38, 0.1);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .divider {
        position: absolute;
        z-index: 2;
        top: 16.18%;
        left: 50%;
        display: flex;
        width: 31.5cqw;
        align-items: center;
        justify-content: space-between;
        color: #b18344;
        transform: translateX(-50%);
      }

      .divider-line {
        width: 11.95cqw;
        height: 0.16cqw;
        background: currentColor;
      }

      .divider-diamond {
        width: 2.52cqw;
        height: 2.52cqw;
        border: 0.36cqw solid currentColor;
        transform: rotate(45deg);
      }

      .stone-card {
        position: absolute;
        z-index: 2;
        top: 23.08%;
        left: 26.25%;
        width: 47.62cqw;
        height: auto;
        border-radius: 2.8cqw;
      }

      .stone-name {
        position: absolute;
        z-index: 2;
        top: 52.84%;
        left: 50%;
        margin: 0;
        color: #111719;
        font-size: 5.85cqw;
        font-weight: 400;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0.4cqw 1.1cqw rgba(44, 36, 28, 0.06);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .price {
        position: absolute;
        z-index: 2;
        top: 59.14%;
        left: 50%;
        display: flex;
        align-items: baseline;
        gap: 1.22cqw;
        margin: 0;
        color: #83643d;
        font-size: 4.82cqw;
        font-weight: 400;
        line-height: 1;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .tax {
        color: #636465;
        font-size: 3.04cqw;
      }

      .question {
        position: absolute;
        z-index: 2;
        top: 66.55%;
        left: 50%;
        margin: 0;
        color: #111719;
        font-size: 4.52cqw;
        font-weight: 400;
        line-height: 1;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .select-button {
        position: absolute;
        z-index: 2;
        top: 72.6%;
        left: 13.76%;
        display: grid;
        width: 72.4%;
        height: 8.2%;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background:
          radial-gradient(
            ellipse at 50% 2%,
            rgba(118, 91, 55, 0.38),
            transparent 42%
          ),
          linear-gradient(90deg, #2b2114 0%, var(--button) 48%, #2b2114 100%);
        box-shadow:
          0 3.7cqw 4.8cqw rgba(53, 38, 23, 0.18),
          inset 0 0.1cqw 0 rgba(255, 255, 255, 0.12);
        color: #fffaf2;
        font: inherit;
        font-size: 4.92cqw;
        font-weight: 400;
        line-height: 1;
      }

      .cancel-link {
        position: absolute;
        z-index: 2;
        top: 85.04%;
        left: 50%;
        color: var(--gold);
        font-size: 4.55cqw;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 0.5cqw 1.1cqw rgba(96, 66, 34, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .screen-title {
          font-size: 5.58cqw;
        }

        .stone-name {
          font-size: 5.6cqw;
        }

        .question {
          font-size: 4.32cqw;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="screen shadow-2xl shadow-stone-300/60"
      aria-label="Stone selection confirmation"
    >
      <a class="top-button" href="#" aria-label="戻る">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path
            d="M18.1 4.8 7 16l11.1 11.2M8.6 16H29"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.25"
          />
        </svg>
      </a>

      <h1 class="screen-title">Stone Signature</h1>

      <div class="divider" aria-hidden="true">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line"></span>
      </div>

      <img
        class="stone-card"
        src="assets/stn-009-stone-card.png"
        alt="翡翠の印鑑用宝石材"
      />

      <h2 class="stone-name">翡翠（ひすい）</h2>

      <p class="price">
        <span>¥128,000</span>
        <span class="tax">（税込）</span>
      </p>

      <p class="question">この宝石材を選択しますか？</p>

      <button class="select-button" type="button">選択する</button>

      <a class="cancel-link" href="#">キャンセル</a>
    </main>
  </body>
</html>
