<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MYS-001 My Seals - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #11161a;
        --copy: #5d666d;
        --wine: #961719;
        --deep-wine: #7f1013;
        --gold: #aa702d;
        --paper-line: #e9ddd2;
        --paper: #fffdfa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 9%, rgba(255, 255, 255, 0.95) 0 26%, transparent 57%),
          linear-gradient(135deg, #f2e9df 0%, #fffdf9 44%, #f4ece3 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      button,
      a {
        font: inherit;
      }

      .stage {
        width: min(100vw, 470.5px);
        height: 836px;
        overflow: hidden;
      }

      .phone {
        position: relative;
        width: 470.5px;
        height: 836px;
        overflow: hidden;
        background:
          radial-gradient(circle at 49% 3%, rgba(255, 255, 255, 0.96) 0 25%, transparent 58%),
          radial-gradient(circle at 51% 47%, rgba(255, 255, 255, 0.62) 0 25%, transparent 59%),
          radial-gradient(circle at 50% 86%, rgba(255, 255, 255, 0.54) 0 24%, transparent 57%),
          linear-gradient(139deg, #f4ece3 0%, #fffdf9 45%, #f7eee5 100%);
        transform-origin: top left;
      }

      .screen-header {
        position: relative;
        height: 148.5px;
      }

      .screen-title {
        position: absolute;
        top: 61px;
        left: 34px;
        margin: 0;
        color: var(--deep-wine);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 44px;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 10px 16px rgba(112, 65, 41, 0.11);
        white-space: nowrap;
      }

      .screen-subtitle {
        position: absolute;
        top: 113px;
        left: 34px;
        margin: 0;
        color: #5c656c;
        font-size: 15px;
        line-height: 1.2;
      }

      .settings-button {
        position: absolute;
        top: 73px;
        right: 42px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .settings-button svg {
        width: 31px;
        height: 31px;
        stroke-width: 1.9;
      }

      .seal-list {
        position: relative;
        z-index: 1;
      }

      .seal-card {
        position: relative;
        height: 193px;
        margin: 0 27px 14.5px;
        border: 0.8px solid rgba(231, 219, 207, 0.95);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow:
          0 9px 24px rgba(86, 58, 36, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(2px);
      }

      .seal-art {
        position: absolute;
        top: 10px;
        left: 14px;
        width: 118px;
        height: 118px;
        object-fit: cover;
      }

      .seal-info {
        position: absolute;
        top: 24px;
        left: 154px;
        min-width: 0;
      }

      .seal-name {
        margin: 0;
        color: #12171b;
        font-family: "Hanko JP", "Yu Mincho", "Hiragino Mincho ProN", serif;
        font-size: 33px;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 5px 12px rgba(55, 47, 42, 0.12);
        white-space: nowrap;
      }

      .seal-name-en {
        margin: 15px 0 0;
        color: #5e666d;
        font-size: 15px;
        line-height: 1.1;
        white-space: nowrap;
      }

      .traits {
        display: flex;
        align-items: center;
        gap: 11px;
        margin-top: 21px;
        color: #4f585f;
        white-space: nowrap;
      }

      .trait {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        line-height: 1;
      }

      .trait svg {
        width: 16px;
        height: 16px;
        color: #303940;
        stroke-width: 1.55;
      }

      .trait-separator {
        width: 1px;
        height: 15px;
        background: #dfd1c5;
        font-size: 0;
      }

      .favorite-button {
        position: absolute;
        top: 24px;
        right: 25px;
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: rgba(246, 240, 234, 0.86);
        color: #11161a;
        padding: 0;
      }

      .favorite-button svg {
        width: 20px;
        height: 20px;
        stroke-width: 1.65;
      }

      .favorite-button.is-saved {
        color: var(--gold);
      }

      .favorite-button.is-saved svg {
        fill: currentColor;
        stroke: currentColor;
      }

      .card-divider {
        position: absolute;
        right: 22px;
        bottom: 57px;
        left: 22px;
        height: 1px;
        background: #ebded2;
        font-size: 0;
      }

      .edit-action {
        position: absolute;
        bottom: 22px;
        left: 43px;
        display: inline-flex;
        align-items: center;
        gap: 14px;
        color: var(--gold);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 16px;
        line-height: 1;
        text-decoration: none;
      }

      .edit-action svg {
        width: 18px;
        height: 18px;
        stroke-width: 1.65;
      }

      .choose-action {
        position: absolute;
        right: 21px;
        bottom: 11px;
        display: flex;
        width: 177px;
        height: 38px;
        align-items: center;
        justify-content: center;
        gap: 45px;
        border-radius: 7px;
        background:
          radial-gradient(circle at 18% 23%, rgba(198, 31, 34, 0.46), transparent 48%),
          linear-gradient(135deg, #9b1216 0%, #851015 100%);
        color: #fffdf9;
        box-shadow:
          0 5px 12px rgba(112, 43, 27, 0.17),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-family: "Bodoni 72", "Cormorant Garamond", Georgia, serif;
        font-size: 17px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .choose-action svg {
        width: 18px;
        height: 18px;
        color: #fffdf9;
        stroke-width: 1.65;
      }

      .bottom-nav {
        position: absolute;
        z-index: 3;
        right: 0;
        bottom: 0;
        left: 0;
        height: 91px;
        border-top: 1px solid rgba(230, 220, 211, 0.98);
        background: rgba(255, 253, 250, 0.94);
        box-shadow: 0 -8px 18px rgba(87, 60, 40, 0.04);
        backdrop-filter: blur(8px);
      }

      .tab-list {
        display: grid;
        height: 100%;
        grid-template-columns: repeat(3, 1fr);
        padding: 11px 29px 17px;
      }

      .tab-item {
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 6px;
        color: #11161a;
        text-decoration: none;
      }

      .tab-item svg {
        width: 31px;
        height: 31px;
        stroke-width: 1.55;
      }

      .tab-label {
        font-size: 13px;
        line-height: 1;
      }

      .tab-item.is-active {
        color: var(--wine);
      }

      .tab-item.is-active .shield {
        width: 30px;
        height: 31px;
        color: var(--wine);
      }

      .tab-item.is-active .tab-label {
        color: var(--wine);
        font-weight: 600;
      }

      @media (max-width: 470.5px) {
        .stage {
          width: 100vw;
          height: 100vh;
          min-height: 760px;
        }

        .phone {
          width: 100vw;
          height: 100%;
          transform: none;
        }

        .screen-title {
          left: 28px;
          font-size: 40px;
        }

        .screen-subtitle {
          left: 28px;
        }

        .settings-button {
          right: 32px;
        }

        .seal-card {
          margin-right: 23px;
          margin-left: 23px;
        }

        .seal-art {
          top: 13px;
          left: 10px;
          width: 112px;
          height: 112px;
        }

        .seal-info {
          left: 128px;
        }

        .seal-name {
          font-size: 31px;
        }

        .seal-name-en {
          margin-top: 14px;
          font-size: 14px;
        }

        .traits {
          gap: 7px;
          margin-top: 22px;
        }

        .trait {
          gap: 3px;
          font-size: 10.5px;
        }

        .trait svg {
          width: 13px;
          height: 13px;
        }

        .trait-separator {
          height: 12px;
        }

        .favorite-button {
          right: 18px;
        }

        .edit-action {
          left: 37px;
        }

        .choose-action {
          right: 18px;
          width: 149px;
          gap: 30px;
        }

        .tab-list {
          padding-right: 23px;
          padding-left: 23px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen place-items-start justify-items-center">
    <svg aria-hidden="true" class="hidden">
      <symbol id="icon-gear" viewBox="0 0 24 24">
        <path d="M12 8.1a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
        <path d="m13.4 2.6.8 2.5 2.6 1.1 2.4-1.1 1.4 2.5-2.1 1.6.3 2.8 2.1 1.6-1.4 2.5-2.4-1.1-2.6 1.1-.8 2.5h-2.8l-.8-2.5-2.6-1.1-2.4 1.1-1.4-2.5 2.1-1.6-.3-2.8-2.1-1.6 1.4-2.5 2.4 1.1 2.6-1.1.8-2.5Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-heart" viewBox="0 0 24 24">

      </symbol>

      </symbol>

      </symbol>
      <symbol id="icon-sparkle" viewBox="0 0 24 24">
        <path d="M10.1 3.8 11.8 9l5.2 1.8-5.2 1.8-1.7 5.2-1.8-5.2-5.2-1.8L8.3 9ZM18.1 14.4l.8 2.2 2.1.8-2.1.8-.8 2.2-.8-2.2-2.2-.8 2.2-.8ZM17.7 3.2l.7 2 .7-2 .7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7Z" fill="none" stroke="currentColor" stroke-linejoin="round" />

      </symbol>
    </svg>

    <div class="stage">
      <main class="phone" aria-label="My Seals list screen preview">
        <header class="screen-header">
          <h1 class="screen-title">My Seals</h1>
          <p class="screen-subtitle">Saved on this device</p>
          <button class="settings-button" type="button" aria-label="Settings">
            <svg aria-hidden="true"><use href="#icon-gear" /></svg>
          </button>
        </header>

        <section class="seal-list" aria-label="Saved seals">
          <article class="seal-card" aria-labelledby="seal-sky-title">
            <img class="seal-art" src="assets/mys-001-seal-sky.png" alt="" />
            <div class="seal-info">
              <h2 class="seal-name" id="seal-sky-title">美空</h2>
              <p class="seal-name-en">Beautiful sky</p>
              <div class="traits" aria-label="Elegant, Standard, Balanced">
                <span class="trait"><svg aria-hidden="true"><use href="#icon-flower" /></svg>Elegant</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-brush" /></svg>Standard</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-scales" /></svg>Balanced</span>
              </div>
            </div>
            <button class="favorite-button is-saved" type="button" aria-label="Remove Beautiful sky from favorites" aria-pressed="true">
              <svg aria-hidden="true"><use href="#icon-star" /></svg>
            </button>
            <span class="card-divider" aria-hidden="true">&nbsp;</span>
            <a class="edit-action" href="#" aria-label="Edit Beautiful sky">
              <span>Edit</span>
              <svg aria-hidden="true"><use href="#icon-pencil" /></svg>
            </a>
            <a class="choose-action" href="#" aria-label="Choose Beautiful sky">
              <span>Choose</span>
              <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
            </a>
          </article>

          <article class="seal-card" aria-labelledby="seal-love-title">
            <img class="seal-art" src="assets/mys-001-seal-love.png" alt="" />
            <div class="seal-info">
              <h2 class="seal-name" id="seal-love-title">永愛</h2>
              <p class="seal-name-en">Eternal love</p>
              <div class="traits" aria-label="Elegant, Standard, Balanced">
                <span class="trait"><svg aria-hidden="true"><use href="#icon-sparkle" /></svg>Elegant</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-brush" /></svg>Standard</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-scales" /></svg>Balanced</span>
              </div>
            </div>
            <button class="favorite-button" type="button" aria-label="Save Eternal love to favorites" aria-pressed="false">
              <svg aria-hidden="true"><use href="#icon-heart" /></svg>
            </button>
            <span class="card-divider" aria-hidden="true">&nbsp;</span>
            <a class="edit-action" href="#" aria-label="Edit Eternal love">
              <span>Edit</span>
              <svg aria-hidden="true"><use href="#icon-pencil" /></svg>
            </a>
            <a class="choose-action" href="#" aria-label="Choose Eternal love">
              <span>Choose</span>
              <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
            </a>
          </article>

          <article class="seal-card" aria-labelledby="seal-hope-title">
            <img class="seal-art" src="assets/mys-001-seal-hope.png" alt="" />
            <div class="seal-info">
              <h2 class="seal-name" id="seal-hope-title">希望</h2>
              <p class="seal-name-en">Hope</p>
              <div class="traits" aria-label="Modern, Standard, Balanced">
                <span class="trait"><svg aria-hidden="true"><use href="#icon-flower" /></svg>Modern</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-brush" /></svg>Standard</span>
                <span class="trait-separator" aria-hidden="true">&nbsp;</span>
                <span class="trait"><svg aria-hidden="true"><use href="#icon-scales" /></svg>Balanced</span>
              </div>
            </div>
            <button class="favorite-button" type="button" aria-label="Save Hope to favorites" aria-pressed="false">
              <svg aria-hidden="true"><use href="#icon-heart" /></svg>
            </button>
            <span class="card-divider" aria-hidden="true">&nbsp;</span>
            <a class="edit-action" href="#" aria-label="Edit Hope">
              <span>Edit</span>
              <svg aria-hidden="true"><use href="#icon-pencil" /></svg>
            </a>
            <a class="choose-action" href="#" aria-label="Choose Hope">
              <span>Choose</span>
              <svg aria-hidden="true"><use href="#icon-arrow-right" /></svg>
            </a>
          </article>
        </section>

        <nav class="bottom-nav" aria-label="Primary">
          <div class="tab-list">
            <a class="tab-item" href="#" aria-label="Design">
              <svg aria-hidden="true"><use href="#icon-tab-design" /></svg>
              <span class="tab-label">Design</span>
            </a>
            <a class="tab-item is-active" href="#" aria-label="My Seals">
              <svg class="shield" aria-hidden="true"><use href="#icon-shield-star" /></svg>
              <span class="tab-label">My Seals</span>
            </a>
            <a class="tab-item" href="#" aria-label="Stones">
              <svg aria-hidden="true"><use href="#icon-diamond" /></svg>
              <span class="tab-label">Stones</span>
            </a>
          </div>
        </nav>
      </main>
    </div>
  </body>
</html>
