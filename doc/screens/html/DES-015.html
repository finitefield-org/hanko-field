<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DES-015 Generation Limit Reached - Stone Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Sans";
        src: url("../../../app/assets/fonts/Manrope.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --ink: #171d20;
        --copy: #59616a;
        --wine: #971719;
        --deep-wine: #7f1013;
        --gold: #b7823d;
        --line: #eadfd4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 50% 13%,
            rgba(255, 255, 255, 0.94) 0 25%,
            transparent 58%
          ),
          linear-gradient(135deg, #f1e8de 0%, #fffdf9 43%, #f4ece3 100%);
      }

      .phone {
        --side: clamp(20px, 5.2vw, 24.5px);
        position: relative;
        width: min(100vw, 470.5px);
        height: 836px;
        aspect-ratio: 941 / 1672;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 49% 7%,
            rgba(255, 255, 255, 0.95) 0 26%,
            transparent 57%
          ),
          radial-gradient(
            circle at 48% 45%,
            rgba(255, 255, 255, 0.68) 0 27%,
            transparent 62%
          ),
          radial-gradient(
            circle at 50% 88%,
            rgba(255, 255, 255, 0.56) 0 24%,
            transparent 59%
          ),
          linear-gradient(136deg, #f2e9df 0%, #fffdf9 45%, #f6eee5 100%);
        font-family: "Hanko Sans", Inter, system-ui, sans-serif;
        letter-spacing: 0;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 63px 29px 0;
      }

      .serif,
      .screen-title {
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", "Times New Roman",
          serif;
      }

      .screen-title {
        margin: 0;
        color: var(--deep-wine);
        font-size: 43px;
        font-weight: 600;
        line-height: 1;
        text-shadow: 0 8px 14px rgba(111, 62, 38, 0.08);
        white-space: nowrap;
      }

      .settings-button {
        display: grid;
        width: 45px;
        height: 45px;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .settings-button svg {
        width: 33px;
        height: 33px;
        stroke-width: 1.85;
      }

      .main-card {
        height: 514px;
        margin: 18px var(--side) 0;
        border: 0.8px solid rgba(234, 223, 211, 0.95);
        border-radius: 24px;
        background:
          radial-gradient(
            circle at 50% 18%,
            rgba(255, 255, 255, 0.78) 0 24%,
            transparent 50%
          ),
          rgba(255, 255, 255, 0.55);
        box-shadow:
          0 16px 28px rgba(90, 59, 34, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(2px);
        text-align: center;
      }

      .limit-art {
        position: relative;
        width: min(320px, calc(100% - 64px));
        height: 166px;
        margin: 8px auto 0;
      }

      .sand-dust {
        position: absolute;
        inset: 4px 0 0;
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 28% 22%,
            rgba(201, 166, 123, 0.2) 0 2px,
            transparent 3px
          ),
          radial-gradient(
            circle at 76% 35%,
            rgba(203, 170, 128, 0.22) 0 2px,
            transparent 3px
          ),
          radial-gradient(
            circle at 35% 76%,
            rgba(202, 163, 116, 0.18) 0 2px,
            transparent 3px
          ),
          radial-gradient(
            ellipse at 50% 54%,
            rgba(183, 134, 73, 0.16),
            transparent 68%
          );
        filter: blur(0.2px);
      }

      .chip {
        position: absolute;
        width: 12px;
        height: 10px;
        border-radius: 3px 7px 3px 8px;
        background: linear-gradient(139deg, #fbf4ec 0%, #d6bea2 82%);
        box-shadow: 0 5px 8px rgba(128, 92, 58, 0.1);
        opacity: 0.82;
        transform: rotate(22deg);
      }

      .chip:nth-child(2) {
        top: 38px;
        left: 43px;
        width: 10px;
        height: 9px;
      }

      .chip:nth-child(3) {
        top: 61px;
        left: 22px;
        width: 18px;
        height: 15px;
        transform: rotate(-23deg);
      }

      .chip:nth-child(4) {
        top: 105px;
        left: 34px;
        width: 22px;
        height: 18px;
        transform: rotate(22deg);
      }

      .chip:nth-child(5) {
        top: 77px;
        right: 28px;
        width: 18px;
        height: 14px;
        transform: rotate(-15deg);
      }

      .chip:nth-child(6) {
        top: 52px;
        right: 63px;
        width: 7px;
        height: 7px;
        transform: rotate(12deg);
      }

      .red-seal {
        position: absolute;
        top: 8px;
        left: 50%;
        display: grid;
        width: 155px;
        height: 155px;
        place-items: center;
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 40% 27%,
            rgba(255, 255, 255, 0.24) 0 16%,
            transparent 34%
          ),
          radial-gradient(
            circle at 48% 55%,
            #a8191c 0 45%,
            #7c1012 72%,
            #330707 100%
          );
        box-shadow:
          0 13px 20px rgba(83, 35, 18, 0.2),
          inset 0 0 0 3px #ebc888,
          inset 0 0 0 7px #7b481f,
          inset 0 0 0 11px #e1bd78,
          inset 0 0 0 15px #672f12,
          inset 0 0 29px rgba(255, 206, 142, 0.24);
        transform: translateX(-50%);
      }

      .red-seal::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 2px solid rgba(246, 196, 108, 0.58);
        border-radius: inherit;
      }

      .hourglass {
        position: relative;
        z-index: 2;
        width: 83px;
        height: 98px;
        color: #f9e9be;
        filter: drop-shadow(0 5px 5px rgba(50, 10, 5, 0.28));
      }

      .hourglass path,
      .hourglass line {
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .hourglass .sand {
        fill: currentColor;
        opacity: 0.95;
        stroke: none;
      }

      .warning-badge {
        position: absolute;
        z-index: 4;
        right: 53px;
        bottom: 20px;
        display: grid;
        width: 55px;
        height: 55px;
        place-items: center;
        border: 3px solid #edd1a2;
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 34% 30%,
            rgba(255, 255, 255, 0.15),
            transparent 34%
          ),
          linear-gradient(135deg, #b31b1f 0%, #8e1416 78%);
        box-shadow:
          0 7px 12px rgba(83, 36, 21, 0.18),
          inset 0 0 0 1px rgba(93, 8, 9, 0.35);
        color: #fff5db;
        font-size: 32px;
        font-weight: 600;
        line-height: 1;
      }

      .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-top: 3px;
        color: var(--gold);
      }

      .ornament-line {
        width: 52px;
        height: 1px;
        background: currentColor;
      }

      .ornament-diamond {
        width: 10px;
        height: 10px;
        border: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .message-title {
        margin: 24px 18px 0;
        color: #182025;
        font-size: 36px;
        font-weight: 500;
        line-height: 1.03;
        white-space: nowrap;
      }

      .message-copy {
        width: min(260px, calc(100% - 72px));
        margin: 16px auto 0;
        color: var(--copy);
        font-size: 15px;
        font-weight: 500;
        line-height: 1.6;
      }

      .count-pill {
        display: inline-grid;
        height: 34px;
        grid-template-columns: 26px auto;
        gap: 9px;
        align-items: center;
        margin-top: 17px;
        padding: 0 21px;
        border: 0.8px solid rgba(222, 205, 188, 0.9);
        border-radius: 999px;
        background: rgba(255, 253, 250, 0.38);
        color: #4d555d;
        font-size: 13.5px;
        font-weight: 500;
      }

      .count-pill svg {
        width: 19px;
        height: 19px;
        color: var(--gold);
        stroke-width: 2;
      }

      .actions {
        display: grid;
        gap: 11px;
        width: min(348px, calc(100% - 60px));
        margin: 17px auto 0;
      }

      .action-button {
        display: grid;
        height: 50px;
        grid-template-columns: 1fr 26px;
        align-items: center;
        border-radius: 7px;
        font-size: 22px;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
      }

      .action-button.primary {
        padding: 0 18px 0 45px;
        border: 1px solid rgba(119, 8, 10, 0.7);
        background:
          radial-gradient(
            circle at 55% 22%,
            rgba(191, 43, 42, 0.24),
            transparent 42%
          ),
          linear-gradient(135deg, #9d171a, #830f12);
        box-shadow:
          0 10px 18px rgba(113, 25, 19, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.13);
        color: #fff9f2;
      }

      .action-button.secondary {
        display: flex;
        justify-content: center;
        border: 1px solid var(--gold);
        background: rgba(255, 253, 250, 0.28);
        color: #a66e28;
      }

      .action-button svg {
        width: 24px;
        height: 24px;
        justify-self: end;
        stroke-width: 1.8;
      }

      .info-card {
        display: grid;
        grid-template-columns: 66px 1px minmax(0, 1fr);
        gap: 18px;
        align-items: center;
        width: min(350px, calc(100% - 60px));
        min-height: 70px;
        margin: 16px auto 0;
        padding: 10px 20px 10px 12px;
        border: 0.8px solid rgba(234, 223, 211, 0.96);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.55);
        box-shadow:
          0 12px 22px rgba(90, 59, 34, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(2px);
      }

      .info-icon-wrap {
        display: grid;
        width: 55px;
        height: 55px;
        place-items: center;
        border-radius: 999px;
        background: radial-gradient(
          circle at 45% 42%,
          rgba(255, 255, 255, 0.75),
          rgba(245, 237, 228, 0.94)
        );
      }

      .info-icon {
        width: 35px;
        height: 35px;
        color: var(--gold);
        stroke-width: 1.55;
      }

      .info-rule {
        width: 1px;
        height: 44px;
        background: var(--gold);
      }

      .info-copy {
        min-width: 0;
        color: #59616a;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.55;
      }

      .tabbar {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: grid;
        height: 102px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: start;
        border-top: 1px solid rgba(226, 214, 202, 0.94);
        background: rgba(255, 252, 248, 0.72);
        backdrop-filter: blur(6px);
      }

      .tabbar::before {
        content: "";
        position: absolute;
        top: -4px;
        left: 65px;
        width: 51px;
        height: 4px;
        border-radius: 999px;
        background: var(--wine);
      }

      .tab {
        display: grid;
        place-items: center;
        padding-top: 19px;
        color: #12191e;
        font-size: 13.5px;
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
      }

      .tab.active {
        color: var(--wine);
      }

      .tab svg {
        width: 37px;
        height: 37px;
        margin-bottom: 11px;
        stroke-width: 1.8;
      }

      .tab:nth-child(2) svg {
        width: 34px;
        height: 34px;
        margin-top: 1px;
        margin-bottom: 13px;
      }

      .tab:nth-child(3) svg {
        width: 38px;
        height: 38px;
        margin-bottom: 10px;
      }

      @media (max-width: 420px) {
        .header {
          padding-right: 25px;
          padding-left: 25px;
        }

        .screen-title {
          font-size: 39px;
        }

        .main-card {
          height: 500px;
        }

        .limit-art {
          width: min(292px, calc(100% - 48px));
          height: 170px;
          margin-top: 24px;
        }

        .red-seal {
          width: 143px;
          height: 143px;
        }

        .hourglass {
          width: 76px;
          height: 91px;
        }

        .warning-badge {
          right: 42px;
          bottom: 17px;
        }

        .message-title {
          margin-top: 20px;
          font-size: 30px;
        }

        .message-copy {
          width: min(250px, calc(100% - 60px));
          margin-top: 12px;
          font-size: 14px;
          line-height: 1.45;
        }

        .count-pill {
          margin-top: 12px;
        }

        .actions {
          width: calc(100% - 56px);
          margin-top: 16px;
        }

        .action-button {
          height: 47px;
          font-size: 20px;
        }

        .info-card {
          width: calc(100% - 56px);
          grid-template-columns: 55px 1px minmax(0, 1fr);
          gap: 15px;
        }

        .tabbar::before {
          left: 56px;
        }
      }

      @media (max-width: 380px) {
        .limit-art {
          height: 152px;
          transform: scale(0.92);
          transform-origin: top center;
          margin-bottom: -16px;
        }

        .message-title {
          font-size: 27px;
        }

        .message-copy {
          font-size: 13px;
        }

        .count-pill {
          padding: 0 16px;
          font-size: 12.5px;
        }

        .action-button {
          font-size: 18px;
        }

        .info-copy {
          font-size: 12.8px;
        }
      }
    </style>
  </head>
  <body class="grid min-h-screen justify-items-center">
    <main class="phone shadow-2xl shadow-stone-300/30">
      <header class="header">
        <h1 class="screen-title">Design</h1>
        <button class="settings-button" type="button" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M9.5 2.8h5l.7 3.1a7.7 7.7 0 0 1 1.9 1.1l3-.9 2.5 4.3-2.4 2.1a8.4 8.4 0 0 1 0 2.2l2.4 2.1-2.5 4.3-3-.9a7.7 7.7 0 0 1-1.9 1.1l-.7 3.1h-5l-.7-3.1a7.7 7.7 0 0 1-1.9-1.1l-3 .9-2.5-4.3 2.4-2.1a8.4 8.4 0 0 1 0-2.2L1.4 10.4l2.5-4.3 3 .9a7.7 7.7 0 0 1 1.9-1.1l.7-3.1Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
            <circle cx="12" cy="13.6" r="3.2" stroke="currentColor" />
          </svg>
        </button>
      </header>

      <section class="main-card" aria-labelledby="limit-title">
        <div class="limit-art" aria-hidden="true">
          <div class="sand-dust"></div>
          <span class="chip"></span>
          <span class="chip"></span>
          <span class="chip"></span>
          <span class="chip"></span>
          <span class="chip"></span>
          <div class="red-seal">
            <svg class="hourglass" viewBox="0 0 120 150" fill="none">
              <line x1="30" y1="17" x2="90" y2="17" stroke-width="12" />
              <line x1="30" y1="133" x2="90" y2="133" stroke-width="12" />
              <path
                d="M39 23v24c0 12 10 19 21 27-11 8-21 15-21 28v25"
                stroke-width="5"
              />
              <path
                d="M81 23v24c0 12-10 19-21 27 11 8 21 15 21 28v25"
                stroke-width="5"
              />
              <path
                class="sand"
                d="M43 50h34c-3 11-11 17-17 21-6-4-14-10-17-21Z"
              />
              <path class="sand" d="M44 112c4-16 28-16 32 0Z" />
            </svg>
          </div>
          <div class="warning-badge serif">!</div>
        </div>

        <div class="ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-line"></span>
        </div>

        <h2 class="message-title serif" id="limit-title">
          Generation limit reached
        </h2>
        <p class="message-copy">
          You&rsquo;ve used all regeneration attempts for this seal design.
        </p>

        <div class="count-pill" aria-label="3 of 3 regenerations used">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M20 12a8 8 0 0 1-13.7 5.7"
              stroke="currentColor"
              stroke-linecap="round"
            />
            <path
              d="M4 12A8 8 0 0 1 17.7 6.3"
              stroke="currentColor"
              stroke-linecap="round"
            />
            <path
              d="M17.8 3.5v3.2h-3.2M6.2 20.5v-3.2h3.2"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>3 of 3 regenerations used</span>
        </div>

        <div class="actions">
          <a class="action-button primary serif" href="#">
            <span>Choose Current Design</span>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14" stroke="currentColor" stroke-linecap="round" />
              <path
                d="m13 6 6 6-6 6"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
          <a class="action-button secondary serif" href="#">Start Over</a>
        </div>
      </section>

      <aside class="info-card" aria-label="Information">
        <div class="info-icon-wrap" aria-hidden="true">
          <svg class="info-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="8.2" stroke="currentColor" />
            <path
              d="M12 10.5v5.2M12 7.2h.01M18.4 5.3l1.3-1.2M20.3 8.2h1.7"
              stroke="currentColor"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <span class="info-rule" aria-hidden="true"></span>
        <p class="info-copy">
          You can still save your current seal or begin a new design.
        </p>
      </aside>

      <nav class="tabbar" aria-label="Primary">
        <a class="tab active" href="#">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M5 19c4.5-1.2 6.5-3.3 6.8-8.2"
              stroke="currentColor"
              stroke-linecap="round"
            />
            <path
              d="M10.9 10.4 18.2 3a1.9 1.9 0 0 1 2.7 2.7l-7.4 7.3-3.4.8.8-3.4Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
            <path
              d="M4.2 20.2c2.3 1.2 7.4.8 10.2-.9 2.4-1.4 2.4-3.4-.3-3.7-3.6-.4-8.4.9-10.2 2.6-.9.9-.8 1.5.3 2Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
          </svg>
          <span>Design</span>
        </a>
        <a class="tab" href="#">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 3.5 19.2 6v5.1c0 4.2-2.8 7.7-7.2 9.4-4.4-1.7-7.2-5.2-7.2-9.4V6L12 3.5Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
            <path
              d="m12 8.6 1.1 2.3 2.5.3-1.8 1.8.4 2.5-2.2-1.2-2.2 1.2.4-2.5-1.8-1.8 2.5-.3L12 8.6Z"
              fill="currentColor"
            />
          </svg>
          <span>My Seals</span>
        </a>
        <a class="tab" href="#">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M3.2 8.2 7 3.8h10l3.8 4.4L12 20.3 3.2 8.2Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
            <path
              d="M3.2 8.2h17.6M7 3.8l2.8 4.4L12 20.3l2.2-12.1L17 3.8"
              stroke="currentColor"
              stroke-linejoin="round"
            />
          </svg>
          <span>Stones</span>
        </a>
      </nav>
    </main>
  </body>
</html>
