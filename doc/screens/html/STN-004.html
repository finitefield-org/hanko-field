<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STN-004 Stones Error - Stone Signature</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Hanko Serif JP";
        src: url("../../../app/assets/fonts/NotoSerifJP.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Hanko Serif";
        src: url("../../../app/assets/fonts/NotoSerif.ttf") format("truetype");
        font-weight: 400 700;
        font-display: swap;
      }

      :root {
        --screen-w: 470.5px;
        --ink: #14191c;
        --copy: #565e64;
        --gold: #ad7b3e;
        --wine: #941719;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        align-items: start;
        justify-items: center;
        margin: 0;
        background: #efe7dc;
        color: var(--ink);
        font-family:
          "Hanko Serif JP", "Hanko Serif", "Yu Mincho", "Hiragino Mincho ProN",
          serif;
        letter-spacing: 0;
      }

      button,
      a,
      h1,
      h2,
      p {
        letter-spacing: 0;
      }

      .screen {
        position: relative;
        container-type: inline-size;
        width: min(100vw, var(--screen-w));
        aspect-ratio: 941 / 1672;
        margin: 0 auto;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 50% 8%,
            rgba(255, 255, 255, 0.95),
            transparent 35%
          ),
          radial-gradient(
            ellipse at 50% 49%,
            rgba(255, 255, 255, 0.67),
            transparent 43%
          ),
          radial-gradient(
            ellipse at 50% 89%,
            rgba(255, 255, 255, 0.5),
            transparent 39%
          ),
          linear-gradient(127deg, #f4ece4 0%, #fffdf9 42%, #f7efe7 100%);
      }

      .screen::before,
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .screen::before {
        opacity: 0.26;
        background:
          linear-gradient(
            146deg,
            transparent 0 19%,
            rgba(190, 152, 105, 0.09) 19.12%,
            transparent 19.68%
          ),
          linear-gradient(
            142deg,
            transparent 0 66%,
            rgba(199, 163, 118, 0.11) 66.15%,
            transparent 66.68%
          ),
          linear-gradient(
            136deg,
            transparent 0 74%,
            rgba(190, 151, 105, 0.13) 74.18%,
            transparent 74.74%
          ),
          linear-gradient(
            31deg,
            transparent 0 76%,
            rgba(202, 166, 118, 0.11) 76.12%,
            transparent 76.7%
          );
        filter: blur(0.72px);
      }

      .screen::after {
        box-shadow: inset 0 0 66px rgba(125, 96, 68, 0.075);
      }

      .icon-button {
        position: absolute;
        z-index: 3;
        display: grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--gold);
        padding: 0;
      }

      .menu-button {
        top: 8.95%;
        left: 6.18%;
        width: 5.28cqw;
        height: 5.28cqw;
      }

      .filter-button {
        top: 8.96%;
        right: 5.62%;
        width: 5.75cqw;
        height: 5.2cqw;
      }

      .icon-button svg {
        width: 100%;
        height: 100%;
      }

      .menu-button svg {
        stroke-width: 2.15;
      }

      .filter-button svg {
        stroke-width: 2.05;
      }

      .screen-title {
        position: absolute;
        z-index: 2;
        top: 8.52%;
        left: 50%;
        margin: 0;
        color: #111518;
        font-family:
          "Bodoni 72", "Cormorant Garamond", "Hanko Serif", Georgia, serif;
        font-size: 7.9cqw;
        font-weight: 500;
        line-height: 1;
        text-shadow: 0 9px 15px rgba(65, 43, 29, 0.08);
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .error-state {
        position: absolute;
        z-index: 2;
        top: 31.65%;
        left: 50%;
        display: flex;
        width: 86%;
        transform: translateX(-50%);
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .warning-icon {
        display: grid;
        width: 20.6cqw;
        height: 20.6cqw;
        place-items: center;
        border: 0.44cqw solid var(--wine);
        border-radius: 999px;
        color: var(--wine);
        background: rgba(255, 254, 251, 0.16);
      }

      .warning-icon svg {
        width: 6.85cqw;
        height: 10.25cqw;
      }

      .warning-icon path {
        fill: currentColor;
      }

      .error-title {
        margin: 7.42cqw 0 0;
        color: #13191d;
        font-size: 5.02cqw;
        font-weight: 500;
        line-height: 1.22;
        text-shadow: 0 5px 12px rgba(55, 47, 42, 0.09);
        white-space: nowrap;
      }

      .error-copy {
        margin: 5.25cqw 0 0;
        color: var(--copy);
        font-size: 3.78cqw;
        font-weight: 500;
        line-height: 1.88;
        white-space: nowrap;
      }

      .retry-button {
        display: inline-flex;
        width: 48.2cqw;
        height: 12.58cqw;
        align-items: center;
        justify-content: center;
        margin-top: 8.12cqw;
        border-radius: 999px;
        color: #fffaf1;
        font-size: 4.28cqw;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 2px 8px rgba(255, 244, 222, 0.22);
        background:
          radial-gradient(
            ellipse at 24% 28%,
            rgba(255, 255, 255, 0.1),
            transparent 40%
          ),
          linear-gradient(135deg, #282621, #181713 57%, #27251f);
        box-shadow:
          0 1.35cqw 3.6cqw rgba(30, 28, 24, 0.19),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      @media (max-width: 390px) {
        .screen {
          width: 100vw;
        }

        .error-title {
          font-size: 4.76cqw;
        }

        .error-copy {
          font-size: 3.55cqw;
        }

        .retry-button {
          font-size: 4.05cqw;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="screen shadow-2xl shadow-stone-300/30 md:shadow-stone-300/40"
      aria-label="宝石材取得エラー"
    >
      <button
        class="icon-button menu-button"
        type="button"
        aria-label="メニューを開く"
      >
        <svg viewBox="0 0 28 28" aria-hidden="true">
          <path
            d="M2.9 6.2h22.2M2.9 14h22.2M2.9 21.8h22.2"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <h1 class="screen-title">Stones</h1>

      <button
        class="icon-button filter-button"
        type="button"
        aria-label="絞り込み"
      >
        <svg viewBox="0 0 32 28" aria-hidden="true">
          <path
            d="M4 7h24M8 14h16M13 21h6"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <section class="error-state" aria-labelledby="error-title">
        <div class="warning-icon" aria-hidden="true">
          <svg viewBox="0 0 36 52">
            <path
              d="M18 0c3.1 0 5.1 2.1 4.86 5.27l-2.18 28.6c-.14 1.82-1.18 2.84-2.68 2.84s-2.54-1.02-2.68-2.84L13.14 5.27C12.9 2.1 14.9 0 18 0Z"
            />
            <path
              d="M18 43.3c3.18 0 5.4 2.14 5.4 5.15 0 3.04-2.22 5.2-5.4 5.2s-5.4-2.16-5.4-5.2c0-3.01 2.22-5.15 5.4-5.15Z"
            />
          </svg>
        </div>

        <h2 id="error-title" class="error-title">宝石材の取得に失敗しました</h2>

        <p class="error-copy">
          しばらく経ってから、<br />
          もう一度お試しください。
        </p>

        <a class="retry-button" href="#" aria-label="再試行する">再試行する</a>
      </section>
    </main>
  </body>
</html>
