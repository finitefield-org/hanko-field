name: hankofield
description: "Hanko Field app."
publish_to: 'none'

version: 1.0.4+10

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  declarative_nav:
    path: ../../declarative-nav/declarative_nav
  miniriverpod:
    path: ../../miniriverpod/miniriverpod
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.7+1

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
    - family: Noto Serif JP
      fonts:
        - asset: assets/fonts/NotoSerifJP.ttf
    - family: Noto Serif
      fonts:
        - asset: assets/fonts/NotoSerif.ttf
  assets:
    - assets/design/com003_gemstones.png
    - assets/design/com003_hero_seal.png
    - assets/design/com003_saved_seal.png
