name: hankofield
description: "Hanko Field app."
publish_to: 'none'

version: 1.0.4+10

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  declarative_nav:
    path: ../../declarative-nav/declarative_nav
  miniriverpod:
    path: ../../miniriverpod/miniriverpod

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
    - family: Noto Serif JP
      fonts:
        - asset: assets/fonts/NotoSerifJP.ttf
    - family: Noto Serif
      fonts:
        - asset: assets/fonts/NotoSerif.ttf
  assets:
    - assets/design/com003_gemstones.png
    - assets/design/com003_hero_seal.png
    - assets/design/com003_saved_seal.png
