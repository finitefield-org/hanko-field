services:
  workspace:
    build: .
    volumes:
      - .:/workspace:cached
      - ../firebase-sdk-rust:/firebase-sdk-rust:cached
      - ${HOME}/.config/gcloud/application_default_credentials.json:/workspace/.gcloud/application_default_credentials.json:ro
    ports:
      - "3050:3050"
      - "3051:3051"
      - "3052:3052"
    environment:
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-hanko-field}
      - GOOGLE_CLOUD_PROJECT=${FIREBASE_PROJECT_ID:-hanko-field}
      - FIRESTORE_PROJECT_ID=${FIREBASE_PROJECT_ID:-hanko-field}
      - API_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-hanko-field}
      - API_FIRESTORE_PROJECT_ID=${FIREBASE_PROJECT_ID:-hanko-field}
      - API_STORAGE_ASSETS_BUCKET=${API_STORAGE_ASSETS_BUCKET:-hanko-field-dev}
      - API_GEMINI_API_KEY=${API_GEMINI_API_KEY:-}
      - API_GEMINI_MODEL=${API_GEMINI_MODEL:-gemini-2.5-flash-lite}
      - API_STORAGE_SIGNER_KEY=${API_STORAGE_SIGNER_KEY:-secret://Storage.SignerKey}
      - API_PSP_STRIPE_API_KEY=${API_PSP_STRIPE_API_KEY:-secret://PSP.StripeAPIKey}
      - API_PSP_STRIPE_WEBHOOK_SECRET=${API_PSP_STRIPE_WEBHOOK_SECRET:-secret://PSP.StripeWebhookSecret}
      - API_PSP_STRIPE_CHECKOUT_SUCCESS_URL=${API_PSP_STRIPE_CHECKOUT_SUCCESS_URL:-http://127.0.0.1:3052/payment/success?session_id={CHECKOUT_SESSION_ID}}
      - API_PSP_STRIPE_CHECKOUT_CANCEL_URL=${API_PSP_STRIPE_CHECKOUT_CANCEL_URL:-http://127.0.0.1:3052/payment/failure}
      - API_WEBHOOK_SIGNING_SECRET=${API_WEBHOOK_SIGNING_SECRET:-secret://Webhooks.SigningSecret}
      - ADMIN_ALLOW_INSECURE_AUTH=${ADMIN_ALLOW_INSECURE_AUTH:-1}
      - HANKO_WEB_SITE_BASE_URL=${HANKO_WEB_SITE_BASE_URL:-http://127.0.0.1:3052}
      - HANKO_WEB_API_BASE_URL=${HANKO_WEB_API_BASE_URL:-http://127.0.0.1:3050}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/workspace/.gcloud/application_default_credentials.json}
      - API_FIREBASE_CREDENTIALS_FILE=${API_FIREBASE_CREDENTIALS_FILE:-/workspace/.gcloud/application_default_credentials.json}
    command: sleep infinity
